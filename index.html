/* ===================== expenses.js ===================== */
/* =========================================================================
   expenses.js — day-to-day shop expenses (rent, salary, electricity,
   transport, miscellaneous). Feeds directly into the P&L and cash book.
   ========================================================================= */

function getExpenseCategories() {
  return (Settings.get().expenseCategories && Settings.get().expenseCategories.length)
    ? Settings.get().expenseCategories
    : ['Rent', 'Salary', 'Electricity', 'Transport', 'Miscellaneous'];
}

const Expenses = {
  _categoryFilter: '',
  _monthFilter: '', // 'YYYY-MM' or ''

  render() {
    const content = document.getElementById('content');
    const expenses = this._filtered();
    const total = expenses.reduce((a, e) => a + Number(e.amount), 0);

    content.innerHTML = `
      <div class="toolbar">
        <select id="exp-category-filter">
          <option value="">All Categories</option>
          ${getExpenseCategories().map(c => `<option value="${c}" ${c === this._categoryFilter ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
        <input type="month" id="exp-month-filter" value="${this._monthFilter}" style="width:auto;">
        <div class="chip">Total: <strong>${formatMoney(total)}</strong></div>
        <button class="btn btn-primary" id="exp-add-btn" style="margin-left:auto;">+ Add Expense</button>
      </div>

      <div class="table-wrap">
        ${expenses.length === 0 ? `<div class="empty-state"><div class="empty-mark">−</div>No expenses recorded${this._categoryFilter || this._monthFilter ? ' for this filter' : ' yet'}.</div>` : `
        <table>
          <thead><tr><th>Date</th><th>Category</th><th>Note</th><th class="num">Amount</th><th></th></tr></thead>
          <tbody>
            ${expenses.map(e => `
              <tr>
                <td>${formatDate(e.date)}</td>
                <td><span class="badge badge-muted">${esc(e.category)}</span></td>
                <td>${esc(e.note || '—')}</td>
                <td class="num">${formatMoney(e.amount)}</td>
                <td>
                  <div class="flex gap-8">
                    <button class="btn btn-ghost btn-sm" data-edit="${e.id}">Edit</button>
                    <button class="btn btn-ghost btn-sm" data-delete="${e.id}">Delete</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    `;

    document.getElementById('exp-category-filter').onchange = (e) => { this._categoryFilter = e.target.value; this.render(); };
    document.getElementById('exp-month-filter').onchange = (e) => { this._monthFilter = e.target.value; this.render(); };
    document.getElementById('exp-add-btn').onclick = () => this.openForm();
    content.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => this.openForm(b.dataset.edit));
    content.querySelectorAll('[data-delete]').forEach(b => b.onclick = () => this.deleteExpense(b.dataset.delete));
  },

  _filtered() {
    let list = Store.all('expenses');
    if (this._categoryFilter) list = list.filter(e => e.category === this._categoryFilter);
    if (this._monthFilter) list = list.filter(e => (e.date || '').slice(0, 7) === this._monthFilter);
    return list.sort((a, b) => new Date(b.date) - new Date(a.date));
  },

  openForm(expenseId = null) {
    const e = expenseId ? Store.get('expenses', expenseId) : null;
    const body = Modal.open(e ? 'Edit Expense' : 'Add Expense', `
      <form id="exp-form">
        <div class="form-row">
          <label>Category *
            <select id="exp-cat" required>
              ${getExpenseCategories().map(c => `<option ${e?.category === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </label>
          <label>Date *
            <input type="date" id="exp-date" required value="${e?.date ? e.date.slice(0, 10) : todayInputDate()}">
          </label>
        </div>
        <label>Amount (₹) *
          <input type="number" id="exp-amount" min="0.01" step="0.01" required value="${e?.amount ?? ''}">
        </label>
        <label>Note
          <input type="text" id="exp-note" placeholder="Optional details" value="${esc(e?.note || '')}">
        </label>
        <div id="exp-error" class="form-error" style="display:none;"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="exp-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">${e ? 'Save Changes' : 'Add Expense'}</button>
        </div>
      </form>
    `);
    document.getElementById('exp-cancel').onclick = () => Modal.close();
    document.getElementById('exp-form').addEventListener('submit', (ev) => {
      ev.preventDefault();
      const amount = round2(document.getElementById('exp-amount').value);
      if (!amount || amount <= 0) {
        const err = document.getElementById('exp-error');
        err.textContent = 'Enter a valid amount.'; err.style.display = 'block';
        return;
      }
      const record = {
        category: document.getElementById('exp-cat').value,
        date: new Date(document.getElementById('exp-date').value).toISOString(),
        amount,
        note: document.getElementById('exp-note').value.trim()
      };
      if (e) Store.update('expenses', e.id, record);
      else Store.insert('expenses', record);
      Modal.close();
      Toast.show(e ? 'Expense updated.' : 'Expense added.', 'success');
      this.render();
    });
  },

  async deleteExpense(id) {
    if (await Modal.confirm('Delete this expense record?', 'Delete Expense')) {
      Store.remove('expenses', id);
      Toast.show('Expense deleted.', 'success');
      this.render();
    }
  }
};


/* ===================== accounting.js ===================== */
/* =========================================================================
   accounting.js — the shop's books. Admin-only.
   Sub-sections: Cash Book, Daily Cash Report, Profit & Loss,
   Stock Valuation, GST Reports, Outstanding Customers, Outstanding Suppliers.
   ========================================================================= */

const Accounting = {
  _section: 'cashbook',
  _from: '',
  _to: '',

  render() {
    if (!this._from) { this._from = startOfMonth().toISOString().slice(0, 10); this._to = todayInputDate(); }
    const content = document.getElementById('content');
    const sections = [
      ['cashbook', 'Cash Book'],
      ['daily', 'Daily Cash Report'],
      ['pnl', 'Profit & Loss'],
      ['stock', 'Stock Valuation'],
      ['gst', 'GST Report'],
      ['duecust', 'Outstanding Customers'],
      ['duesup', 'Outstanding Suppliers'],
    ];
    content.innerHTML = `
      <div class="tabs">${sections.map(([key, label]) => `<button class="tab-btn ${this._section === key ? 'active' : ''}" data-sec="${key}">${label}</button>`).join('')}</div>
      <div id="acc-section"></div>
    `;
    content.querySelectorAll('[data-sec]').forEach(b => b.onclick = () => { this._section = b.dataset.sec; this.render(); });

    const map = {
      cashbook: () => this.renderCashBook(),
      daily: () => this.renderDailyReport(),
      pnl: () => this.renderPnL(),
      stock: () => this.renderStockValuation(),
      gst: () => this.renderGST(),
      duecust: () => this.renderDueCustomers(),
      duesup: () => this.renderDueSuppliers(),
    };
    map[this._section]();
  },

  _rangePickerHtml() {
    return `
      <div class="toolbar">
        <label style="margin:0;">From <input type="date" id="acc-from" value="${this._from}" style="width:auto;"></label>
        <label style="margin:0;">To <input type="date" id="acc-to" value="${this._to}" style="width:auto;"></label>
        <button class="btn btn-secondary btn-sm" id="acc-export-csv">⇩ Export CSV</button>
        <button class="btn btn-secondary btn-sm" id="acc-export-pdf">🖨 Export PDF</button>
      </div>`;
  },

  _wireRangePicker(onExportCsv) {
    document.getElementById('acc-from').onchange = (e) => { this._from = e.target.value; this.render(); };
    document.getElementById('acc-to').onchange = (e) => { this._to = e.target.value; this.render(); };
    document.getElementById('acc-export-pdf').onclick = () => window.print();
    document.getElementById('acc-export-csv').onclick = onExportCsv;
  },

  _range() {
    return { from: startOfDay(new Date(this._from)), to: endOfDay(new Date(this._to)) };
  },

  /* ============================== CASH BOOK ============================== */

  renderCashBook() {
    const el = document.getElementById('acc-section');
    const { from, to } = this._range();
    const entries = this._buildLedger(from, to);
    let running = 0;
    const rows = entries.map(e => { running += e.amount; return { ...e, running: round2(running) }; });

    el.innerHTML = `
      ${this._rangePickerHtml()}
      <div id="print-target">
      <div class="table-wrap">
        ${rows.length === 0 ? `<div class="empty-state">No transactions in this range.</div>` : `
        <table>
          <thead><tr><th>Date</th><th>Description</th><th>Type</th><th class="num">In</th><th class="num">Out</th><th class="num">Balance</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${formatDate(r.date)}</td>
                <td>${esc(r.description)}</td>
                <td><span class="badge ${r.amount >= 0 ? 'badge-good' : 'badge-bad'}">${r.amount >= 0 ? 'Cash In' : 'Cash Out'}</span></td>
                <td class="num">${r.amount >= 0 ? formatMoney(r.amount) : ''}</td>
                <td class="num">${r.amount < 0 ? formatMoney(-r.amount) : ''}</td>
                <td class="num"><strong>${formatMoney(r.running)}</strong></td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
      </div>
    `;
    this._wireRangePicker(() => {
      const csv = toCSV(rows, [
        { label: 'Date', value: r => formatDate(r.date) },
        { label: 'Description', value: 'description' },
        { label: 'Cash In', value: r => r.amount >= 0 ? r.amount.toFixed(2) : '' },
        { label: 'Cash Out', value: r => r.amount < 0 ? (-r.amount).toFixed(2) : '' },
        { label: 'Balance', value: r => r.running.toFixed(2) },
      ]);
      downloadFile(`cashbook_${this._from}_to_${this._to}.csv`, csv, 'text/csv');
    });
  },

  /** Builds a unified chronological list of every cash-affecting event. */
  _buildLedger(from, to) {
    const entries = [];
    Store.all('sales').forEach(s => {
      if (isWithin(s.date, from, to) && s.amountPaid > 0) {
        entries.push({ date: s.date, description: `Sale — Invoice ${s.invoiceNo}`, amount: s.amountPaid });
      }
      (s.returns || []).forEach(r => {
        if (isWithin(r.date, from, to)) entries.push({ date: r.date, description: `Refund — Invoice ${s.invoiceNo}`, amount: -r.totalRefund });
      });
    });
    Store.all('purchases').forEach(p => {
      if (isWithin(p.date, from, to) && p.amountPaid > 0) {
        entries.push({ date: p.date, description: `Purchase — ${p.purchaseNo}`, amount: -(p.amountPaid - (p.payments || []).reduce((a, x) => a + x.amount, 0)) });
      }
      (p.payments || []).forEach(pay => {
        if (isWithin(pay.date, from, to)) entries.push({ date: pay.date, description: `Payment to Supplier — ${p.purchaseNo}`, amount: -pay.amount });
      });
    });
    Store.all('expenses').forEach(e => {
      if (isWithin(e.date, from, to)) entries.push({ date: e.date, description: `Expense — ${e.category}${e.note ? ': ' + e.note : ''}`, amount: -e.amount });
    });
    return entries.sort((a, b) => new Date(a.date) - new Date(b.date));
  },

  /* ============================== DAILY CASH REPORT ============================== */

  renderDailyReport() {
    const el = document.getElementById('acc-section');
    const dateVal = this._to || todayInputDate();
    const from = startOfDay(new Date(dateVal)), to = endOfDay(new Date(dateVal));
    const entries = this._buildLedger(from, to);
    const cashIn = entries.filter(e => e.amount > 0).reduce((a, e) => a + e.amount, 0);
    const cashOut = entries.filter(e => e.amount < 0).reduce((a, e) => a - e.amount, 0);
    const net = round2(cashIn - cashOut);

    el.innerHTML = `
      <div class="toolbar"><label style="margin:0;">Date <input type="date" id="daily-date" value="${dateVal}" style="width:auto;"></label>
        <button class="btn btn-secondary btn-sm" id="daily-print">🖨 Print</button>
      </div>
      <div id="print-target">
      <div class="grid grid-3">
        <div class="card stat-card"><span class="stat-label">Cash In</span><span class="stat-value good">${formatMoney(cashIn)}</span></div>
        <div class="card stat-card"><span class="stat-label">Cash Out</span><span class="stat-value bad">${formatMoney(cashOut)}</span></div>
        <div class="card stat-card"><span class="stat-label">Net for the Day</span><span class="stat-value ${net >= 0 ? 'good' : 'bad'}">${formatMoney(net)}</span></div>
      </div>
      <div class="section-title"><h3>Transactions</h3></div>
      <div class="table-wrap">
        ${entries.length === 0 ? `<div class="empty-state">No transactions on this date.</div>` : `
        <table><thead><tr><th>Description</th><th class="num">In</th><th class="num">Out</th></tr></thead>
        <tbody>${entries.map(e => `<tr><td>${esc(e.description)}</td><td class="num">${e.amount >= 0 ? formatMoney(e.amount) : ''}</td><td class="num">${e.amount < 0 ? formatMoney(-e.amount) : ''}</td></tr>`).join('')}</tbody></table>`}
      </div>
      </div>
    `;
    document.getElementById('daily-date').onchange = (e) => { this._to = e.target.value; this.render(); };
    document.getElementById('daily-print').onclick = () => window.print();
  },

  /* ============================== PROFIT & LOSS ============================== */

  renderPnL() {
    const el = document.getElementById('acc-section');
    const { from, to } = this._range();
    const products = Object.fromEntries(Store.all('products').map(p => [p.id, p]));
    const sales = Store.all('sales').filter(s => isWithin(s.date, from, to));

    let revenue = 0, cogs = 0, discounts = 0, refunds = 0;
    sales.forEach(s => {
      revenue += s.grandTotal;
      discounts += (s.discountTotal || 0) + (s.pointsDiscount || 0);
      (s.items || []).forEach(it => { cogs += (products[it.productId] ? Number(products[it.productId].purchasePrice) : 0) * it.qty; });
      (s.returns || []).forEach(r => { if (isWithin(r.date, from, to)) refunds += r.totalRefund; });
    });
    const grossProfit = round2(revenue - cogs - refunds);

    const expenses = Store.all('expenses').filter(e => isWithin(e.date, from, to));
    const byCategory = {};
    expenses.forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; });
    const totalExpenses = expenses.reduce((a, e) => a + e.amount, 0);
    const netProfit = round2(grossProfit - totalExpenses);

    el.innerHTML = `
      ${this._rangePickerHtml()}
      <div id="print-target">
      <div class="grid grid-3">
        <div class="card stat-card"><span class="stat-label">Revenue</span><span class="stat-value">${formatMoney(revenue)}</span></div>
        <div class="card stat-card"><span class="stat-label">Gross Profit</span><span class="stat-value ${grossProfit >= 0 ? 'good' : 'bad'}">${formatMoney(grossProfit)}</span></div>
        <div class="card stat-card"><span class="stat-label">Net Profit</span><span class="stat-value ${netProfit >= 0 ? 'good' : 'bad'}">${formatMoney(netProfit)}</span></div>
      </div>
      <div class="section-title"><h3>Statement</h3></div>
      <div class="card">
        <div class="bill-summary-row"><span>Revenue (sales)</span><span>${formatMoney(revenue)}</span></div>
        <div class="bill-summary-row"><span>Less: Cost of Goods Sold</span><span>− ${formatMoney(cogs)}</span></div>
        <div class="bill-summary-row"><span>Less: Returns / Refunds</span><span>− ${formatMoney(refunds)}</span></div>
        <div class="bill-summary-row total"><span>Gross Profit</span><span>${formatMoney(grossProfit)}</span></div>
      </div>
      <div class="section-title"><h3>Expenses</h3></div>
      <div class="card">
        ${Object.keys(byCategory).length === 0 ? `<p class="text-muted">No expenses in this period.</p>` :
          Object.entries(byCategory).map(([cat, amt]) => `<div class="bill-summary-row"><span>${esc(cat)}</span><span>${formatMoney(amt)}</span></div>`).join('')}
        <div class="bill-summary-row total"><span>Total Expenses</span><span>${formatMoney(totalExpenses)}</span></div>
      </div>
      <div class="section-title"><h3>Net Profit</h3></div>
      <div class="card"><div class="bill-summary-row total"><span>Net Profit for Period</span><span class="${netProfit >= 0 ? 'text-good' : 'text-bad'}">${formatMoney(netProfit)}</span></div></div>
      </div>
    `;
    this._wireRangePicker(() => {
      const csv = toCSV([
        { label: 'Revenue', v: revenue }, { label: 'COGS', v: cogs }, { label: 'Refunds', v: refunds },
        { label: 'Gross Profit', v: grossProfit }, { label: 'Total Expenses', v: totalExpenses }, { label: 'Net Profit', v: netProfit }
      ], [{ label: 'Line', value: 'label' }, { label: 'Amount', value: 'v' }]);
      downloadFile(`profit_loss_${this._from}_to_${this._to}.csv`, csv, 'text/csv');
    });
  },

  /* ============================== STOCK VALUATION ============================== */

  renderStockValuation() {
    const el = document.getElementById('acc-section');
    const products = Store.all('products');
    const rows = products.map(p => ({
      ...p,
      costValue: round2(p.stock * p.purchasePrice),
      saleValue: round2(p.stock * p.sellingPrice)
    }));
    const totalCost = rows.reduce((a, r) => a + r.costValue, 0);
    const totalSale = rows.reduce((a, r) => a + r.saleValue, 0);

    el.innerHTML = `
      <div class="toolbar"><button class="btn btn-secondary btn-sm" id="stock-export">⇩ Export CSV</button></div>
      <div class="grid grid-2">
        <div class="card stat-card"><span class="stat-label">Stock Value (at cost)</span><span class="stat-value">${formatMoney(totalCost)}</span></div>
        <div class="card stat-card"><span class="stat-label">Stock Value (at selling price)</span><span class="stat-value good">${formatMoney(totalSale)}</span></div>
      </div>
      <div class="section-title"><h3>By Product</h3></div>
      <div class="table-wrap">
        <table><thead><tr><th>Product</th><th class="num">Stock</th><th class="num">Cost/Unit</th><th class="num">Cost Value</th><th class="num">Sale Value</th></tr></thead>
        <tbody>${rows.map(r => `<tr><td>${esc(r.name)}</td><td class="num">${r.stock}</td><td class="num">${formatMoney(r.purchasePrice)}</td><td class="num">${formatMoney(r.costValue)}</td><td class="num">${formatMoney(r.saleValue)}</td></tr>`).join('')}</tbody></table>
      </div>
    `;
    document.getElementById('stock-export').onclick = () => {
      const csv = toCSV(rows, [
        { label: 'Product', value: 'name' }, { label: 'Stock', value: 'stock' },
        { label: 'Cost/Unit', value: r => r.purchasePrice }, { label: 'Cost Value', value: r => r.costValue }, { label: 'Sale Value', value: r => r.saleValue }
      ]);
      downloadFile('stock_valuation.csv', csv, 'text/csv');
    };
  },

  /* ============================== GST REPORT ============================== */

  renderGST() {
    const el = document.getElementById('acc-section');
    const { from, to } = this._range();
    const sales = Store.all('sales').filter(s => isWithin(s.date, from, to));
    const purchases = Store.all('purchases').filter(p => isWithin(p.date, from, to));
    const outputGST = round2(sales.reduce((a, s) => a + (s.gstTotal || 0), 0));
    const inputGST = round2(purchases.reduce((a, p) => a + (p.gstTotal || 0), 0));
    const netPayable = round2(outputGST - inputGST);

    // Breakdown by slab
    const slabMap = {};
    sales.forEach(s => (s.items || []).forEach(it => {
      const lineNet = it.price * it.qty - (it.discount || 0);
      const { gstAmount } = calcGST(lineNet, it.gstPercent);
      const key = it.gstPercent + '%';
      slabMap[key] = slabMap[key] || { taxable: 0, gst: 0 };
      slabMap[key].taxable += lineNet; slabMap[key].gst += gstAmount;
    }));

    el.innerHTML = `
      ${this._rangePickerHtml()}
      <div id="print-target">
      <div class="grid grid-3">
        <div class="card stat-card"><span class="stat-label">Output GST (on Sales)</span><span class="stat-value">${formatMoney(outputGST)}</span></div>
        <div class="card stat-card"><span class="stat-label">Input GST (on Purchases)</span><span class="stat-value">${formatMoney(inputGST)}</span></div>
        <div class="card stat-card"><span class="stat-label">Net GST Payable</span><span class="stat-value ${netPayable >= 0 ? 'bad' : 'good'}">${formatMoney(Math.abs(netPayable))} ${netPayable >= 0 ? '(Payable)' : '(Credit)'}</span></div>
      </div>
      <div class="section-title"><h3>Sales GST by Slab</h3></div>
      <div class="table-wrap">
        <table><thead><tr><th>GST Slab</th><th class="num">Taxable Value</th><th class="num">GST Amount</th></tr></thead>
        <tbody>${Object.entries(slabMap).length === 0 ? '<tr><td colspan="3" class="text-muted" style="text-align:center;">No sales in this period.</td></tr>' :
          Object.entries(slabMap).map(([slab, v]) => `<tr><td>${slab}</td><td class="num">${formatMoney(v.taxable)}</td><td class="num">${formatMoney(v.gst)}</td></tr>`).join('')}
        </tbody></table>
      </div>
      </div>
    `;
    this._wireRangePicker(() => {
      const rows = Object.entries(slabMap).map(([slab, v]) => ({ slab, taxable: v.taxable, gst: v.gst }));
      const csv = toCSV(rows, [{ label: 'GST Slab', value: 'slab' }, { label: 'Taxable Value', value: r => r.taxable.toFixed(2) }, { label: 'GST Amount', value: r => r.gst.toFixed(2) }]);
      downloadFile(`gst_report_${this._from}_to_${this._to}.csv`, csv, 'text/csv');
    });
  },

  /* ============================== OUTSTANDING BALANCES ============================== */

  renderDueCustomers() {
    const el = document.getElementById('acc-section');
    const due = Store.all('customers').filter(c => (c.creditBalance || 0) > 0).sort((a, b) => b.creditBalance - a.creditBalance);
    const total = due.reduce((a, c) => a + c.creditBalance, 0);
    el.innerHTML = `
      <div class="toolbar"><div class="chip">Total Outstanding: <strong>${formatMoney(total)}</strong></div></div>
      <div class="table-wrap">
        ${due.length === 0 ? `<div class="empty-state">No customers currently owe money. 🎉</div>` : `
        <table><thead><tr><th>Customer</th><th>Phone</th><th class="num">Amount Due</th></tr></thead>
        <tbody>${due.map(c => `<tr><td>${esc(c.name)}</td><td class="mono">${esc(c.phone || '—')}</td><td class="num"><span class="badge badge-warn">${formatMoney(c.creditBalance)}</span></td></tr>`).join('')}</tbody></table>`}
      </div>
    `;
  },

  renderDueSuppliers() {
    const el = document.getElementById('acc-section');
    const due = Store.all('suppliers').filter(s => (s.outstandingBalance || 0) > 0).sort((a, b) => b.outstandingBalance - a.outstandingBalance);
    const total = due.reduce((a, s) => a + s.outstandingBalance, 0);
    el.innerHTML = `
      <div class="toolbar"><div class="chip">Total Owed to Suppliers: <strong>${formatMoney(total)}</strong></div></div>
      <div class="table-wrap">
        ${due.length === 0 ? `<div class="empty-state">No outstanding balances with suppliers. 🎉</div>` : `
        <table><thead><tr><th>Supplier</th><th>Phone</th><th class="num">Amount Owed</th></tr></thead>
        <tbody>${due.map(s => `<tr><td>${esc(s.name)}</td><td class="mono">${esc(s.phone || '—')}</td><td class="num"><span class="badge badge-warn">${formatMoney(s.outstandingBalance)}</span></td></tr>`).join('')}</tbody></table>`}
      </div>
    `;
  }
};


/* ===================== reports.js ===================== */
/* =========================================================================
   reports.js — periodic business reports. Admin-only.
   ========================================================================= */

const Reports = {
  _section: 'sales',
  _period: 'monthly', // daily | weekly | monthly | yearly | custom
  _from: '',
  _to: '',

  render() {
    this._applyPeriodDefaults();
    const content = document.getElementById('content');
    const sections = [
      ['sales', 'Sales Report'],
      ['best', 'Best Selling Items'],
      ['slow', 'Slow Moving Items'],
      ['profit', 'Profit Report'],
    ];
    content.innerHTML = `
      <div class="tabs">${sections.map(([k, l]) => `<button class="tab-btn ${this._section === k ? 'active' : ''}" data-sec="${k}">${l}</button>`).join('')}</div>
      <div id="rep-section"></div>
    `;
    content.querySelectorAll('[data-sec]').forEach(b => b.onclick = () => { this._section = b.dataset.sec; this.render(); });

    const map = { sales: () => this.renderSalesReport(), best: () => this.renderBestSellers(), slow: () => this.renderSlowMovers(), profit: () => this.renderProfitReport() };
    map[this._section]();
  },

  _applyPeriodDefaults() {
    if (this._from && this._to) return;
    const now = new Date();
    this._to = todayInputDate();
    this._from = startOfMonth(now).toISOString().slice(0, 10);
  },

  _periodPickerHtml() {
    const periods = [['daily', 'Today'], ['weekly', 'This Week'], ['monthly', 'This Month'], ['yearly', 'This Year'], ['custom', 'Custom']];
    return `
      <div class="toolbar">
        <select id="rep-period" style="width:auto;">
          ${periods.map(([k, l]) => `<option value="${k}" ${this._period === k ? 'selected' : ''}>${l}</option>`).join('')}
        </select>
        ${this._period === 'custom' ? `
          <label style="margin:0;">From <input type="date" id="rep-from" value="${this._from}" style="width:auto;"></label>
          <label style="margin:0;">To <input type="date" id="rep-to" value="${this._to}" style="width:auto;"></label>
        ` : `<div class="chip">${formatDate(this._from)} – ${formatDate(this._to)}</div>`}
        <button class="btn btn-secondary btn-sm" id="rep-export-csv">⇩ Export CSV</button>
        <button class="btn btn-secondary btn-sm" id="rep-export-pdf">🖨 Export PDF</button>
      </div>`;
  },

  _wirePeriodPicker(onExportCsv) {
    document.getElementById('rep-period').onchange = (e) => {
      this._period = e.target.value;
      const now = new Date();
      if (this._period === 'daily') { this._from = this._to = todayInputDate(); }
      else if (this._period === 'weekly') { this._from = startOfWeek(now).toISOString().slice(0, 10); this._to = todayInputDate(); }
      else if (this._period === 'monthly') { this._from = startOfMonth(now).toISOString().slice(0, 10); this._to = todayInputDate(); }
      else if (this._period === 'yearly') { this._from = startOfYear(now).toISOString().slice(0, 10); this._to = todayInputDate(); }
      this.render();
    };
    const fromEl = document.getElementById('rep-from'), toEl = document.getElementById('rep-to');
    if (fromEl) fromEl.onchange = (e) => { this._from = e.target.value; this.render(); };
    if (toEl) toEl.onchange = (e) => { this._to = e.target.value; this.render(); };
    document.getElementById('rep-export-pdf').onclick = () => window.print();
    document.getElementById('rep-export-csv').onclick = onExportCsv;
  },

  _range() { return { from: startOfDay(new Date(this._from)), to: endOfDay(new Date(this._to)) }; },

  /* ============================== SALES REPORT ============================== */

  renderSalesReport() {
    const el = document.getElementById('rep-section');
    const { from, to } = this._range();
    const sales = Store.all('sales').filter(s => isWithin(s.date, from, to));
    const totalSales = sales.reduce((a, s) => a + s.grandTotal, 0);
    const totalGST = sales.reduce((a, s) => a + (s.gstTotal || 0), 0);
    const avgInvoice = sales.length ? round2(totalSales / sales.length) : 0;
    const itemsSold = sales.reduce((a, s) => a + (s.items || []).reduce((b, i) => b + i.qty, 0), 0);

    // Group by day for the breakdown table.
    const byDay = {};
    sales.forEach(s => {
      const key = s.date.slice(0, 10);
      byDay[key] = byDay[key] || { count: 0, total: 0 };
      byDay[key].count++; byDay[key].total += s.grandTotal;
    });
    const dayRows = Object.entries(byDay).sort((a, b) => a[0].localeCompare(b[0]));

    el.innerHTML = `
      ${this._periodPickerHtml()}
      <div id="print-target">
      <div class="grid grid-4">
        <div class="card stat-card"><span class="stat-label">Total Sales</span><span class="stat-value">${formatMoney(totalSales)}</span></div>
        <div class="card stat-card"><span class="stat-label">Invoices</span><span class="stat-value">${sales.length}</span></div>
        <div class="card stat-card"><span class="stat-label">Avg. Invoice Value</span><span class="stat-value">${formatMoney(avgInvoice)}</span></div>
        <div class="card stat-card"><span class="stat-label">Items Sold</span><span class="stat-value">${itemsSold}</span></div>
      </div>
      <div class="section-title"><h3>Day-by-Day</h3></div>
      <div class="table-wrap">
        ${dayRows.length === 0 ? `<div class="empty-state">No sales in this period.</div>` : `
        <table><thead><tr><th>Date</th><th class="num">Invoices</th><th class="num">Total</th></tr></thead>
        <tbody>${dayRows.map(([d, v]) => `<tr><td>${formatDate(d)}</td><td class="num">${v.count}</td><td class="num">${formatMoney(v.total)}</td></tr>`).join('')}</tbody></table>`}
      </div>
      </div>
    `;
    this._wirePeriodPicker(() => {
      const rows = dayRows.map(([d, v]) => ({ date: formatDate(d), count: v.count, total: v.total.toFixed(2) }));
      const csv = toCSV(rows, [{ label: 'Date', value: 'date' }, { label: 'Invoices', value: 'count' }, { label: 'Total', value: 'total' }]);
      downloadFile(`sales_report_${this._from}_to_${this._to}.csv`, csv, 'text/csv');
    });
  },

  /* ============================== BEST SELLERS ============================== */

  renderBestSellers() {
    const el = document.getElementById('rep-section');
    const { from, to } = this._range();
    const products = Object.fromEntries(Store.all('products').map(p => [p.id, p]));
    const agg = {};
    Store.all('sales').filter(s => isWithin(s.date, from, to)).forEach(s => (s.items || []).forEach(it => {
      agg[it.productId] = agg[it.productId] || { qty: 0, revenue: 0 };
      agg[it.productId].qty += it.qty;
      agg[it.productId].revenue += it.price * it.qty - (it.discount || 0);
    }));
    const rows = Object.entries(agg)
      .map(([pid, v]) => ({ product: products[pid], ...v }))
      .filter(r => r.product)
      .sort((a, b) => b.qty - a.qty);

    el.innerHTML = `
      ${this._periodPickerHtml()}
      <div id="print-target">
      <div class="table-wrap">
        ${rows.length === 0 ? `<div class="empty-state">No sales in this period.</div>` : `
        <table><thead><tr><th>#</th><th>Product</th><th>Category</th><th class="num">Qty Sold</th><th class="num">Revenue</th></tr></thead>
        <tbody>${rows.map((r, i) => `<tr><td>${i + 1}</td><td>${esc(r.product.name)}</td><td>${esc(r.product.category || '—')}</td><td class="num">${r.qty}</td><td class="num">${formatMoney(r.revenue)}</td></tr>`).join('')}</tbody></table>`}
      </div>
      </div>
    `;
    this._wirePeriodPicker(() => {
      const data = rows.map((r, i) => ({ rank: i + 1, name: r.product.name, category: r.product.category || '', qty: r.qty, revenue: r.revenue.toFixed(2) }));
      const csv = toCSV(data, [{ label: 'Rank', value: 'rank' }, { label: 'Product', value: 'name' }, { label: 'Category', value: 'category' }, { label: 'Qty Sold', value: 'qty' }, { label: 'Revenue', value: 'revenue' }]);
      downloadFile(`best_sellers_${this._from}_to_${this._to}.csv`, csv, 'text/csv');
    });
  },

  /* ============================== SLOW MOVERS ============================== */

  renderSlowMovers() {
    const el = document.getElementById('rep-section');
    const { from, to } = this._range();
    const soldQty = {};
    Store.all('sales').filter(s => isWithin(s.date, from, to)).forEach(s => (s.items || []).forEach(it => {
      soldQty[it.productId] = (soldQty[it.productId] || 0) + it.qty;
    }));
    const rows = Store.all('products')
      .map(p => ({ product: p, qty: soldQty[p.id] || 0 }))
      .sort((a, b) => a.qty - b.qty)
      .slice(0, 30);

    el.innerHTML = `
      ${this._periodPickerHtml()}
      <p class="text-muted">Products with the least sales in this period — good candidates for a clearance discount or a smaller reorder.</p>
      <div id="print-target">
      <div class="table-wrap">
        ${rows.length === 0 ? `<div class="empty-state">No products in inventory yet.</div>` : `
        <table><thead><tr><th>Product</th><th>Category</th><th class="num">Current Stock</th><th class="num">Qty Sold in Period</th></tr></thead>
        <tbody>${rows.map(r => `<tr><td>${esc(r.product.name)}</td><td>${esc(r.product.category || '—')}</td><td class="num">${r.product.stock}</td><td class="num">${r.qty === 0 ? '<span class="badge badge-bad">0</span>' : r.qty}</td></tr>`).join('')}</tbody></table>`}
      </div>
      </div>
    `;
    this._wirePeriodPicker(() => {
      const data = rows.map(r => ({ name: r.product.name, category: r.product.category || '', stock: r.product.stock, qty: r.qty }));
      const csv = toCSV(data, [{ label: 'Product', value: 'name' }, { label: 'Category', value: 'category' }, { label: 'Current Stock', value: 'stock' }, { label: 'Qty Sold', value: 'qty' }]);
      downloadFile(`slow_movers_${this._from}_to_${this._to}.csv`, csv, 'text/csv');
    });
  },

  /* ============================== PROFIT REPORT ============================== */

  renderProfitReport() {
    const el = document.getElementById('rep-section');
    const { from, to } = this._range();
    const products = Object.fromEntries(Store.all('products').map(p => [p.id, p]));
    const agg = {};
    Store.all('sales').filter(s => isWithin(s.date, from, to)).forEach(s => (s.items || []).forEach(it => {
      const p = products[it.productId];
      const cost = p ? Number(p.purchasePrice) : 0;
      const revenue = it.price * it.qty - (it.discount || 0);
      const profit = (it.price - cost) * it.qty - (it.discount || 0);
      agg[it.productId] = agg[it.productId] || { name: it.name, qty: 0, revenue: 0, profit: 0 };
      agg[it.productId].qty += it.qty; agg[it.productId].revenue += revenue; agg[it.productId].profit += profit;
    }));
    const rows = Object.values(agg).sort((a, b) => b.profit - a.profit);
    const totalProfit = rows.reduce((a, r) => a + r.profit, 0);
    const totalRevenue = rows.reduce((a, r) => a + r.revenue, 0);
    const margin = totalRevenue > 0 ? round2((totalProfit / totalRevenue) * 100) : 0;

    el.innerHTML = `
      ${this._periodPickerHtml()}
      <div id="print-target">
      <div class="grid grid-3">
        <div class="card stat-card"><span class="stat-label">Total Revenue</span><span class="stat-value">${formatMoney(totalRevenue)}</span></div>
        <div class="card stat-card"><span class="stat-label">Total Profit</span><span class="stat-value ${totalProfit >= 0 ? 'good' : 'bad'}">${formatMoney(totalProfit)}</span></div>
        <div class="card stat-card"><span class="stat-label">Margin</span><span class="stat-value">${margin}%</span></div>
      </div>
      <div class="section-title"><h3>By Product</h3></div>
      <div class="table-wrap">
        ${rows.length === 0 ? `<div class="empty-state">No sales in this period.</div>` : `
        <table><thead><tr><th>Product</th><th class="num">Qty</th><th class="num">Revenue</th><th class="num">Profit</th></tr></thead>
        <tbody>${rows.map(r => `<tr><td>${esc(r.name)}</td><td class="num">${r.qty}</td><td class="num">${formatMoney(r.revenue)}</td><td class="num ${r.profit >= 0 ? 'text-good' : 'text-bad'}">${formatMoney(r.profit)}</td></tr>`).join('')}</tbody></table>`}
      </div>
      </div>
    `;
    this._wirePeriodPicker(() => {
      const data = rows.map(r => ({ name: r.name, qty: r.qty, revenue: r.revenue.toFixed(2), profit: r.profit.toFixed(2) }));
      const csv = toCSV(data, [{ label: 'Product', value: 'name' }, { label: 'Qty', value: 'qty' }, { label: 'Revenue', value: 'revenue' }, { label: 'Profit', value: 'profit' }]);
      downloadFile(`profit_report_${this._from}_to_${this._to}.csv`, csv, 'text/csv');
    });
  }
};


/* ===================== employees.js ===================== */
/* =========================================================================
   employees.js — staff records, attendance marking, and salary payments.
   Salary payments are recorded as Expenses (category "Salary") so they
   automatically flow into the Cash Book and Profit & Loss reports.
   Admin-only screen.
   ========================================================================= */

const Employees = {
  _section: 'records',
  _attendanceDate: '',

  render() {
    if (!this._attendanceDate) this._attendanceDate = todayInputDate();
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="tabs">
        <button class="tab-btn ${this._section === 'records' ? 'active' : ''}" data-sec="records">👥 Records</button>
        <button class="tab-btn ${this._section === 'attendance' ? 'active' : ''}" data-sec="attendance">🗓 Attendance</button>
        <button class="tab-btn ${this._section === 'salary' ? 'active' : ''}" data-sec="salary">💰 Salary</button>
      </div>
      <div id="emp-section"></div>
    `;
    content.querySelectorAll('[data-sec]').forEach(b => b.onclick = () => { this._section = b.dataset.sec; this.render(); });
    ({ records: () => this.renderRecords(), attendance: () => this.renderAttendance(), salary: () => this.renderSalary() })[this._section]();
  },

  /* ============================== RECORDS ============================== */

  renderRecords() {
    const el = document.getElementById('emp-section');
    const employees = Store.all('employees').sort((a, b) => a.name.localeCompare(b.name));
    el.innerHTML = `
      <div class="toolbar"><button class="btn btn-primary" id="emp-add-btn" style="margin-left:auto;">+ Add Employee</button></div>
      <div class="table-wrap">
        ${employees.length === 0 ? `<div class="empty-state"><div class="empty-mark">👥</div>No employees added yet.</div>` : `
        <table>
          <thead><tr><th>Name</th><th>Role</th><th>Phone</th><th class="num">Monthly Salary</th><th>Joined</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${employees.map(e => `
              <tr>
                <td><strong>${esc(e.name)}</strong></td>
                <td>${esc(e.role || '—')}</td>
                <td class="mono">${esc(e.phone || '—')}</td>
                <td class="num">${formatMoney(e.salary)}</td>
                <td>${formatDate(e.joinDate)}</td>
                <td>${e.active !== false ? '<span class="badge badge-good">Active</span>' : '<span class="badge badge-muted">Inactive</span>'}</td>
                <td>
                  <div class="flex gap-8">
                    <button class="btn btn-ghost btn-sm" data-edit="${e.id}">Edit</button>
                    <button class="btn btn-ghost btn-sm" data-delete="${e.id}">Delete</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    `;
    document.getElementById('emp-add-btn').onclick = () => this.openForm();
    el.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => this.openForm(b.dataset.edit));
    el.querySelectorAll('[data-delete]').forEach(b => b.onclick = () => this.deleteEmployee(b.dataset.delete));
  },

  openForm(employeeId = null) {
    const e = employeeId ? Store.get('employees', employeeId) : null;
    const body = Modal.open(e ? 'Edit Employee' : 'Add Employee', `
      <form id="emp-form">
        <label>Full Name *
          <input type="text" id="emp-name" required value="${esc(e?.name || '')}">
        </label>
        <div class="form-row">
          <label>Role / Position
            <input type="text" id="emp-role" placeholder="e.g. Sales Assistant" value="${esc(e?.role || '')}">
          </label>
          <label>Phone
            <input type="tel" id="emp-phone" value="${esc(e?.phone || '')}">
          </label>
        </div>
        <div class="form-row">
          <label>Monthly Salary (₹) *
            <input type="number" id="emp-salary" min="0" step="0.01" required value="${e?.salary ?? ''}">
          </label>
          <label>Joining Date
            <input type="date" id="emp-joindate" value="${e?.joinDate ? e.joinDate.slice(0, 10) : todayInputDate()}">
          </label>
        </div>
        <label style="display:flex;align-items:center;gap:8px;flex-direction:row;">
          <input type="checkbox" id="emp-active" style="width:auto;" ${e?.active !== false ? 'checked' : ''}> Active employee
        </label>
        <div id="emp-error" class="form-error" style="display:none;"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="emp-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">${e ? 'Save Changes' : 'Add Employee'}</button>
        </div>
      </form>
    `);
    document.getElementById('emp-cancel').onclick = () => Modal.close();
    document.getElementById('emp-form').addEventListener('submit', (ev) => {
      ev.preventDefault();
      const name = document.getElementById('emp-name').value.trim();
      if (!name) { const err = document.getElementById('emp-error'); err.textContent = 'Name is required.'; err.style.display = 'block'; return; }
      const record = {
        name,
        role: document.getElementById('emp-role').value.trim(),
        phone: document.getElementById('emp-phone').value.trim(),
        salary: round2(document.getElementById('emp-salary').value),
        joinDate: new Date(document.getElementById('emp-joindate').value).toISOString(),
        active: document.getElementById('emp-active').checked
      };
      if (e) Store.update('employees', e.id, record);
      else Store.insert('employees', record);
      Modal.close();
      Toast.show(e ? 'Employee updated.' : 'Employee added.', 'success');
      this.render();
    });
  },

  async deleteEmployee(id) {
    if (await Modal.confirm('Delete this employee record? Attendance and salary history will remain.', 'Delete Employee')) {
      Store.remove('employees', id);
      Toast.show('Employee deleted.', 'success');
      this.render();
    }
  },

  /* ============================== ATTENDANCE ============================== */

  renderAttendance() {
    const el = document.getElementById('emp-section');
    const employees = Store.all('employees').filter(e => e.active !== false);
    const dayRecords = Store.all('attendance').filter(a => a.date === this._attendanceDate);
    const statusFor = (empId) => dayRecords.find(a => a.employeeId === empId)?.status || '';

    el.innerHTML = `
      <div class="toolbar"><label style="margin:0;">Date <input type="date" id="att-date" value="${this._attendanceDate}" style="width:auto;"></label></div>
      <div class="table-wrap">
        ${employees.length === 0 ? `<div class="empty-state">No active employees. Add employees in the Records tab first.</div>` : `
        <table>
          <thead><tr><th>Employee</th><th>Status</th></tr></thead>
          <tbody>
            ${employees.map(emp => `
              <tr>
                <td>${esc(emp.name)}</td>
                <td>
                  <select data-att="${emp.id}">
                    <option value="" ${statusFor(emp.id) === '' ? 'selected' : ''}>— Not marked —</option>
                    <option value="present" ${statusFor(emp.id) === 'present' ? 'selected' : ''}>✓ Present</option>
                    <option value="half-day" ${statusFor(emp.id) === 'half-day' ? 'selected' : ''}>◐ Half Day</option>
                    <option value="absent" ${statusFor(emp.id) === 'absent' ? 'selected' : ''}>✕ Absent</option>
                  </select>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    `;
    document.getElementById('att-date').onchange = (e) => { this._attendanceDate = e.target.value; this.render(); };
    el.querySelectorAll('[data-att]').forEach(sel => sel.addEventListener('change', (e) => {
      const employeeId = e.target.dataset.att;
      const status = e.target.value;
      const existing = Store.all('attendance').find(a => a.employeeId === employeeId && a.date === this._attendanceDate);
      if (!status) { if (existing) Store.remove('attendance', existing.id); return; }
      if (existing) Store.update('attendance', existing.id, { status });
      else Store.insert('attendance', { employeeId, date: this._attendanceDate, status });
      Toast.show('Attendance saved.', 'success');
    }));
  },

  /* ============================== SALARY ============================== */

  renderSalary() {
    const el = document.getElementById('emp-section');
    const employees = Store.all('employees');
    const thisMonth = todayInputDate().slice(0, 7);
    const salaryExpenses = Store.all('expenses').filter(e => e.category === 'Salary' && e.employeeId);

    el.innerHTML = `
      <div class="table-wrap">
        ${employees.length === 0 ? `<div class="empty-state">No employees added yet.</div>` : `
        <table>
          <thead><tr><th>Employee</th><th class="num">Monthly Salary</th><th class="num">Paid This Month</th><th class="num">Balance</th><th></th></tr></thead>
          <tbody>
            ${employees.map(emp => {
              const paidThisMonth = salaryExpenses.filter(e => e.employeeId === emp.id && e.date.slice(0, 7) === thisMonth).reduce((a, e) => a + e.amount, 0);
              const balance = round2(emp.salary - paidThisMonth);
              return `
              <tr>
                <td>${esc(emp.name)}</td>
                <td class="num">${formatMoney(emp.salary)}</td>
                <td class="num">${formatMoney(paidThisMonth)}</td>
                <td class="num">${balance > 0 ? `<span class="badge badge-warn">${formatMoney(balance)}</span>` : `<span class="badge badge-good">Paid</span>`}</td>
                <td><button class="btn btn-ghost btn-sm" data-pay="${emp.id}">Record Payment</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
      <div class="section-title"><h3>Payment History</h3></div>
      <div class="table-wrap">
        ${salaryExpenses.length === 0 ? `<div class="empty-state">No salary payments recorded yet.</div>` : `
        <table><thead><tr><th>Date</th><th>Employee</th><th class="num">Amount</th></tr></thead>
        <tbody>${salaryExpenses.sort((a, b) => new Date(b.date) - new Date(a.date)).map(e => {
          const emp = Store.get('employees', e.employeeId);
          return `<tr><td>${formatDate(e.date)}</td><td>${esc(emp ? emp.name : 'Unknown')}</td><td class="num">${formatMoney(e.amount)}</td></tr>`;
        }).join('')}</tbody></table>`}
      </div>
    `;
    el.querySelectorAll('[data-pay]').forEach(btn => btn.onclick = () => this.recordSalaryPayment(btn.dataset.pay));
  },

  recordSalaryPayment(employeeId) {
    const emp = Store.get('employees', employeeId);
    const body = Modal.open(`Pay Salary — ${esc(emp.name)}`, `
      <form id="sal-form">
        <label>Amount (₹) *
          <input type="number" id="sal-amount" min="0.01" step="0.01" required value="${emp.salary}">
        </label>
        <label>Date *
          <input type="date" id="sal-date" required value="${todayInputDate()}">
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="sal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Record Payment</button>
        </div>
      </form>
    `);
    document.getElementById('sal-cancel').onclick = () => Modal.close();
    document.getElementById('sal-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const amount = round2(document.getElementById('sal-amount').value);
      if (!amount || amount <= 0) return;
      Store.insert('expenses', {
        category: 'Salary',
        amount,
        date: new Date(document.getElementById('sal-date').value).toISOString(),
        note: `Salary payment — ${emp.name}`,
        employeeId: emp.id
      });
      Modal.close();
      Toast.show('Salary payment recorded.', 'success');
      this.render();
    });
  }
};

/* =========================================================================
   settings.js — shop profile, invoice customization, login accounts

const SettingsPage = {
  _section: 'profile',

  render() {
    const content = document.getElementById('content');
    const isAdmin = Auth.isAdmin();
    const sections = [
      ['profile', 'Shop Profile'],
      ['invoice', 'Invoice Customization'],
      ...(isAdmin ? [['users', 'Users & Roles']] : []),
      ...(isAdmin ? [['customize', 'Customize']] : []),
      ...(isAdmin ? [['sync', 'Online Sync']] : []),
      ['account', 'My Account'],
      ['backup', 'Backup & Data'],
    ];
    content.innerHTML = `

    const body = Modal.open('Add User', `

  resetPassword(userId) {
    const u = Store.get('users', userId);
    const body = Modal.open(`Reset Password — ${esc(u.name)}`, `

          <button type="submit" class="btn btn-primary">Reset Password</button>
        </div>

    document.getElementById('reset-cancel').onclick = () => Modal.close();

  /* ============================== ONLINE SYNC ============================== */

  renderSync() {
    const el = document.getElementById('set-section');
    const configured = SyncEngine.isConfigured();
    const cfg = SyncEngine.getConfig();

    el.innerHTML = `
      <div class="card" style="margin-bottom:18px;">
        <h4 style="margin-bottom:6px;">${configured ? '✅ Sync is ON' : 'Connect Devices Together'}</h4>
        <p class="text-muted" style="font-size:12.5px;margin-bottom:14px;">
          ${configured
            ? `This phone syncs with a shared free database. Set up every staff phone with the SAME URL and Key below, each with a different Device Tag.`
            : `Set this up once on a free Supabase project (see instructions below), then enter the details here on every staff phone so they all share the same data.`}
        </p>
        <div id="sync-status" style="margin-bottom:14px;"></div>
        <form id="sync-form">
          <label>Supabase Project URL
            <input type="text" id="sync-url" placeholder="https://xxxxx.supabase.co" value="${esc(cfg?.url || '')}" required>
          </label>
          <label>Supabase anon public API Key
            <input type="text" id="sync-key" placeholder="eyJhbGciOi..." value="${esc(cfg?.anonKey || '')}" required>
          </label>
          <label>Device Tag (1-2 letters, must be different on each phone — e.g. A, B, C)
            <input type="text" id="sync-tag" maxlength="2" placeholder="A" value="${esc(cfg?.deviceTag || '')}" required style="max-width:100px;text-transform:uppercase;">
          </label>
          ${!configured ? `
          <label>Is this the first phone setting this up, or joining an existing setup?
            <select id="sync-role">
              <option value="first">First phone — start sharing MY current data</option>
              <option value="join">Joining — another phone already has the shared data (this phone's local data will be replaced)</option>
            </select>
          </label>` : ''}
          <div id="sync-error" class="form-error" style="display:none;"></div>
          <div class="form-actions" style="justify-content:stretch;">
            <button type="button" class="btn btn-ghost" id="sync-test" style="flex:1;">Test Connection</button>
            <button type="submit" class="btn btn-primary" style="flex:2;">${configured ? 'Save & Reconnect' : 'Connect This Phone'}</button>
          </div>
        </form>
        ${configured ? `<button class="btn btn-danger btn-sm btn-block" id="sync-disable" style="margin-top:12px;">Turn Off Sync on This Phone</button>` : ''}
      </div>

      <div class="card">
        <h4 style="margin-bottom:8px;">One-time setup (do this once, on any one phone)</h4>
        <ol style="padding-left:20px;font-size:13px;color:var(--ink-soft);line-height:1.8;">
          <li>Go to <strong>supabase.com</strong> in your browser → Sign up free (no card needed) → "New Project".</li>
          <li>Once it's created, go to <strong>SQL Editor</strong> → paste this and click Run:</li>
        </ol>
        <pre style="background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:11px;overflow-x:auto;white-space:pre-wrap;">create table records (
  id text primary key,
  collection text not null,
  record_id text not null,
  data jsonb,
  updated_at timestamptz not null default now(),
  deleted boolean not null default false
);
alter table records enable row level security;
create policy "allow all" on records for all
  using (true) with check (true);</pre>
        <ol start="3" style="padding-left:20px;font-size:13px;color:var(--ink-soft);line-height:1.8;">
          <li>Go to <strong>Project Settings → API</strong> → copy the <strong>Project URL</strong> and the <strong>anon public</strong> key.</li>
          <li>Paste both into the form above, pick a Device Tag, and tap Connect. Do this on each staff phone (same URL/Key, different tag).</li>
        </ol>
        <p class="text-muted" style="font-size:12px;margin-top:10px;">⚠️ Keep that URL and Key private — anyone who has both can read/write your shop's data. Don't post them publicly.</p>
      </div>
    `;

    const statusBox = document.getElementById('sync-status');
    const renderStatus = (s) => {
      if (!s) { statusBox.innerHTML = ''; return; }
      if (s.state === 'synced') statusBox.innerHTML = `<span class="badge badge-good">Synced — ${formatDateTime(s.at)}</span>`;
      else statusBox.innerHTML = `<span class="badge badge-warn">Waiting for connection${s.pending ? ` (${s.pending} pending)` : ''}</span>`;
    };
    if (configured) { SyncEngine.onStatusChange(renderStatus); renderStatus({ state: 'synced', at: localStorage.getItem('smsync_last_pull') || new Date().toISOString() }); }

    document.getElementById('sync-test').onclick = async () => {
      const url = document.getElementById('sync-url').value.trim();
      const key = document.getElementById('sync-key').value.trim();
      const err = document.getElementById('sync-error');
      err.style.display = 'none';
      if (!url || !key) { err.textContent = 'Enter both the URL and Key first.'; err.style.display = 'block'; return; }
      Toast.show('Testing connection…', 'info');
      const result = await SyncEngine.testConnection(url, key);
      if (result.ok) Toast.show('Connection works!', 'success');
      else { err.textContent = result.error; err.style.display = 'block'; }
    };

    document.getElementById('sync-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('sync-url').value.trim();
      const key = document.getElementById('sync-key').value.trim();
      const tag = document.getElementById('sync-tag').value.trim();
      const roleEl = document.getElementById('sync-role');
      const role = roleEl ? roleEl.value : null;
      const err = document.getElementById('sync-error');
      if (!tag) { err.textContent = 'Pick a device tag (e.g. A).'; err.style.display = 'block'; return; }

      if (role === 'join') {
        const ok = await Modal.confirm(
          "This will ERASE this phone's current local data (products, sales, settings, everything) and replace it with whatever the other phone has already shared. Make sure the other phone has already turned sync on first. Continue?",
          'Replace Local Data & Join'
        );
        if (!ok) return;
        Store.wipeAll();
      }

      const wasConfigured = SyncEngine.isConfigured();
      SyncEngine.configure(url, key, tag);
      Toast.show('Connecting…', 'info');

      if (role === 'first' || (!role && !wasConfigured)) {
        await SyncEngine.pushAllLocalData();
        Toast.show("This phone's existing data has been shared.", 'success');
      } else {
        await SyncEngine.pullChanges();
        Toast.show('Pulled the shared data. Reloading…', 'success');
        setTimeout(() => location.reload(), 800);
        return;
      }
      this.render();
    });

    const disableBtn = document.getElementById('sync-disable');
    if (disableBtn) disableBtn.onclick = async () => {
      if (await Modal.confirm('Turn off sync on this phone? Other phones will keep syncing with each other.', 'Turn Off Sync')) {
        SyncEngine.disable();
        this.render();
      }
    };
  },

          <button class="btn btn-secondary btn-sm" data-export="purchases">Purchases</button>
          <button class="btn btn-secondary btn-sm" data-export="customers">Customers</button>
          <button class="btn btn-secondary btn-sm" data-export="suppliers">Suppliers</button>
          <button class="btn btn-secondary btn-sm" data-export="expenses">Expenses</button>
        </div>
      </div>
    `;
    document.getElementById('backup-now').onclick = () => BackupManager.downloadBackup();
    document.getElementById('restore-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (await Modal.confirm('This will REPLACE all current data with the backup file. Continue?', 'Restore Backup')) {
        try {
          await BackupManager.restoreFromFile(file);
          Toast.show('Backup restored successfully.', 'success');
          App.boot();
        } catch (err) {
          Toast.show('Could not restore: ' + err.message, 'error');
        }
      }
      e.target.value = '';
    });
    el.querySelectorAll('[data-export]').forEach(b => b.onclick = () => BackupManager.exportCollectionCSV(b.dataset.export));
  }
};


/* ===================== backup.js ===================== */
/* =========================================================================
   backup.js — one-click backup/restore of the entire local database, plus
   quick CSV exports of individual collections for use in Excel.
   ========================================================================= */

const BackupManager = {
  downloadBackup() {
    const dump = Store.exportAll();
    const shopName = (Settings.get().shopName || 'shop').replace(/[^a-z0-9]+/gi, '_').toLowerCase();
    const filename = `${shopName}_backup_${todayInputDate()}.json`;
    downloadFile(filename, JSON.stringify(dump, null, 2), 'application/json');
    Toast.show('Backup downloaded.', 'success');
  },

  restoreFromFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Could not read the file.'));
      reader.onload = () => {
        try {
          const dump = JSON.parse(reader.result);
          if (!dump || typeof dump !== 'object') throw new Error('This does not look like a valid backup file.');
          Store.wipeAll();
          Store.importAll(dump);
          resolve();
        } catch (err) {
          reject(new Error(err.message || 'Invalid backup file.'));
        }
      };
      reader.readAsText(file);
    });
  },

  /** Column definitions for each collection's CSV export. */
  _columnDefs: {
    products: [
      { label: 'Name', value: 'name' }, { label: 'Barcode', value: 'barcode' }, { label: 'Category', value: 'category' },
      { label: 'Brand', value: 'brand' }, { label: 'Purchase Price', value: 'purchasePrice' }, { label: 'Selling Price', value: 'sellingPrice' },
      { label: 'GST %', value: 'gstPercent' }, { label: 'Stock', value: 'stock' }, { label: 'Min Stock', value: 'minStock' }, { label: 'Shelf', value: 'shelfLocation' }
    ],
    sales: [
      { label: 'Invoice #', value: 'invoiceNo' }, { label: 'Date', value: r => formatDate(r.date) },
      { label: 'Subtotal', value: 'subtotal' }, { label: 'Discount', value: 'discountTotal' }, { label: 'GST', value: 'gstTotal' },
      { label: 'Total', value: 'grandTotal' }, { label: 'Paid', value: 'amountPaid' }, { label: 'Balance', value: 'balance' }, { label: 'Payment Mode', value: 'paymentMode' }
    ],
    purchases: [
      { label: 'Purchase #', value: 'purchaseNo' }, { label: 'Date', value: r => formatDate(r.date) },
      { label: 'Subtotal', value: 'subtotal' }, { label: 'GST', value: 'gstTotal' }, { label: 'Total', value: 'grandTotal' },
      { label: 'Paid', value: 'amountPaid' }, { label: 'Balance', value: 'balance' }
    ],
    customers: [
      { label: 'Name', value: 'name' }, { label: 'Phone', value: 'phone' }, { label: 'GST Number', value: 'gstNumber' },
      { label: 'Address', value: 'address' }, { label: 'Credit Balance', value: 'creditBalance' }, { label: 'Loyalty Points', value: 'loyaltyPoints' }
    ],
    suppliers: [
      { label: 'Name', value: 'name' }, { label: 'Phone', value: 'phone' }, { label: 'GST Number', value: 'gstNumber' },
      { label: 'Address', value: 'address' }, { label: 'Outstanding Balance', value: 'outstandingBalance' }
    ],
    expenses: [
      { label: 'Date', value: r => formatDate(r.date) }, { label: 'Category', value: 'category' },
      { label: 'Amount', value: 'amount' }, { label: 'Note', value: 'note' }
    ]
  },

  exportCollectionCSV(collectionName) {
    const rows = Store.all(collectionName);
    const columns = this._columnDefs[collectionName];
    if (!columns) return;
    if (rows.length === 0) { Toast.show('Nothing to export yet.', 'error'); return; }
    const csv = toCSV(rows, columns);
    downloadFile(`${collectionName}_${todayInputDate()}.csv`, csv, 'text/csv');
    Toast.show(`${collectionName} exported.`, 'success');
  }
};


/* ===================== scanner.js ===================== */
/* =========================================================================
   scanner.js — camera-based barcode scanning using the device's own
   camera and the browser's built-in BarcodeDetector API. No external
   library, no network call — everything happens on-device.

   Works when the app is served over http://127.0.0.1 (localhost) or
   https — both count as a "secure context", which the camera requires.
   ========================================================================= */

const BarcodeScanner = {
  _stream: null,
  _stopRequested: false,

  isSupported() {
    return ('BarcodeDetector' in window) && !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  },

  /** Opens a camera overlay. Calls onDetected(code) once a barcode is read, and auto-closes.
   *  Uses its own overlay (not the shared Modal) so it can be opened on top of a form
   *  that's already in a modal, without destroying that form underneath it. */
  async open(onDetected, { title = 'Scan Barcode' } = {}) {
    if (!this.isSupported()) {
      Toast.show("Camera scanning isn't supported in this browser. You can type the barcode instead.", 'error');
      return;
    }

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'scanner-overlay';
    overlay.style.zIndex = '200'; // above any regular modal
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-header"><h3>${esc(title)}</h3><button class="modal-close" id="scanner-close-x">&times;</button></div>
        <div class="modal-body">
          <div style="position:relative;background:#000;border-radius:10px;overflow:hidden;">
            <video id="scanner-video" playsinline autoplay muted style="width:100%;display:block;max-height:360px;object-fit:cover;"></video>
            <div style="position:absolute;inset:0;border:3px solid rgba(255,255,255,.5);margin:20%;border-radius:8px;pointer-events:none;"></div>
          </div>
          <p class="text-muted" style="text-align:center;margin-top:10px;font-size:13px;">Point the camera at the barcode</p>
          <div id="scanner-error" class="form-error" style="display:none;margin-top:10px;"></div>
          <div class="form-actions"><button class="btn btn-ghost btn-block" id="scanner-cancel">Cancel</button></div>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const videoEl = document.getElementById('scanner-video');
    const errorBox = document.getElementById('scanner-error');
    this._stopRequested = false;

    const cleanup = () => {
      this._stopRequested = true;
      if (this._stream) {
        this._stream.getTracks().forEach(t => t.stop());
        this._stream = null;
      }
      overlay.remove();
    };
    document.getElementById('scanner-cancel').onclick = cleanup;
    document.getElementById('scanner-close-x').onclick = cleanup;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(); });

    try {
      this._stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      videoEl.srcObject = this._stream;
      await videoEl.play();
    } catch (err) {
      errorBox.textContent = 'Could not access the camera: ' + (err.message || 'Permission denied.') +
        ' — check that camera permission is allowed for this app in your phone Settings.';
      errorBox.style.display = 'block';
      return;
    }

    const detector = new BarcodeDetector({
      formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'codabar', 'itf', 'qr_code']
    });

    const scanLoop = async () => {
      if (this._stopRequested) return;
      try {
        const results = await detector.detect(videoEl);
        if (results && results.length > 0) {
          const code = results[0].rawValue;
          cleanup();
          onDetected(code);
          return;
        }
      } catch (err) {
        // A single failed frame isn't fatal — keep scanning.
      }
      setTimeout(scanLoop, 300); // ~3 scans/sec is plenty and saves battery
    };
    scanLoop();
  }
};


/* ===================== app.js ===================== */
/* =========================================================================
   app.js — boots the app, renders the sidebar/bottom-nav shell, and routes
   between screens using the URL hash (e.g. #inventory). Loads LAST.
   ========================================================================= */

const NAV_ITEMS = [
  { route: 'dashboard',  label: 'Dashboard',  icon: '◧', adminOnly: false },
  { route: 'sales',      label: 'Billing',    icon: '🧾', adminOnly: false },
  { route: 'inventory',  label: 'Inventory',  icon: '📦', adminOnly: false },
  { route: 'purchases',  label: 'Purchases',  icon: '⇩',  adminOnly: false },
  { route: 'customers',  label: 'Customers',  icon: '☺',  adminOnly: false },
  { route: 'suppliers',  label: 'Suppliers',  icon: '⚙',  adminOnly: false },
  { route: 'expenses',   label: 'Expenses',   icon: '−',  adminOnly: false },
  { route: 'accounting', label: 'Accounting', icon: '≡',  adminOnly: true  },
  { route: 'reports',    label: 'Reports',    icon: '▤',  adminOnly: true  },
  { route: 'employees',  label: 'Employees',  icon: '👥', adminOnly: true  },
  { route: 'settings',   label: 'Settings',   icon: '⚑',  adminOnly: false },
];

const ROUTE_RENDERERS = {
  dashboard:  () => Dashboard.render(),
  sales:      () => Sales.render(),
  inventory:  () => Inventory.render(),
  purchases:  () => Purchases.render(),
  customers:  () => Customers.render(),
  suppliers:  () => Suppliers.render(),
  expenses:   () => Expenses.render(),
  accounting: () => Accounting.render(),
  reports:    () => Reports.render(),
  employees:  () => Employees.render(),
  settings:   () => SettingsPage.render(),
};

const ROUTE_TITLES = Object.fromEntries(NAV_ITEMS.map(n => [n.route, n.label]));

const App = {
  currentRoute: 'dashboard',

  async boot() {
    const setStatus = (msg) => {
      const el = document.getElementById('__boot_status');
      if (el) el.textContent = msg;
    };
    try {
      setStatus('Applying theme…');
      this.applyTheme();
      setStatus('Checking sync config…');
      if (SyncEngine.isConfigured()) {
        setStatus('Pulling sync changes…');
        await SyncEngine.pullChanges(); // get any existing shared data first
        setStatus('Starting sync engine…');
        SyncEngine.start();
      }
      setStatus('Seeding database…');
      await seedDatabaseIfEmpty(); // only creates defaults if still empty after a pull
      setStatus('Re-applying theme…');
      this.applyTheme(); // re-apply in case theme came in from the pull
      setStatus('Checking login…');
      if (Auth.isLoggedIn()) this.start();
      else Auth.renderLogin();
    } catch (err) {
      console.error(err);
      if (typeof showStartupError === 'function') {
        showStartupError(err.message || 'Startup failed', err.stack || String(err));
      }
    }
  },

  /** Called after a successful login. Renders the full app shell. */
  start() {
    const root = document.getElementById('app-root');
    const user = Auth.currentUser();
    const hidden = Settings.get().hiddenNavRoutes || [];
    const visibleItems = NAV_ITEMS.filter(i => !i.adminOnly || user.role === 'admin')
      .filter(i => i.route === 'dashboard' || i.route === 'settings' || !hidden.includes(i.route));

    root.innerHTML = `
      <div class="app-shell">
        <div class="drawer-backdrop no-print" id="drawer-backdrop"></div>
        <nav class="drawer-panel no-print" id="drawer-panel">
          ${this.renderBrand()}
          <div class="nav-group" id="drawer-nav"></div>
          ${this.renderSidebarFooter(user)}
        </nav>

        <aside class="sidebar no-print">
          ${this.renderBrand()}
          <div class="nav-group" id="sidebar-nav"></div>
          ${this.renderSidebarFooter(user)}
        </aside>

        <div class="main-col">
          <header class="mobile-topbar no-print">
            <button class="icon-btn" id="drawer-open" aria-label="Menu">☰</button>
            <div class="brand"><div class="brand-mark">✎</div></div>
            <button class="icon-btn" id="theme-toggle-mobile" aria-label="Toggle theme">◐</button>
          </header>

          <header class="topbar no-print">
            <h2 id="page-title">Dashboard</h2>
            <div class="topbar-actions">
              <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle dark / light mode">◐</button>
              <button class="icon-btn" id="logout-btn" aria-label="Log out" title="Log out">⏻</button>
            </div>
          </header>

          <main class="content" id="content"></main>

          <nav class="bottom-nav no-print" id="bottom-nav"></nav>
        </div>
      </div>`;

    this.renderNavInto('sidebar-nav', visibleItems);
    this.renderNavInto('drawer-nav', visibleItems);
    this.renderBottomNav(visibleItems.slice(0, 5));

    document.getElementById('theme-toggle').onclick = () => this.toggleTheme();
    document.getElementById('theme-toggle-mobile').onclick = () => this.toggleTheme();
    document.getElementById('logout-btn').onclick = async () => {
      if (await Modal.confirm('Log out of Stationery Manager?', 'Log Out')) Auth.logout();
    };
    document.getElementById('drawer-open').onclick = () => this.toggleDrawer(true);
    document.getElementById('drawer-backdrop').onclick = () => this.toggleDrawer(false);

    window.onhashchange = () => this.route();
    this.route();
  },

  renderBrand() {
    const shopName = (Settings.get().shopName) || 'Stationery Manager';
    return `
      <div class="brand">
        <div class="brand-mark">✎</div>
        <div>
          <div class="brand-name">${esc(shopName)}</div>
          <div class="brand-sub">Business Manager</div>
        </div>
      </div>`;
  },

  renderSidebarFooter(user) {
    const initials = (user.name || user.username).slice(0, 1).toUpperCase();
    return `
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar">${esc(initials)}</div>
          <div>
            <div style="font-weight:700;">${esc(user.name || user.username)}</div>
            <div class="text-muted" style="font-size:11px;text-transform:capitalize;">${esc(user.role)}</div>
          </div>
        </div>
      </div>`;
  },

  renderNavInto(containerId, items) {
    const el = document.getElementById(containerId);
    el.innerHTML = items.map(i => `
      <a class="nav-link" data-route="${i.route}" href="#${i.route}">
        <span class="nav-icon">${i.icon}</span> ${esc(i.label)}
      </a>`).join('');
    el.querySelectorAll('.nav-link').forEach(a => a.addEventListener('click', () => this.toggleDrawer(false)));
  },

  renderBottomNav(items) {
    const el = document.getElementById('bottom-nav');
    el.innerHTML = items.map(i => `
      <a class="nav-link" data-route="${i.route}" href="#${i.route}">
        <span class="nav-icon">${i.icon}</span> ${esc(i.label)}
      </a>`).join('');
  },

  toggleDrawer(open) {
    document.getElementById('drawer-panel').classList.toggle('open', open);
    document.getElementById('drawer-backdrop').classList.toggle('open', open);
  },

  /** Hash-based router: reads location.hash, renders the matching module. */
  route() {
    const hash = (location.hash || '#dashboard').replace('#', '');
    const route = ROUTE_RENDERERS[hash] ? hash : 'dashboard';
    this.currentRoute = route;

    document.querySelectorAll('.nav-link').forEach(a => {
      a.classList.toggle('active', a.dataset.route === route);
    });
    const titleEl = document.getElementById('page-title');
    if (titleEl) titleEl.textContent = ROUTE_TITLES[route];

    const content = document.getElementById('content');
    content.innerHTML = '';
    content.scrollTop = 0;
    ROUTE_RENDERERS[route]();
  },

  /** Re-render whatever screen is currently open (used after data changes). */
  refresh() { ROUTE_RENDERERS[this.currentRoute](); },

  navigate(route) { location.hash = '#' + route; },

  applyTheme() {
    const theme = Settings.get().theme || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  },

  toggleTheme() {
    const current = Settings.get().theme || 'light';
    const next = current === 'light' ? 'dark' : 'light';
    Settings.update({ theme: next });
    document.documentElement.setAttribute('data-theme', next);
  }
};

document.addEventListener('DOMContentLoaded', () => App.boot());

  </script>
</body>
