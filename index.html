<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Stationery Manager</title>
<meta name="theme-color" content="#A6303D">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* =========================================================================
   style.css
   Design language: a working shop ledger, not a generic SaaS dashboard.
   Paper cream surfaces, deep ink-navy text, a sealing-wax red for primary
   actions, and a pencil-yellow for highlights/warnings. Numbers are set in
   a monospace face, like columns in an account book. Cards carry a subtle
   perforated top edge, like a receipt torn from a pad.
   ========================================================================= */

:root {
  /* ---- Light theme (default) ---- */
  --paper: #FAF7F0;
  --paper-raised: #FFFFFF;
  --ink: #23293B;
  --ink-soft: #4B5163;
  --muted: #7B8093;
  --line: #E4DFD2;
  --accent: #A6303D;         /* sealing-wax red */
  --accent-ink: #ffffff;
  --accent-soft: #F3DCDF;
  --gold: #C98A2B;           /* pencil-brass yellow */
  --gold-soft: #F6E7C9;
  --good: #2E7D4F;
  --good-soft: #DCEFE2;
  --bad: #B3261E;
  --bad-soft: #FBE2E0;
  --shadow: 0 1px 2px rgba(35,41,59,.06), 0 6px 20px rgba(35,41,59,.06);
  --radius: 10px;
  --font-display: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

[data-theme="dark"] {
  --paper: #171A22;
  --paper-raised: #1F232E;
  --ink: #EFEBE1;
  --ink-soft: #C7C2B4;
  --muted: #8A8F9E;
  --line: #2E3341;
  --accent: #E0616D;
  --accent-ink: #1B1113;
  --accent-soft: #3A2229;
  --gold: #E8B95C;
  --gold-soft: #3A311E;
  --good: #4FAE79;
  --good-soft: #1C2E24;
  --bad: #E37469;
  --bad-soft: #3A2220;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 24px rgba(0,0,0,.35);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 700; margin: 0 0 4px; color: var(--ink); }
p { margin: 0 0 8px; }
a { color: var(--accent); }
.mono { font-family: var(--font-mono); }
::selection { background: var(--accent-soft); }

button { font-family: inherit; }
input, select, textarea {
  font-family: inherit; font-size: 14px; color: var(--ink);
  background: var(--paper-raised); border: 1px solid var(--line);
  border-radius: 8px; padding: 9px 11px; width: 100%;
}
input:focus, select:focus, textarea:focus, button:focus-visible {
  outline: 2px solid var(--accent); outline-offset: 1px;
}
label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-soft); margin-bottom: 12px; }
label input, label select, label textarea { margin-top: 5px; }

/* ---------------------------- Buttons ---------------------------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 16px; border-radius: 8px; border: 1px solid transparent;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: transform .08s ease, background .15s ease;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }
.btn-primary:hover { filter: brightness(1.08); }
.btn-secondary { background: var(--gold-soft); color: var(--ink); border-color: var(--gold); }
.btn-ghost { background: transparent; color: var(--ink-soft); border-color: var(--line); }
.btn-ghost:hover { background: var(--paper-raised); }
.btn-danger { background: var(--bad); color: #fff; }
.btn-sm { padding: 6px 11px; font-size: 13px; }
.btn-icon { padding: 8px; }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ---------------------------- App shell / layout ---------------------------- */
#app-root { min-height: 100vh; }
.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 224px; flex-shrink: 0; background: var(--paper-raised);
  border-right: 1px solid var(--line); display: flex; flex-direction: column;
  padding: 18px 12px; position: sticky; top: 0; height: 100vh;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 18px; }
.brand-mark {
  width: 36px; height: 36px; border-radius: 8px; background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 20px;
}
.brand-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; line-height: 1.15; }
.brand-sub { font-size: 11px; color: var(--muted); }

.nav-group { margin-bottom: 4px; }
.nav-link {
  display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 8px;
  color: var(--ink-soft); text-decoration: none; font-size: 13.5px; font-weight: 600; cursor: pointer;
  margin-bottom: 2px;
}
.nav-link:hover { background: var(--paper); }
.nav-link.active { background: var(--accent-soft); color: var(--accent); }
.nav-icon { width: 18px; text-align: center; }

.sidebar-footer { margin-top: auto; border-top: 1px solid var(--line); padding-top: 10px; }
.user-chip { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; font-size: 13px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%; background: var(--gold-soft); color: var(--ink);
  display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;
}

.main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 22px; border-bottom: 1px solid var(--line); background: var(--paper);
  position: sticky; top: 0; z-index: 5;
}
.topbar h2 { font-size: 19px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--line); background: var(--paper-raised);
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-soft);
}
.icon-btn:hover { background: var(--paper); }

.content { padding: 20px 22px 90px; flex: 1; }

.mobile-topbar { display: none; }
.bottom-nav { display: none; }

/* ---------------------------- Cards / ledger paper ---------------------------- */
.card {
  background: var(--paper-raised); border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 16px 18px; position: relative;
}
.card-perf::before {
  content: ""; position: absolute; top: -1px; left: 14px; right: 14px; height: 1px;
  background-image: radial-gradient(circle, var(--paper) 1.4px, transparent 1.6px);
  background-size: 10px 4px; background-repeat: repeat-x;
}
.grid { display: grid; gap: 14px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1000px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 620px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

.stat-card { display: flex; flex-direction: column; gap: 6px; }
.stat-label { font-size: 12.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
.stat-value { font-family: var(--font-mono); font-size: 24px; font-weight: 700; }
.stat-sub { font-size: 12px; color: var(--muted); }
.stat-value.good { color: var(--good); }
.stat-value.bad { color: var(--bad); }

.section-title { display: flex; align-items: center; justify-content: space-between; margin: 26px 0 12px; }
.section-title h3 { font-size: 16px; }

/* ---------------------------- Tables ---------------------------- */
.table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper-raised); }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 560px; }
thead th {
  text-align: left; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
  padding: 10px 12px; border-bottom: 1px solid var(--line); background: var(--paper); white-space: nowrap;
}
tbody td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--paper); }
td.num, th.num { text-align: right; font-family: var(--font-mono); }
.row-thumb { width: 34px; height: 34px; border-radius: 6px; object-fit: cover; background: var(--paper); border: 1px solid var(--line); }

.badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11.5px; font-weight: 700; }
.badge-good { background: var(--good-soft); color: var(--good); }
.badge-bad { background: var(--bad-soft); color: var(--bad); }
.badge-warn { background: var(--gold-soft); color: var(--gold); }
.badge-muted { background: var(--line); color: var(--ink-soft); }

/* ---------------------------- Toolbar / search ---------------------------- */
.toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
.toolbar .search-box { flex: 1; min-width: 180px; position: relative; }
.toolbar .search-box input { padding-left: 32px; }
.toolbar .search-box::before { content: "⌕"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
.toolbar select { width: auto; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-state .empty-mark { font-size: 34px; margin-bottom: 8px; }

/* ---------------------------- Forms / modals ---------------------------- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(23,26,34,.55); display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 16px; animation: fadeIn .15s ease;
}
.modal-box {
  background: var(--paper-raised); border-radius: 14px; width: 100%; max-width: 460px; max-height: 88vh;
  overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); animation: popIn .16s ease;
}
.modal-wide { max-width: 760px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--paper-raised); }
.modal-header h3 { font-size: 17px; }
.modal-close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1; padding: 4px; }
.modal-body { padding: 18px 20px 22px; }
body.modal-open { overflow: hidden; }
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
.form-error { background: var(--bad-soft); color: var(--bad); padding: 9px 11px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
.field-hint { font-size: 11.5px; color: var(--muted); font-weight: 400; margin-top: 4px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }

/* ---------------------------- Login screen ---------------------------- */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  background: radial-gradient(circle at 20% 15%, var(--accent-soft), transparent 45%), var(--paper); }
.login-card { width: 100%; max-width: 380px; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 16px;
  box-shadow: var(--shadow); padding: 32px 28px; }
.login-brand { text-align: center; margin-bottom: 22px; }
.login-mark { width: 52px; height: 52px; margin: 0 auto 12px; border-radius: 12px; background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 26px; }
.login-brand h1 { font-size: 20px; }
.login-sub { color: var(--muted); font-size: 13px; }
.login-hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 16px; }

/* ---------------------------- Invoice / receipt look ---------------------------- */
.receipt {
  background: var(--paper-raised); border: 1px dashed var(--line); border-radius: 4px; padding: 18px;
  font-family: var(--font-mono); font-size: 12.5px; max-width: 340px; margin: 0 auto;
}
.receipt h4 { font-family: var(--font-display); text-align: center; font-size: 16px; }
.receipt .r-line { display: flex; justify-content: space-between; }
.receipt hr { border: none; border-top: 1px dashed var(--line); margin: 8px 0; }
.receipt .r-total { font-weight: 700; font-size: 14px; }

/* ---------------------------- Utility ---------------------------- */
.flex { display: flex; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.text-muted { color: var(--muted); }
.text-good { color: var(--good); } .text-bad { color: var(--bad); }
.mt-0 { margin-top: 0; } .mb-0 { margin-bottom: 0; }
.hidden { display: none !important; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--paper); border: 1px solid var(--line); border-radius: 99px; padding: 4px 10px; font-size: 12px; }

/* ---------------------------- Responsive: sidebar -> bottom nav ---------------------------- */
@media (max-width: 880px) {
  .sidebar { display: none; }
  .mobile-topbar {
    display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
    border-bottom: 1px solid var(--line); background: var(--paper-raised); position: sticky; top: 0; z-index: 6;
  }
  .mobile-topbar .brand { padding: 0; }
  .content { padding: 16px 14px 90px; }
  .topbar { display: none; }
  .bottom-nav {
    display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper-raised);
    border-top: 1px solid var(--line); z-index: 20; padding: 4px 2px calc(4px + env(safe-area-inset-bottom));
    overflow-x: auto;
  }
  .bottom-nav .nav-link {
    flex-direction: column; flex: 1; text-align: center; font-size: 10.5px; gap: 3px; padding: 7px 2px;
    border-radius: 0; min-width: 58px;
  }
  .bottom-nav .nav-icon { font-size: 17px; }
  .bottom-nav .nav-link.active { background: transparent; }
  .drawer-panel { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background: var(--paper-raised);
    z-index: 50; box-shadow: 0 0 30px rgba(0,0,0,.25); transform: translateX(-100%); transition: transform .2s ease; padding: 16px 12px; overflow-y: auto; }
  .drawer-panel.open { transform: translateX(0); }
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 45; display: none; }
  .drawer-backdrop.open { display: block; }
}

/* Print styles: used for invoice printing. Only #print-area is shown. */
@media print {
  body * { visibility: hidden; }
  #print-area, #print-area *, #print-target, #print-target * { visibility: visible; }
  #print-area, #print-target { position: absolute; top: 0; left: 0; width: 100%; padding: 0; margin: 0; }
  .receipt { border: none; max-width: 100%; }
  body { background: #fff; }
}

/* ---------------------------- Billing screen ---------------------------- */
.bill-layout { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
@media (max-width: 980px) { .bill-layout { grid-template-columns: 1fr; } }
.cart-table td, .cart-table th { padding: 8px 10px; }
.cart-qty-input { width: 56px; padding: 6px; text-align: center; }
.cart-disc-input { width: 64px; padding: 6px; text-align: center; }
.bill-summary-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13.5px; }
.bill-summary-row.total { font-size: 17px; font-weight: 700; border-top: 1px solid var(--line); margin-top: 8px; padding-top: 10px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--line); }
.tab-btn { padding: 9px 14px; background: none; border: none; cursor: pointer; font-weight: 600; color: var(--muted); font-size: 13.5px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.product-pick-list { max-height: 260px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; margin-top: 8px; }
.product-pick-item { display: flex; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 13.5px; }
.product-pick-item:last-child { border-bottom: none; }
.product-pick-item:hover { background: var(--paper); }
.product-pick-item .ppi-stock { font-size: 11.5px; color: var(--muted); }

</style>
</head>

  <script>
    // TEMPORARY DEBUG OVERLAY — shows JS errors directly on screen since there's
    // no PC to check the browser console from. Safe to remove once things work.
    (function () {
      function showError(msg) {
        let box = document.getElementById('__debug_overlay');
        if (!box) {
          box = document.createElement('div');
          box.id = '__debug_overlay';
          box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;' +
            'background:#c62828;color:#fff;font:12px monospace;padding:10px;' +
            'max-height:40vh;overflow:auto;white-space:pre-wrap;';
          document.body.appendChild(box);
        }
        const line = document.createElement('div');
        line.style.marginBottom = '8px';
        line.style.borderBottom = '1px solid rgba(255,255,255,.3)';
        line.textContent = msg;
        box.appendChild(line);
      }
      window.addEventListener('error', (e) => {
        showError('ERROR: ' + e.message + '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno);
      });
      window.addEventListener('unhandledrejection', (e) => {
        showError('UNHANDLED PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });
    })();
  </script>

  <div id="app-root">
    <div style="font-family:sans-serif;max-width:480px;margin:60px auto;padding:20px;text-align:center;color:#555;">
      Loading Stationery Manager…
    </div>
  </div>

  <div id="toast-container" class="no-print"></div>

  <script>
    function showStartupError(title, detail) {
      var root = document.getElementById('app-root');
      if (!root) return;
      root.innerHTML =
        '<div style="font-family:sans-serif;max-width:520px;margin:40px auto;padding:20px;border:2px solid #B3261E;border-radius:10px;background:#FBE2E0;color:#23293B;">' +
        '<h2 style="margin-top:0;color:#B3261E;">Something went wrong while starting the app</h2>' +
        '<p><strong>' + title + '</strong></p>' +
        '<pre style="white-space:pre-wrap;word-break:break-word;background:#fff;padding:10px;border-radius:6px;font-size:12px;">' + detail + '</pre>' +
        '<p style="font-size:13px;">Please screenshot this whole box and share it — it tells us exactly what to fix.</p>' +
        '</div>';
    }
    window.addEventListener('error', function (e) {
      showStartupError(e.message || 'Script error', (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack ? e.error.stack : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      showStartupError('Unhandled error (promise)', (e.reason && e.reason.stack) ? e.reason.stack : String(e.reason));
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (err) { console.warn('SW registration failed', err); });
      });
    }
  </script>

  <script>

/* ===================== store.js ===================== */
/* =========================================================================
   store.js
   Our entire "database". Since this app runs as a local file with no
   server, we use localStorage as durable on-device storage. Everything is
   organised into named "collections" (arrays of plain objects), just like
   tables in a real database, with an ID field on every record.

   IMPORTANT: All money values are stored as plain numbers (rupees, not
   paise) for simplicity, matching how the shop owner thinks about prices.
   ========================================================================= */

const STORAGE_PREFIX = 'sm_'; // sm = Stationery Manager
const SCHEMA_VERSION = 1;

const Store = (() => {

  /** Read a whole collection from localStorage. Returns [] if empty. */
  function _read(collection) {
    try {
      const raw = localStorage.getItem(STORAGE_PREFIX + collection);
      return raw ? JSON.parse(raw) : [];
    } catch (err) {
      console.error(`Store: failed to read ${collection}`, err);
      return [];
    }
  }

  /** Write a whole collection back to localStorage. */
  function _write(collection, arr) {
    try {
      localStorage.setItem(STORAGE_PREFIX + collection, JSON.stringify(arr));
      return true;
    } catch (err) {
      console.error(`Store: failed to write ${collection}`, err);
      if (err && err.name === 'QuotaExceededError') {
        Toast.show('Storage is full. Please export & clear old data (Settings → Backup).', 'error');
      }
      return false;
    }
  }

  /** Generate a reasonably unique ID without needing any external library. */
  function generateId() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
  }

  return {
    /** Get every record in a collection. */
    all(collection) {
      return _read(collection);
    },

    /** Get a single record by id, or null. */
    get(collection, id) {
      return _read(collection).find(r => r.id === id) || null;
    },

    /** Insert a new record. Auto-fills id/createdAt/updatedAt. Returns the saved record. */
    insert(collection, record, { quiet = false } = {}) {
      const arr = _read(collection);
      const now = new Date().toISOString();
      const toSave = Object.assign({}, record, {
        id: record.id || generateId(),
        createdAt: record.createdAt || now,
        updatedAt: record.updatedAt || now
      });
      arr.push(toSave);
      _write(collection, arr);
      if (!quiet && window.SyncEngine) SyncEngine.notifyChange(collection, toSave, false);
      return toSave;
    },

    /** Update fields on an existing record by id. Returns the updated record or null. */
    update(collection, id, patch, { quiet = false } = {}) {
      const arr = _read(collection);
      const idx = arr.findIndex(r => r.id === id);
      if (idx === -1) return null;
      arr[idx] = Object.assign({}, arr[idx], patch, { updatedAt: patch.updatedAt || new Date().toISOString() });
      _write(collection, arr);
      if (!quiet && window.SyncEngine) SyncEngine.notifyChange(collection, arr[idx], false);
      return arr[idx];
    },

    /** Remove a record by id. Returns true if something was removed. */
    remove(collection, id, { quiet = false } = {}) {
      const arr = _read(collection);
      const removed = arr.find(r => r.id === id);
      const next = arr.filter(r => r.id !== id);
      const changed = next.length !== arr.length;
      if (changed) _write(collection, next);
      if (changed && !quiet && window.SyncEngine) SyncEngine.notifyChange(collection, removed || { id }, true);
      return changed;
    },

    /** Replace an entire collection at once (used by restore/import). */
    replaceAll(collection, arr) {
      _write(collection, Array.isArray(arr) ? arr : []);
    },

    generateId,

    /** Dump every collection as one object, for backup export. */
    exportAll() {
      const collections = [
        'users', 'products', 'sales', 'purchases', 'customers',
        'suppliers', 'expenses', 'employees', 'attendance', 'settings',
        'cashbook'
      ];
      const dump = { _schemaVersion: SCHEMA_VERSION, _exportedAt: new Date().toISOString() };
      collections.forEach(c => { dump[c] = _read(c); });
      return dump;
    },

    /** Restore every collection from a previously exported dump. */
    importAll(dump) {
      if (!dump || typeof dump !== 'object') throw new Error('Invalid backup file.');
      Object.keys(dump).forEach(key => {
        if (key.startsWith('_')) return;
        _write(key, Array.isArray(dump[key]) ? dump[key] : []);
      });
    },

    /** Wipe every collection (used before a restore, or factory reset). */
    wipeAll() {
      Object.keys(localStorage)
        .filter(k => k.startsWith(STORAGE_PREFIX))
        .forEach(k => localStorage.removeItem(k));
    }
  };
})();

/* ===================== sync.js ===================== */
/* =========================================================================
   sync.js — optional online sync across devices, using Supabase (a free,
   open-source alternative to Firebase) as a thin shared "mailbox" for
   changes. The app still works fully offline; this only kicks in when a
   connection is available, and never blocks anything the person is doing.

   HOW IT WORKS (deliberately simple, so it's debuggable by a human):
   - Every collection (products, sales, customers, ...) is unchanged —
     still plain localStorage via store.js.
   - When something changes locally, we also drop a copy into ONE shared
     Supabase table called "records" (id, collection, record_id, data,
     updated_at, deleted).
   - Every few seconds, each device asks Supabase "anything newer than
     what I've already seen?" and applies those changes locally.
   - Conflicts are resolved by "last write wins" using each record's
     updatedAt timestamp — good enough for a small shop, not a bank.
   ========================================================================= */

const SyncEngine = (() => {
  const CONFIG_KEY = 'smsync_config';       // { url, anonKey, deviceTag }
  const LAST_SYNC_KEY = 'smsync_last_pull';  // ISO timestamp
  const QUEUE_KEY = 'smsync_queue';          // pending pushes that failed and need retry
  const SYNC_INTERVAL_MS = 8000;

  let _applyingRemote = false; // guards against re-pushing changes we just pulled
  let _timer = null;
  let _statusListeners = [];

  function getConfig() {
    try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || null; } catch { return null; }
  }
  function isConfigured() {
    const c = getConfig();
    return !!(c && c.url && c.anonKey);
  }

  function _headers() {
    const c = getConfig();
    return {
      'apikey': c.anonKey,
      'Authorization': 'Bearer ' + c.anonKey,
      'Content-Type': 'application/json'
    };
  }

  function _getQueue() {
    try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; } catch { return []; }
  }
  function _setQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }

  function _emitStatus(status) { _statusListeners.forEach(fn => { try { fn(status); } catch {} }); }

  return {
    isConfigured,
    getConfig,

    onStatusChange(fn) { _statusListeners.push(fn); },

    /** Save Supabase project details and this device's short tag (used in invoice numbers). */
    configure(url, anonKey, deviceTag) {
      localStorage.setItem(CONFIG_KEY, JSON.stringify({
        url: url.replace(/\/+$/, ''),
        anonKey,
        deviceTag: (deviceTag || 'A').toUpperCase().slice(0, 2)
      }));
      this.start();
    },

    disable() {
      localStorage.removeItem(CONFIG_KEY);
      if (_timer) clearInterval(_timer);
      _timer = null;
    },

    getDeviceTag() {
      const c = getConfig();
      return (c && c.deviceTag) || 'A';
    },

    /** Quick check that the URL/key actually work, used by the Settings screen. */
    async testConnection(url, anonKey) {
      try {
        const res = await fetch(`${url.replace(/\/+$/, '')}/rest/v1/records?select=id&limit=1`, {
          headers: { apikey: anonKey, Authorization: 'Bearer ' + anonKey }
        });
        if (res.ok) return { ok: true };
        const text = await res.text();
        return { ok: false, error: `Server responded with ${res.status}: ${text.slice(0, 200)}` };
      } catch (err) {
        return { ok: false, error: err.message || 'Could not reach the server.' };
      }
    },

    /** Called by store.js whenever something changes locally. Fire-and-forget. */
    notifyChange(collection, record, deleted) {
      if (!isConfigured() || _applyingRemote) return;
      const row = {
        id: `${collection}:${record.id}`,
        collection,
        record_id: record.id,
        data: deleted ? null : record,
        updated_at: record.updatedAt || new Date().toISOString(),
        deleted: !!deleted
      };
      this._pushRow(row);
    },

    async _pushRow(row) {
      try {
        const c = getConfig();
        const res = await fetch(`${c.url}/rest/v1/records`, {
          method: 'POST',
          headers: { ..._headers(), 'Prefer': 'resolution=merge-duplicates,return=minimal' },
          body: JSON.stringify([row])
        });
        if (!res.ok) throw new Error('push failed: ' + res.status);
        _emitStatus({ state: 'synced', at: new Date().toISOString() });
      } catch (err) {
        // Offline or server unreachable — queue it and retry on the next tick.
        const q = _getQueue();
        q.push(row);
        _setQueue(q);
        _emitStatus({ state: 'offline', pending: q.length });
      }
    },

    async _flushQueue() {
      const q = _getQueue();
      if (q.length === 0) return;
      const remaining = [];
      for (const row of q) {
        try {
          const c = getConfig();
          const res = await fetch(`${c.url}/rest/v1/records`, {
            method: 'POST',
            headers: { ..._headers(), 'Prefer': 'resolution=merge-duplicates,return=minimal' },
            body: JSON.stringify([row])
          });
          if (!res.ok) remaining.push(row);
        } catch { remaining.push(row); }
      }
      _setQueue(remaining);
      _emitStatus(remaining.length ? { state: 'offline', pending: remaining.length } : { state: 'synced', at: new Date().toISOString() });
    },

    async pullChanges() {
      if (!isConfigured()) return;
      const c = getConfig();
      const since = localStorage.getItem(LAST_SYNC_KEY) || '1970-01-01T00:00:00.000Z';
      try {
        const url = `${c.url}/rest/v1/records?updated_at=gt.${encodeURIComponent(since)}&order=updated_at.asc&limit=500`;
        const res = await fetch(url, { headers: _headers() });
        if (!res.ok) throw new Error('pull failed: ' + res.status);
        const rows = await res.json();
        if (rows.length === 0) { _emitStatus({ state: 'synced', at: new Date().toISOString() }); return; }

        _applyingRemote = true;
        let changed = false;
        let maxSeen = since;
        rows.forEach(row => {
          if (row.updated_at > maxSeen) maxSeen = row.updated_at;
          const local = Store.get(row.collection, row.record_id);
          const remoteIsNewer = !local || new Date(row.updated_at) >= new Date(local.updatedAt || 0);
          if (!remoteIsNewer) return;
          changed = true;
          if (row.deleted) {
            Store.remove(row.collection, row.record_id, { quiet: true });
          } else if (local) {
            Store.update(row.collection, row.record_id, row.data, { quiet: true });
          } else {
            Store.insert(row.collection, row.data, { quiet: true });
          }
        });
        _applyingRemote = false;
        localStorage.setItem(LAST_SYNC_KEY, maxSeen);
        _emitStatus({ state: 'synced', at: new Date().toISOString() });
        if (changed && window.App && typeof App.refresh === 'function') App.refresh();
      } catch (err) {
        _applyingRemote = false;
        _emitStatus({ state: 'offline', error: err.message });
      }
    },

    /** Push every local record once — used the first time sync is turned on,
     *  so this device's existing data reaches the shared table too. */
    async pushAllLocalData() {
      if (!isConfigured()) return;
      const collections = ['users', 'products', 'sales', 'purchases', 'customers', 'suppliers', 'expenses', 'employees', 'attendance', 'settings'];
      for (const collection of collections) {
        for (const record of Store.all(collection)) {
          await this._pushRow({
            id: `${collection}:${record.id}`,
            collection,
            record_id: record.id,
            data: record,
            updated_at: record.updatedAt || new Date().toISOString(),
            deleted: false
          });
        }
      }
    },

    start() {
      if (_timer) clearInterval(_timer);
      if (!isConfigured()) return;
      const tick = () => { this._flushQueue(); this.pullChanges(); };
      tick();
      _timer = setInterval(tick, SYNC_INTERVAL_MS);
      window.addEventListener('online', tick);
    }
  };
})();


/* ===================== utils.js ===================== */
/* =========================================================================
   utils.js — small helpers shared by every screen.
   ========================================================================= */

/** Format a number as Indian Rupees, e.g. 125000 -> "₹1,25,000.00" */
function formatMoney(num) {
  const n = Number(num) || 0;
  const symbol = (Settings.get().currencySymbol) || '₹';
  return symbol + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/** Format an ISO date string as "2 Jul 2026" */
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

/** Format an ISO date string as "2 Jul 2026, 4:30 PM" */
function formatDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) +
    ', ' + d.toLocaleTimeString('en-IN', { hour: 'numeric', minute: '2-digit' });
}

/** Return YYYY-MM-DD for <input type="date"> fields, defaulting to today. */
function todayInputDate() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

/** Given a subtotal and a GST %, return { gstAmount, total } */
function calcGST(subtotal, gstPercent) {
  const gstAmount = round2(subtotal * (Number(gstPercent) || 0) / 100);
  return { gstAmount, total: round2(subtotal + gstAmount) };
}

/** Round to 2 decimal places safely. */
function round2(n) {
  return Math.round((Number(n) + Number.EPSILON) * 100) / 100;
}

/** Start-of-day / end-of-day boundaries, used for date-range reports. */
function startOfDay(date = new Date()) {
  const d = new Date(date); d.setHours(0, 0, 0, 0); return d;
}
function endOfDay(date = new Date()) {
  const d = new Date(date); d.setHours(23, 59, 59, 999); return d;
}
function startOfWeek(date = new Date()) {
  const d = startOfDay(date);
  const day = d.getDay(); // 0 = Sunday
  d.setDate(d.getDate() - day);
  return d;
}
function startOfMonth(date = new Date()) {
  const d = startOfDay(date);
  d.setDate(1);
  return d;
}
function startOfYear(date = new Date()) {
  const d = startOfDay(date);
  d.setMonth(0, 1);
  return d;
}

/** True if an ISO date string falls within [from, to] inclusive. */
function isWithin(iso, from, to) {
  const t = new Date(iso).getTime();
  return t >= from.getTime() && t <= to.getTime();
}

/** Auto-generate the next invoice number. Uses a LOCAL, per-device counter (not synced)
 *  plus a short device tag, e.g. INV-A-0001 — this guarantees two different phones can
 *  never produce the same invoice number, even if they haven't synced with each other yet. */
function nextInvoiceNumber() {
  const s = Settings.get();
  const tag = (window.SyncEngine && SyncEngine.isConfigured()) ? SyncEngine.getDeviceTag() : null;
  const key = 'sm_local_invoice_counter';
  const n = Number(localStorage.getItem(key) || '1');
  localStorage.setItem(key, String(n + 1));
  const prefix = s.invoicePrefix || 'INV';
  return tag ? `${prefix}-${tag}-${String(n).padStart(4, '0')}` : `${prefix}-${String(n).padStart(4, '0')}`;
}

/** Auto-generate the next purchase number. Same per-device approach as invoices. */
function nextPurchaseNumber() {
  const tag = (window.SyncEngine && SyncEngine.isConfigured()) ? SyncEngine.getDeviceTag() : null;
  const key = 'sm_local_purchase_counter';
  const n = Number(localStorage.getItem(key) || '1');
  localStorage.setItem(key, String(n + 1));
  return tag ? `PUR-${tag}-${String(n).padStart(4, '0')}` : `PUR-${String(n).padStart(4, '0')}`;
}

/** Debounce helper for search inputs so we don't re-render on every keystroke. */
function debounce(fn, delay = 250) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
}

/** Escape text before injecting into innerHTML, to avoid broken markup from user input. */
function esc(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
}

/** Resize + compress an uploaded image file to a small dataURL, so localStorage doesn't fill up. */
function fileToCompressedDataUrl(file, maxDim = 300, quality = 0.72) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve('');
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not read image.'));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
        else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/** Trigger a browser download of a text/blob payload. */
function downloadFile(filename, content, mime = 'text/plain') {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

/** Convert an array of flat objects into a CSV string. */
function toCSV(rows, columns) {
  const header = columns.map(c => `"${c.label.replace(/"/g, '""')}"`).join(',');
  const lines = rows.map(row =>
    columns.map(c => {
      const v = typeof c.value === 'function' ? c.value(row) : row[c.value];
      return `"${String(v ?? '').replace(/"/g, '""')}"`;
    }).join(',')
  );
  return [header, ...lines].join('\r\n');
}


/** Parse CSV text into an array of row objects keyed by the header row.
 *  Handles quoted fields (including commas/quotes inside quotes). */
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  const pushField = () => { row.push(field); field = ''; };
  const pushRow = () => { rows.push(row); row = []; };
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') pushField();
      else if (ch === '\r') { /* skip */ }
      else if (ch === '\n') { pushField(); pushRow(); }
      else field += ch;
    }
  }
  if (field.length || row.length) { pushField(); pushRow(); }
  const nonEmpty = rows.filter(r => r.some(c => c.trim() !== ''));
  if (nonEmpty.length === 0) return [];
  const headers = nonEmpty[0].map(h => h.trim());
  return nonEmpty.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (r[idx] || '').trim(); });
    return obj;
  });
}

/** Find a value in a parsed CSV row by trying several likely header spellings (case-insensitive). */
function pickField(row, candidates) {
  const keys = Object.keys(row);
  for (const cand of candidates) {
    const match = keys.find(k => k.toLowerCase().replace(/[^a-z0-9]/g, '') === cand.toLowerCase().replace(/[^a-z0-9]/g, ''));
    if (match && row[match] !== '') return row[match];
  }
  return '';
}

/* ---------------------------- Toast notifications ---------------------------- */
const Toast = {
  show(message, type = 'info') {
    const container = document.getElementById('toast-container');
    if (!container) return alert(message);
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = message;
    container.appendChild(el);
    requestAnimationFrame(() => el.classList.add('toast-visible'));
    setTimeout(() => {
      el.classList.remove('toast-visible');
      setTimeout(() => el.remove(), 300);
    }, 3200);
  }
};

/* ---------------------------- Modal dialogs ---------------------------- */
const Modal = {
  /** Open a modal with arbitrary HTML content. Returns the content <div> to populate further. */
  open(titleHtml, bodyHtml, { wide = false } = {}) {
    this.close();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'active-modal';
    overlay.innerHTML = `
      <div class="modal-box ${wide ? 'modal-wide' : ''}">
        <div class="modal-header">
          <h3>${titleHtml}</h3>
          <button class="modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
      </div>`;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) Modal.close(); });
    overlay.querySelector('.modal-close').addEventListener('click', () => Modal.close());
    document.body.appendChild(overlay);
    document.body.classList.add('modal-open');
    return overlay.querySelector('.modal-body');
  },
  close() {
    const el = document.getElementById('active-modal');
    if (el) el.remove();
    document.body.classList.remove('modal-open');
  },
  /** Simple yes/no confirmation. Returns a Promise<boolean>. */
  confirm(message, confirmLabel = 'Confirm') {
    return new Promise((resolve) => {
      const body = Modal.open('Please confirm', `
        <p style="margin-bottom:20px;">${esc(message)}</p>
        <div class="form-actions">
          <button class="btn btn-ghost" id="confirm-no">Cancel</button>
          <button class="btn btn-danger" id="confirm-yes">${esc(confirmLabel)}</button>
        </div>`);
      body.querySelector('#confirm-no').onclick = () => { Modal.close(); resolve(false); };
      body.querySelector('#confirm-yes').onclick = () => { Modal.close(); resolve(true); };
    });
  }
};


/* ===================== auth.js ===================== */
/* =========================================================================
   auth.js — login screen, session handling, and role-based access.
   Passwords are hashed with the browser's built-in SHA-256 (Web Crypto),
   so no external library or internet connection is needed.
   ========================================================================= */

/* =========================================================================
   auth.js — login screen, session handling, and role-based access.

   Password hashing: we deliberately do NOT use the browser's built-in
   Web Crypto API (crypto.subtle) here. That API is only available in a
   "secure context", and Chrome does not always treat local file:// pages
   (which is how this app is opened, since it needs no server) as secure —
   causing crypto.subtle to be undefined and the whole app to fail to load
   with a blank screen. Instead we use a small self-contained SHA-256
   implementation below, which works identically everywhere.
   ========================================================================= */

/** Minimal, dependency-free SHA-256 implementation (operates on UTF-8 bytes). */
function pureSha256Hex(message) {
  const bytes = Array.from(new TextEncoder().encode(message));
  const rightRotate = (value, amount) => (value >>> amount) | (value << (32 - amount));
  const maxWord = Math.pow(2, 32);
  let i, j;

  let hash = [];
  let k = [];
  let primeCounter = 0;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (Math.pow(candidate, 0.5) * maxWord) | 0;
      k[primeCounter++] = (Math.pow(candidate, 1 / 3) * maxWord) | 0;
    }
  }

  const msg = bytes.concat([0x80]);
  while (msg.length % 64 - 56) msg.push(0);
  const words = [];
  for (i = 0; i < msg.length; i++) {
    words[i >> 2] = (words[i >> 2] || 0) | (msg[i] << ((3 - (i % 4)) * 8));
  }
  const bitLength = bytes.length * 8;
  words[words.length] = Math.floor(bitLength / maxWord);
  words[words.length] = bitLength;

  for (j = 0; j < words.length; ) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);

    for (i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7]
        + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
        + ((e & hash[5]) ^ ((~e) & hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (
            (w[i - 16]
              + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3))
              + w[i - 7]
              + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0
          ));
      const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
        + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));

      hash = [(temp1 + temp2) | 0].concat(hash);
      hash[4] = (hash[4] + temp1) | 0;
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }

  let result = '';
  for (i = 0; i < 8; i++) {
    for (j = 3; j >= 0; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += (b < 16 ? '0' : '') + b.toString(16);
    }
  }
  return result;
}

const Auth = {
  SESSION_KEY: 'sm_session',

  /** Hash a plain-text password. Kept "async" so existing `await` call sites keep working. */
  async hashPassword(plain) {
    return pureSha256Hex(plain);
  },

  /** The currently logged-in user, or null. */
  currentUser() {
    try {
      const raw = sessionStorage.getItem(this.SESSION_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  },

  isLoggedIn() { return !!this.currentUser(); },
  isAdmin() { const u = this.currentUser(); return !!u && u.role === 'admin'; },

  async login(username, password) {
    const user = Store.all('users').find(u =>
      u.username.toLowerCase() === username.trim().toLowerCase() && u.active !== false);
    if (!user) return { ok: false, error: 'No account with that username.' };
    const hash = await this.hashPassword(password);
    if (hash !== user.passwordHash) return { ok: false, error: 'Incorrect password.' };
    const session = { id: user.id, username: user.username, name: user.name, role: user.role };
    sessionStorage.setItem(this.SESSION_KEY, JSON.stringify(session));
    return { ok: true, user: session, mustChangePassword: !!user.mustChangePassword };
  },

  logout() {
    sessionStorage.removeItem(this.SESSION_KEY);
    App.renderLogin();
  },

  async changePassword(userId, newPassword) {
    const passwordHash = await this.hashPassword(newPassword);
    Store.update('users', userId, { passwordHash, mustChangePassword: false });
  },

  /** Render the full-screen login form into #app-root. */
  renderLogin() {
    const root = document.getElementById('app-root');
    const shopName = (Settings.get().shopName) || 'Stationery Manager';
    root.innerHTML = `
      <div class="login-screen">
        <div class="login-card">
          <div class="login-brand">
            <div class="login-mark">✎</div>
            <h1>${esc(shopName)}</h1>
            <p class="login-sub">Stationery Business Manager</p>
          </div>
          <form id="login-form" class="login-form">
            <label>Username
              <input type="text" id="login-username" autocomplete="username" required autofocus>
            </label>
            <label>Password
              <input type="password" id="login-password" autocomplete="current-password" required>
            </label>
            <div id="login-error" class="form-error" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
          </form>
          <p class="login-hint">First time here? Use <strong>admin</strong> / <strong>admin123</strong>, then change your password in Settings.</p>
        </div>
      </div>`;

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errBox = document.getElementById('login-error');
      const result = await Auth.login(username, password);
      if (!result.ok) {
        errBox.textContent = result.error;
        errBox.style.display = 'block';
        return;
      }
      if (result.mustChangePassword) {
        Auth.promptForcedPasswordChange(result.user.id);
      } else {
        App.start();
      }
    });
  },

  /** Force a password change the first time the default admin logs in. */
  promptForcedPasswordChange(userId) {
    const body = Modal.open('Set a new password', `
      <p style="margin-bottom:16px;color:var(--muted);">For security, please set your own password before continuing.</p>
      <form id="force-pw-form">
        <label>New password
          <input type="password" id="new-pw" minlength="4" required autofocus>
        </label>
        <label>Confirm password
          <input type="password" id="confirm-pw" minlength="4" required>
        </label>
        <div id="pw-error" class="form-error" style="display:none;"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-block">Save & Continue</button>
        </div>
      </form>`);
    document.getElementById('force-pw-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const a = document.getElementById('new-pw').value;
      const b = document.getElementById('confirm-pw').value;
      const err = document.getElementById('pw-error');
      if (a !== b) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
      await Auth.changePassword(userId, a);
      Modal.close();
      Toast.show('Password updated.', 'success');
      App.start();
    });
  }
};
