/* =========================================================================
   dashboard.js — the shop's daily "at a glance" view.
   ========================================================================= */

const Dashboard = {

  render() {
    const content = document.getElementById('content');
    const sales = Store.all('sales').filter(s => s.status !== 'voided');
    const products = Store.all('products');
    const expenses = Store.all('expenses');

    const now = new Date();
    const dayFrom = startOfDay(now), dayTo = endOfDay(now);
    const weekFrom = startOfWeek(now);
    const monthFrom = startOfMonth(now);

    const salesToday = sales.filter(s => isWithin(s.date, dayFrom, dayTo));
    const salesWeek = sales.filter(s => isWithin(s.date, weekFrom, dayTo));
    const salesMonth = sales.filter(s => isWithin(s.date, monthFrom, dayTo));
    const expensesMonth = expenses.filter(e => isWithin(e.date, monthFrom, dayTo));

    const sum = (arr, fn) => arr.reduce((a, x) => a + (Number(fn(x)) || 0), 0);
    const totalToday = sum(salesToday, s => s.grandTotal);
    const totalWeek = sum(salesWeek, s => s.grandTotal);
    const totalMonth = sum(salesMonth, s => s.grandTotal);
    const expenseMonthTotal = sum(expensesMonth, e => e.amount);

    // Profit = (selling - purchase) * qty for every item sold this month, using current product cost.
    const productMap = Object.fromEntries(products.map(p => [p.id, p]));
    let profitMonth = 0;
    salesMonth.forEach(s => (s.items || []).forEach(it => {
      const p = productMap[it.productId];
      const cost = p ? Number(p.purchasePrice) || 0 : 0;
      profitMonth += (Number(it.price) - cost) * Number(it.qty) - (Number(it.discount) || 0);
    }));

    const lowStock = products.filter(p => Number(p.stock) <= Number(p.minStock || 0));

    // Best sellers this month by quantity sold.
    const qtyByProduct = {};
    salesMonth.forEach(s => (s.items || []).forEach(it => {
      qtyByProduct[it.productId] = (qtyByProduct[it.productId] || 0) + Number(it.qty);
    }));
    const bestSellers = Object.entries(qtyByProduct)
      .map(([pid, qty]) => ({ product: productMap[pid], qty }))
      .filter(x => x.product)
      .sort((a, b) => b.qty - a.qty)
      .slice(0, 5);

    // Last 7 days sales trend for the mini bar chart.
    const last7 = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      const total = sum(sales.filter(s => isWithin(s.date, startOfDay(d), endOfDay(d))), s => s.grandTotal);
      last7.push({ label: d.toLocaleDateString('en-IN', { weekday: 'short' }), total });
    }
    const maxDay = Math.max(1, ...last7.map(d => d.total));

    content.innerHTML = `
      <div class="grid grid-4">
        <div class="card stat-card card-perf">
          <span class="stat-label">Today's Sales</span>
          <span class="stat-value">${formatMoney(totalToday)}</span>
          <span class="stat-sub">${salesToday.length} invoice${salesToday.length === 1 ? '' : 's'}</span>
        </div>
        <div class="card stat-card card-perf">
          <span class="stat-label">This Week</span>
          <span class="stat-value">${formatMoney(totalWeek)}</span>
          <span class="stat-sub">${salesWeek.length} invoice${salesWeek.length === 1 ? '' : 's'}</span>
        </div>
        <div class="card stat-card card-perf">
          <span class="stat-label">This Month</span>
          <span class="stat-value">${formatMoney(totalMonth)}</span>
          <span class="stat-sub">${salesMonth.length} invoice${salesMonth.length === 1 ? '' : 's'}</span>
        </div>
        <div class="card stat-card card-perf">
          <span class="stat-label">Est. Profit (Month)</span>
          <span class="stat-value ${profitMonth >= 0 ? 'good' : 'bad'}">${formatMoney(profitMonth)}</span>
          <span class="stat-sub">Expenses: ${formatMoney(expenseMonthTotal)}</span>
        </div>
      </div>

      <div class="section-title"><h3>Last 7 Days</h3></div>
      <div class="card">
        <div style="display:flex; align-items:flex-end; gap:10px; height:120px;">
          ${last7.map(d => `
            <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;">
              <div class="text-muted mono" style="font-size:11px;">${d.total > 0 ? formatMoney(d.total).replace('.00','') : ''}</div>
              <div style="width:100%; max-width:34px; background:var(--accent); border-radius:4px 4px 0 0;
                height:${Math.max(4, (d.total / maxDay) * 80)}px;"></div>
              <div class="text-muted" style="font-size:11.5px;">${d.label}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="grid grid-2" style="margin-top:22px;">
        <div>
          <div class="section-title"><h3>⚠ Low Stock Alerts</h3>
            <a href="#inventory" class="text-muted" style="font-size:12.5px;">View inventory →</a>
          </div>
          <div class="card" style="padding:0;">
            ${lowStock.length === 0 ? `<div class="empty-state"><div class="empty-mark">✓</div>All products are sufficiently stocked.</div>` : `
            <div class="table-wrap" style="border:none;">
              <table><tbody>
                ${lowStock.slice(0, 8).map(p => `
                  <tr>
                    <td>${esc(p.name)}<div class="text-muted" style="font-size:11.5px;">${esc(p.category || '')}</div></td>
                    <td class="num"><span class="badge ${p.stock <= 0 ? 'badge-bad' : 'badge-warn'}">${p.stock} left</span></td>
                  </tr>`).join('')}
              </tbody></table>
            </div>`}
          </div>
        </div>

        <div>
          <div class="section-title"><h3>★ Best Sellers (Month)</h3></div>
          <div class="card" style="padding:0;">
            ${bestSellers.length === 0 ? `<div class="empty-state"><div class="empty-mark">—</div>No sales recorded yet this month.</div>` : `
            <div class="table-wrap" style="border:none;">
              <table><tbody>
                ${bestSellers.map(b => `
                  <tr>
                    <td>${esc(b.product.name)}</td>
                    <td class="num">${b.qty} sold</td>
                  </tr>`).join('')}
              </tbody></table>
            </div>`}
          </div>
        </div>
      </div>

      <div class="section-title"><h3>Quick Actions</h3></div>
      <div class="flex gap-12" style="flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="App.navigate('sales')">🧾 New Sale</button>
        <button class="btn btn-secondary" onclick="App.navigate('inventory')">📦 Add Product</button>
        <button class="btn btn-secondary" onclick="App.navigate('purchases')">⇩ New Purchase</button>
        <button class="btn btn-secondary" onclick="App.navigate('expenses')">− Add Expense</button>
      </div>
    `;
  }
};


/* ===================== inventory.js ===================== */
/* =========================================================================
   inventory.js — product catalogue: add / edit / delete, search & filter,
   barcode, image, category, brand, pricing, GST, stock levels, supplier,
   shelf location.
   ========================================================================= */

const Inventory = {
  _search: '',
  _categoryFilter: '',
  _selected: new Set(),

  render() {
    const content = document.getElementById('content');
    const products = this._filtered();
    const categories = [...new Set(Store.all('products').map(p => p.category).filter(Boolean))].sort();
    // Drop selections for products no longer in view/existing, so the count stays honest.
    const validIds = new Set(Store.all('products').map(p => p.id));
    this._selected.forEach(id => { if (!validIds.has(id)) this._selected.delete(id); });
    const selCount = this._selected.size;
    const allVisibleSelected = products.length > 0 && products.every(p => this._selected.has(p.id));

    content.innerHTML = `
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="inv-search" placeholder="Search by name, barcode, brand…" value="${esc(this._search)}">
        </div>
        <button class="btn btn-secondary btn-icon" id="inv-scan-btn" title="Scan a barcode to find a product">📷 Scan</button>
        <select id="inv-category-filter">
          <option value="">All Categories</option>
          ${categories.map(c => `<option value="${esc(c)}" ${c === this._categoryFilter ? 'selected' : ''}>${esc(c)}</option>`).join('')}
        </select>
        <button class="btn btn-secondary" id="inv-import-btn">⇧ Import CSV</button>
        <button class="btn btn-secondary" id="inv-dupes-btn">⚠ Find Duplicates</button>
        <button class="btn btn-secondary" id="inv-smart-btn">💬 Smart Command</button>
        ${selCount > 0 ? `<button class="btn btn-danger" id="inv-delete-selected-btn">🗑 Delete Selected (${selCount})</button>` : ''}
        <button class="btn btn-primary" id="inv-add-btn">+ Add Product</button>
      </div>

      <div class="table-wrap">
        ${products.length === 0 ? `
          <div class="empty-state">
            <div class="empty-mark">📦</div>
            <p>${Store.all('products').length === 0 ? 'No products yet. Add your first item to get started.' : 'No products match your search.'}</p>
            ${Store.all('products').length === 0 ? '<button class="btn btn-primary" id="inv-add-btn-2">+ Add Product</button>' : ''}
          </div>` : `
        <table>
          <thead><tr>
            <th><input type="checkbox" id="inv-select-all" ${allVisibleSelected ? 'checked' : ''}></th>
            <th></th><th>Product</th><th>Category</th><th>Brand</th>
            <th class="num">Purchase</th><th class="num">Selling</th><th class="num">GST%</th>
            <th class="num">Stock</th><th>Supplier</th><th>Shelf</th><th></th>
          </tr></thead>
          <tbody>
            ${products.map(p => this._row(p)).join('')}
          </tbody>
        </table>`}
      </div>
    `;

    const searchEl = document.getElementById('inv-search');
    searchEl.addEventListener('input', debounce((e) => { this._search = e.target.value; this.render(); }, 200));
    document.getElementById('inv-category-filter').addEventListener('change', (e) => { this._categoryFilter = e.target.value; this.render(); });
    const addBtn = document.getElementById('inv-add-btn');
    if (addBtn) addBtn.onclick = () => this.openForm();
    document.getElementById('inv-import-btn').onclick = () => this.openImport();
    document.getElementById('inv-dupes-btn').onclick = () => this.findDuplicates();
    document.getElementById('inv-smart-btn').onclick = () => SmartCommand.open();
    document.getElementById('inv-scan-btn').onclick = () => {
      BarcodeScanner.open((code) => {
        this._search = code;
        this.render();
        const match = Store.all('products').find(p => (p.barcode || '').trim() === code.trim());
        if (match) Toast.show(`Found: ${match.name}`, 'success');
        else Toast.show(`No product found with barcode ${code}.`, 'error');
      }, { title: 'Scan Product Barcode' });
    };
    const deleteSelectedBtn = document.getElementById('inv-delete-selected-btn');
    if (deleteSelectedBtn) deleteSelectedBtn.onclick = () => this.bulkDelete();
    const selectAllEl = document.getElementById('inv-select-all');
    if (selectAllEl) selectAllEl.onchange = (e) => this.toggleSelectAll(e.target.checked);
    const addBtn2 = document.getElementById('inv-add-btn-2');
    if (addBtn2) addBtn2.onclick = () => this.openForm();

    content.querySelectorAll('[data-edit]').forEach(btn => btn.onclick = () => this.openForm(btn.dataset.edit));
    content.querySelectorAll('[data-delete]').forEach(btn => btn.onclick = () => this.deleteProduct(btn.dataset.delete));
    content.querySelectorAll('[data-select]').forEach(cb => cb.onchange = (e) => this.toggleSelect(cb.dataset.select, e.target.checked));
  },

  toggleSelect(id, checked) {
    if (checked) this._selected.add(id); else this._selected.delete(id);
    this.render();
  },

  toggleSelectAll(checked) {
    const products = this._filtered();
    if (checked) products.forEach(p => this._selected.add(p.id));
    else products.forEach(p => this._selected.delete(p.id));
    this.render();
  },

  async bulkDelete() {
    const ids = [...this._selected];
    if (ids.length === 0) return;
    const names = ids.map(id => Store.get('products', id)).filter(Boolean).map(p => p.name);
    const usedInSales = ids.some(id => Store.all('sales').some(s => (s.items || []).some(it => it.productId === id)));
    const msg = usedInSales
      ? `Delete ${ids.length} selected products? Some have past sales linked — old invoices stay intact but these will be removed from inventory. This cannot be undone.`
      : `Delete ${ids.length} selected products (${names.slice(0, 3).join(', ')}${names.length > 3 ? ', …' : ''})? This cannot be undone.`;
    if (await Modal.confirm(msg, `Delete ${ids.length} Products`)) {
      ids.forEach(id => Store.remove('products', id));
      this._selected.clear();
      Toast.show(`${ids.length} product(s) deleted.`, 'success');
      this.render();
    }
  },

  _filtered() {
    let list = Store.all('products');
    if (this._categoryFilter) list = list.filter(p => p.category === this._categoryFilter);
    if (this._search.trim()) {
      const q = this._search.trim().toLowerCase();
      list = list.filter(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.barcode || '').toLowerCase().includes(q) ||
        (p.brand || '').toLowerCase().includes(q));
    }
    return list.sort((a, b) => a.name.localeCompare(b.name));
  },

  _row(p) {
    const low = Number(p.stock) <= Number(p.minStock || 0);
    return `
      <tr>
        <td><input type="checkbox" data-select="${p.id}" ${this._selected.has(p.id) ? 'checked' : ''}></td>
        <td>${p.imageDataUrl ? `<img class="row-thumb" src="${p.imageDataUrl}" alt="">` : `<div class="row-thumb flex" style="align-items:center;justify-content:center;color:var(--muted);">✎</div>`}</td>
        <td><strong>${esc(p.name)}</strong><div class="text-muted mono" style="font-size:11px;">${esc(p.barcode || '—')}</div></td>
        <td>${esc(p.category || '—')}</td>
        <td>${esc(p.brand || '—')}</td>
        <td class="num">${formatMoney(p.purchasePrice)}</td>
        <td class="num">${formatMoney(p.sellingPrice)}</td>
        <td class="num">${Number(p.gstPercent) || 0}%</td>
        <td class="num"><span class="badge ${low ? (p.stock <= 0 ? 'badge-bad' : 'badge-warn') : 'badge-good'}">${p.stock}</span></td>
        <td>${esc(this._supplierName(p.supplierId))}</td>
        <td>${esc(p.shelfLocation || '—')}</td>
        <td>
          <div class="flex gap-8">
            <button class="btn btn-ghost btn-sm" data-edit="${p.id}">Edit</button>
            <button class="btn btn-ghost btn-sm" data-delete="${p.id}">Delete</button>
          </div>
        </td>
      </tr>`;
  },

  _supplierName(id) {
    if (!id) return '—';
    const s = Store.get('suppliers', id);
    return s ? s.name : '—';
  },

  openForm(productId = null) {
    const p = productId ? Store.get('products', productId) : null;
    const suppliers = Store.all('suppliers');

    const body = Modal.open(p ? 'Edit Product' : 'Add Product', `
      <form id="product-form">
        <div class="flex" style="gap:14px; align-items:flex-start; margin-bottom:6px;">
          <div>
            <img id="img-preview" src="${p?.imageDataUrl || ''}" style="width:74px;height:74px;border-radius:10px;object-fit:cover;
              background:var(--paper);border:1px solid var(--line); ${p?.imageDataUrl ? '' : 'display:none;'}">
            <div id="img-placeholder" class="flex" style="width:74px;height:74px;border-radius:10px;background:var(--paper);
              border:1px dashed var(--line); align-items:center;justify-content:center;color:var(--muted); ${p?.imageDataUrl ? 'display:none;' : ''}">✎</div>
          </div>
          <div style="flex:1;">
            <label>Product Photo
              <input type="file" id="p-image" accept="image/*">
              <span class="field-hint">Optional. Stored on this device only.</span>
            </label>
          </div>
        </div>

        <label>Product Name *
          <input type="text" id="p-name" required value="${esc(p?.name || '')}">
        </label>

        <div class="form-row">
          <label>Barcode
            <div class="flex gap-8">
              <input type="text" id="p-barcode" value="${esc(p?.barcode || '')}" placeholder="Scan or type" style="flex:1;">
              <button type="button" class="btn btn-secondary btn-icon" id="p-scan-barcode" title="Scan with camera">📷</button>
            </div>
          </label>
          <label>Category
            <input type="text" id="p-category" value="${esc(p?.category || '')}" placeholder="e.g. Notebooks">
          </label>
        </div>

        <div class="form-row">
          <label>Brand
            <input type="text" id="p-brand" value="${esc(p?.brand || '')}">
          </label>
          <label>Shelf Location
            <input type="text" id="p-shelf" value="${esc(p?.shelfLocation || '')}" placeholder="e.g. Rack A2">
          </label>
        </div>

        <div class="form-row">
          <label>Purchase Price (₹) *
            <input type="number" id="p-purchase" min="0" step="0.01" required value="${p?.purchasePrice ?? ''}">
          </label>
          <label>Selling Price (₹) *
            <input type="number" id="p-selling" min="0" step="0.01" required value="${p?.sellingPrice ?? ''}">
          </label>
        </div>

        <div class="form-row">
          <label>GST %
            <select id="p-gst">
              ${(Settings.get().gstSlabs || [0, 5, 12, 18, 28]).map(g => `<option value="${g}" ${Number(p?.gstPercent) === g ? 'selected' : ''}>${g}%</option>`).join('')}
            </select>
          </label>
          <label>Supplier
            <select id="p-supplier">
              <option value="">— None —</option>
              ${suppliers.map(s => `<option value="${s.id}" ${p?.supplierId === s.id ? 'selected' : ''}>${esc(s.name)}</option>`).join('')}
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>Current Stock *
            <input type="number" id="p-stock" min="0" required value="${p?.stock ?? 0}">
          </label>
          <label>Minimum Stock (alert level)
            <input type="number" id="p-minstock" min="0" value="${p?.minStock ?? 5}">
          </label>
        </div>

        <div id="product-error" class="form-error" style="display:none;"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="product-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">${p ? 'Save Changes' : 'Add Product'}</button>
        </div>
      </form>
    `);

    let pendingImage = p?.imageDataUrl || '';
    document.getElementById('p-image').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      pendingImage = await fileToCompressedDataUrl(file);
      document.getElementById('img-preview').src = pendingImage;
      document.getElementById('img-preview').style.display = '';
      document.getElementById('img-placeholder').style.display = 'none';
    });

    body.querySelector('#product-cancel').onclick = () => Modal.close();
    document.getElementById('p-scan-barcode').onclick = () => {
      BarcodeScanner.open((code) => {
        document.getElementById('p-barcode').value = code;
        Toast.show('Barcode captured.', 'success');
      }, { title: 'Scan Product Barcode' });
    };
    body.querySelector('#product-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const record = {
        name: document.getElementById('p-name').value.trim(),
        barcode: document.getElementById('p-barcode').value.trim(),
        category: document.getElementById('p-category').value.trim(),
        brand: document.getElementById('p-brand').value.trim(),
        shelfLocation: document.getElementById('p-shelf').value.trim(),
        purchasePrice: round2(document.getElementById('p-purchase').value),
        sellingPrice: round2(document.getElementById('p-selling').value),
        gstPercent: Number(document.getElementById('p-gst').value),
        supplierId: document.getElementById('p-supplier').value || null,
        stock: Number(document.getElementById('p-stock').value),
        minStock: Number(document.getElementById('p-minstock').value) || 0,
        imageDataUrl: pendingImage
      };
      if (!record.name) {
        const err = document.getElementById('product-error');
        err.textContent = 'Product name is required.'; err.style.display = 'block';
        return;
      }
      if (p) Store.update('products', p.id, record);
      else Store.insert('products', record);
      Modal.close();
      Toast.show(p ? 'Product updated.' : 'Product added.', 'success');
      this.render();
    });
  },

  openImport() {
    const body = Modal.open('Import Products from CSV', `
      <p class="text-muted" style="margin-bottom:14px;">
        Works with most shop inventory spreadsheets (including Vyapar exports) — it automatically looks for
        columns like Name, Barcode/Item Code, Category, Brand, Purchase Price, Selling Price, GST%, Stock, and Shelf.
        Save your Excel file as <strong>CSV</strong> first, then choose it below.
      </p>
      <label>CSV File
        <input type="file" id="import-file" accept=".csv,text/csv">
      </label>
      <div id="import-preview"></div>
    `, { wide: true });

    document.getElementById('import-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const rows = parseCSV(reader.result);
        if (rows.length === 0) {
          document.getElementById('import-preview').innerHTML = `<div class="form-error">No rows found in that file.</div>`;
          return;
        }
        const mapped = rows.map(r => ({
          name: pickField(r, ['Name', 'Item Name', 'Product Name', 'Item']),
          barcode: pickField(r, ['Barcode', 'Item Code', 'Code', 'SKU']),
          category: pickField(r, ['Category', 'Group', 'Item Group']),
          brand: pickField(r, ['Brand']),
          purchasePrice: Number(pickField(r, ['Purchase Price', 'Cost Price', 'Cost'])) || 0,
          sellingPrice: Number(pickField(r, ['Selling Price', 'Sale Price', 'Sales Price', 'MRP', 'Price'])) || 0,
          gstPercent: Number(pickField(r, ['GST%', 'GST', 'Tax Rate', 'Tax %'])) || 0,
          stock: Number(pickField(r, ['Stock', 'Opening Stock', 'Current Stock', 'Stock Quantity', 'Qty', 'Quantity'])) || 0,
          minStock: Number(pickField(r, ['Min Stock', 'Minimum Stock', 'Reorder Level'])) || 5,
          shelfLocation: pickField(r, ['Shelf', 'Shelf Location', 'Location', 'Rack']),
          supplierName: pickField(r, ['Supplier', 'Supplier Name'])
        })).filter(m => m.name);

        document.getElementById('import-preview').innerHTML = `
          <div class="card" style="margin-top:14px;">
            <p><strong>${mapped.length}</strong> product${mapped.length === 1 ? '' : 's'} found and ready to import.</p>
            <div class="table-wrap" style="max-height:240px; overflow-y:auto; margin-top:8px;">
              <table><thead><tr><th>Name</th><th class="num">Purchase</th><th class="num">Selling</th><th class="num">Stock</th></tr></thead>
              <tbody>${mapped.slice(0, 12).map(m => `<tr><td>${esc(m.name)}</td><td class="num">${formatMoney(m.purchasePrice)}</td><td class="num">${formatMoney(m.sellingPrice)}</td><td class="num">${m.stock}</td></tr>`).join('')}</tbody></table>
            </div>
            ${mapped.length > 12 ? `<p class="text-muted" style="margin-top:6px;">…and ${mapped.length - 12} more.</p>` : ''}
            <div class="form-actions"><button class="btn btn-primary" id="do-import">Import ${mapped.length} Product${mapped.length === 1 ? '' : 's'}</button></div>
          </div>`;

        document.getElementById('do-import').onclick = () => {
          let added = 0, updated = 0;
          mapped.forEach(m => {
            let supplierId = null;
            if (m.supplierName) {
              let sup = Store.all('suppliers').find(s => s.name.toLowerCase() === m.supplierName.toLowerCase());
              if (!sup) sup = Store.insert('suppliers', { name: m.supplierName, outstandingBalance: 0 });
              supplierId = sup.id;
            }
            const existing = (m.barcode ? Store.all('products').find(p => p.barcode && p.barcode === m.barcode) : null)
              || Store.all('products').find(p => p.name.trim().toLowerCase() === m.name.trim().toLowerCase());
            const record = { ...m, supplierId };
            delete record.supplierName;
            if (existing) {
              // Don't let a blank cell in this import erase a value the product already has.
              ['category', 'brand', 'shelfLocation', 'barcode'].forEach(field => {
                if (!record[field] && existing[field]) record[field] = existing[field];
              });
              Store.update('products', existing.id, record); updated++;
            } else {
              Store.insert('products', record); added++;
            }
          });
          Modal.close();
          Toast.show(`Import complete: ${added} added, ${updated} updated.`, 'success');
          this.render();
        };
      };
      reader.readAsText(file);
    });
  },

  findDuplicates() {
    const products = Store.all('products');
    const groups = {};
    products.forEach(p => {
      const key = p.name.trim().toLowerCase();
      groups[key] = groups[key] || [];
      groups[key].push(p);
    });
    const dupeGroups = Object.values(groups).filter(g => g.length > 1);

    if (dupeGroups.length === 0) {
      Toast.show('No duplicate product names found.', 'success');
      return;
    }

    // For each group, keep the copy that looks most "complete": highest stock,
    // then has a category set, then most recently updated.
    const plan = dupeGroups.map(group => {
      const sorted = [...group].sort((a, b) => {
        if ((b.stock || 0) !== (a.stock || 0)) return (b.stock || 0) - (a.stock || 0);
        if (!!b.category !== !!a.category) return (b.category ? 1 : 0) - (a.category ? 1 : 0);
        return new Date(b.updatedAt) - new Date(a.updatedAt);
      });
      return { keep: sorted[0], remove: sorted.slice(1) };
    });
    const totalToRemove = plan.reduce((a, g) => a + g.remove.length, 0);

    const body = Modal.open('Duplicate Products Found', `
      <p class="text-muted" style="margin-bottom:14px;">
        Found <strong>${dupeGroups.length}</strong> product name${dupeGroups.length === 1 ? '' : 's'} with duplicates
        (<strong>${totalToRemove}</strong> extra record${totalToRemove === 1 ? '' : 's'} total).
        For each, the copy with the most stock (and other details filled in) will be kept — the rest will be deleted.
        Past sales/purchases are not affected.
      </p>
      <div class="table-wrap" style="max-height:320px;overflow-y:auto;">
        <table>
          <thead><tr><th>Product</th><th class="num">Copies Found</th><th class="num">Stock Kept</th><th class="num">Will Delete</th></tr></thead>
          <tbody>
            ${plan.map(g => `<tr><td>${esc(g.keep.name)}</td><td class="num">${g.remove.length + 1}</td><td class="num">${g.keep.stock}</td><td class="num">${g.remove.length}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="dupe-cancel">Cancel</button>
        <button class="btn btn-danger" id="dupe-confirm">Remove ${totalToRemove} Duplicate${totalToRemove === 1 ? '' : 's'}</button>
      </div>
    `, { wide: true });

    document.getElementById('dupe-cancel').onclick = () => Modal.close();
    document.getElementById('dupe-confirm').onclick = () => {
      plan.forEach(g => g.remove.forEach(p => Store.remove('products', p.id)));
      Modal.close();
      Toast.show(`Removed ${totalToRemove} duplicate product${totalToRemove === 1 ? '' : 's'}.`, 'success');
      this.render();
    };
  },

  async deleteProduct(id) {
    const p = Store.get('products', id);
    if (!p) return;
    const usedInSales = Store.all('sales').some(s => (s.items || []).some(it => it.productId === id));
    const msg = usedInSales
      ? `"${p.name}" has past sales linked to it. Deleting it will keep old invoices intact but remove it from inventory. Continue?`
      : `Delete "${p.name}" from inventory? This cannot be undone.`;
    if (await Modal.confirm(msg, 'Delete Product')) {
      Store.remove('products', id);
      Toast.show('Product deleted.', 'success');
      this.render();
    }
  }
};


/* ===================== smart-command.js ===================== */
/* =========================================================================
   smart-command.js — a small offline command parser for the Inventory tab.
   No internet or API key needed: it matches typed (or spoken) text against
   a fixed set of phrasing patterns and runs the matching action directly
   through Inventory/Store. Not a full AI — it understands specific phrasings,
   not open-ended language. Add new patterns to `PATTERNS` to teach it more.
   ========================================================================= */

const SmartCommand = {

  // Finds the product whose name best matches a typed fragment.
  _findProduct(fragment) {
    const q = (fragment || '').trim().toLowerCase();
    if (!q) return null;
    const products = Store.all('products');
    let exact = products.find(p => p.name.toLowerCase() === q);
    if (exact) return exact;
    const starts = products.filter(p => p.name.toLowerCase().startsWith(q));
    if (starts.length === 1) return starts[0];
    const contains = products.filter(p => p.name.toLowerCase().includes(q));
    if (contains.length === 1) return contains[0];
    // Multiple or zero matches: return the shortest-name match among candidates as the best guess.
    const pool = starts.length ? starts : contains;
    if (pool.length > 1) return pool.sort((a, b) => a.name.length - b.name.length)[0];
    return null;
  },

  _multiMatches(fragment) {
    const q = (fragment || '').trim().toLowerCase();
    const products = Store.all('products');
    return products.filter(p => p.name.toLowerCase().includes(q));
  },

  PATTERNS: [
    {
      // "add 10 stock to apsara pen" / "add 10 apsara pen stock" / "increase stock of X by 10"
      re: /^(?:add|increase)\s+(\d+)\s+(?:stock\s+(?:to|for)\s+)?(?:to\s+)?(?:stock\s+of\s+)?(.+?)(?:\s+stock)?$/i,
      handler(m) {
        const qty = parseInt(m[1], 10);
        const name = m[2].replace(/^stock of\s+/i, '').replace(/\s+by$/i, '').trim();
        return SmartCommand._adjustStock(name, qty);
      }
    },
    {
      // "increase stock of X by 10" (explicit "by")
      re: /^increase\s+stock\s+of\s+(.+?)\s+by\s+(\d+)$/i,
      handler(m) { return SmartCommand._adjustStock(m[1], parseInt(m[2], 10)); }
    },
    {
      // "reduce/remove/decrease 5 stock from X" / "decrease stock of X by 5"
      re: /^(?:reduce|remove|decrease)\s+(\d+)\s+(?:stock\s+)?(?:from|of)\s+(.+)$/i,
      handler(m) { return SmartCommand._adjustStock(m[2], -parseInt(m[1], 10)); }
    },
    {
      re: /^decrease\s+stock\s+of\s+(.+?)\s+by\s+(\d+)$/i,
      handler(m) { return SmartCommand._adjustStock(m[1], -parseInt(m[2], 10)); }
    },
    {
      // "set stock of X to 20" / "set X stock to 20"
      re: /^set\s+(?:stock\s+of\s+)?(.+?)\s+stock\s+to\s+(\d+)$/i,
      handler(m) { return SmartCommand._setStock(m[1], parseInt(m[2], 10)); }
    },
    {
      re: /^set\s+stock\s+of\s+(.+?)\s+to\s+(\d+)$/i,
      handler(m) { return SmartCommand._setStock(m[1], parseInt(m[2], 10)); }
    },
    {
      // "set price of X to 50" / "set selling price of X to 50" / "change price of X to 50"
      re: /^(?:set|change)\s+(?:selling\s+)?price\s+of\s+(.+?)\s+to\s+(\d+(?:\.\d+)?)$/i,
      handler(m) { return SmartCommand._setPrice(m[1], parseFloat(m[2])); }
    },
    {
      // "delete X" / "remove X from inventory" / "delete all items with 0 stock"
      re: /^delete\s+all\s+(?:items?|products?)\s+with\s+0\s+stock$/i,
      handler() { return SmartCommand._deleteZeroStock(); }
    },
    {
      re: /^(?:delete|remove)\s+(.+?)(?:\s+from\s+inventory)?$/i,
      handler(m) { return SmartCommand._deleteProduct(m[1]); }
    },
    {
      // "search X" / "find X" / "show X"
      re: /^(?:search|find|show)\s+(?:for\s+)?(.+)$/i,
      handler(m) {
        const term = m[1].trim();
        if (/^low stock$/i.test(term)) return SmartCommand._showLowStock();
        if (/^out of stock$/i.test(term)) return SmartCommand._showOutOfStock();
        Inventory._search = term;
        Inventory._categoryFilter = '';
        Inventory.render();
        return { ok: true, message: `Filtered inventory to "${term}".` };
      }
    },
    {
      re: /^low\s*stock$/i,
      handler() { return SmartCommand._showLowStock(); }
    },
    {
      re: /^out\s*of\s*stock$/i,
      handler() { return SmartCommand._showOutOfStock(); }
    },
  ],

  _adjustStock(nameFragment, delta) {
    const p = this._findProduct(nameFragment);
    if (!p) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    const newStock = Math.max(0, Number(p.stock || 0) + delta);
    Store.update('products', p.id, { stock: newStock });
    Inventory.render();
    return { ok: true, message: `${delta >= 0 ? 'Added' : 'Removed'} ${Math.abs(delta)} — "${p.name}" stock is now ${newStock}.` };
  },

  _setStock(nameFragment, value) {
    const p = this._findProduct(nameFragment);
    if (!p) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    Store.update('products', p.id, { stock: value });
    Inventory.render();
    return { ok: true, message: `"${p.name}" stock set to ${value}.` };
  },

  _setPrice(nameFragment, value) {
    const p = this._findProduct(nameFragment);
    if (!p) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    Store.update('products', p.id, { sellingPrice: value });
    Inventory.render();
    return { ok: true, message: `"${p.name}" selling price set to ${formatMoney(value)}.` };
  },

  async _deleteProduct(nameFragment) {
    const matches = this._multiMatches(nameFragment);
    if (matches.length === 0) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    if (matches.length > 1) {
      const p = this._findProduct(nameFragment);
      if (!p) return { ok: false, message: `Multiple products match "${nameFragment.trim()}" — try being more specific.` };
      matches.length = 0; matches.push(p);
    }
    const p = matches[0];
    if (await Modal.confirm(`Delete "${p.name}" from inventory? This cannot be undone.`, 'Delete Product')) {
      Store.remove('products', p.id);
      Inventory.render();
      return { ok: true, message: `"${p.name}" deleted.` };
    }
    return { ok: true, message: 'Cancelled.' };
  },

  async _deleteZeroStock() {
    const zero = Store.all('products').filter(p => Number(p.stock || 0) <= 0);
    if (zero.length === 0) return { ok: true, message: 'No products currently have 0 stock.' };
    if (await Modal.confirm(`Delete ${zero.length} product(s) with 0 stock? This cannot be undone.`, `Delete ${zero.length} Products`)) {
      zero.forEach(p => Store.remove('products', p.id));
      Inventory.render();
      return { ok: true, message: `Deleted ${zero.length} product(s) with 0 stock.` };
    }
    return { ok: true, message: 'Cancelled.' };
  },

  _showLowStock() {
    const low = Store.all('products').filter(p => Number(p.stock) <= Number(p.minStock || 0));
    Inventory._search = '';
    Inventory._categoryFilter = '';
    Inventory.render();
    return { ok: true, message: `${low.length} product(s) at or below minimum stock. (Showing full list — sort by the Stock column.)` };
  },

  _showOutOfStock() {
    const out = Store.all('products').filter(p => Number(p.stock || 0) <= 0);
    Inventory._search = '';
    Inventory.render();
    return { ok: true, message: `${out.length} product(s) are out of stock: ${out.slice(0, 5).map(p => p.name).join(', ')}${out.length > 5 ? ', …' : ''}` };
  },

  async run(text) {
    const clean = (text || '').trim().replace(/[.?!]+$/, '');
    if (!clean) return { ok: false, message: 'Type a command first.' };
    for (const pattern of this.PATTERNS) {
      const m = clean.match(pattern.re);
      if (m) {
        try {
          return await pattern.handler(m);
        } catch (err) {
          console.error('SmartCommand error', err);
          return { ok: false, message: 'Something went wrong running that command.' };
        }
      }
    }
    return {
      ok: false,
      message: `I didn't recognize that. Try things like:
      • "add 10 stock to Apsara pen"
      • "reduce 5 stock from Doms eraser"
      • "set price of Camlin marker to 45"
      • "delete Fevicol"
      • "delete all items with 0 stock"
      • "show low stock" / "show out of stock"
      • "search notebooks"`
    };
  },

  open() {
    const body = Modal.open('💬 Smart Command', `
      <p class="text-muted" style="margin-bottom:14px;font-size:13px;">
        Type a command in plain words. Works offline — no internet needed.
      </p>
      <div class="flex" style="gap:8px;">
        <input type="text" id="sc-input" placeholder="e.g. add 10 stock to Apsara pen" style="flex:1;" autocomplete="off">
        <button type="button" class="btn btn-secondary btn-icon" id="sc-mic" title="Speak command">🎤</button>
      </div>
      <div id="sc-result" style="margin-top:14px;font-size:14px;white-space:pre-line;"></div>
      <div class="form-actions" style="margin-top:18px;">
        <button type="button" class="btn btn-ghost" id="sc-close">Close</button>
        <button type="button" class="btn btn-primary" id="sc-run">Run</button>
      </div>
    `);
    const input = body.querySelector('#sc-input');
    const resultBox = body.querySelector('#sc-result');
    input.focus();

    const runCmd = async () => {
      const result = await this.run(input.value);
      resultBox.textContent = result.message;
      resultBox.style.color = result.ok ? 'var(--good, #2e7d32)' : 'var(--bad, #c62828)';
      if (result.ok) input.value = '';
    };

    body.querySelector('#sc-run').onclick = runCmd;
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') runCmd(); });
    body.querySelector('#sc-close').onclick = () => Modal.close();

    const micBtn = body.querySelector('#sc-mic');
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) {
      micBtn.disabled = true;
      micBtn.title = 'Voice input not supported in this browser';
    } else {
      micBtn.onclick = () => {
        const rec = new SpeechRec();
        rec.lang = 'en-IN';
        rec.interimResults = false;
        micBtn.textContent = '🎙️…';
        rec.onresult = (e) => {
          input.value = e.results[0][0].transcript;
          micBtn.textContent = '🎤';
        };
        rec.onerror = () => { micBtn.textContent = '🎤'; };
        rec.onend = () => { micBtn.textContent = '🎤'; };
        rec.start();
      };
    }
  }
};

/* =========================================================================
   sales.js — the billing counter. Two views: "New Sale" (fast checkout)
   and "Invoice History" (search past invoices, print, return/exchange).
   ========================================================================= */

const Sales = {
  _tab: 'bill',
  _cart: [],           // [{ productId, name, price, gstPercent, qty, discount }]
  _customerId: '',
  _paymentMode: 'Cash',
  _amountPaid: '',
  _redeemPoints: false,
  _historySearch: '',

  render() {
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="tabs no-print">
        <button class="tab-btn ${this._tab === 'bill' ? 'active' : ''}" id="tab-bill">🧾 New Sale</button>
        <button class="tab-btn ${this._tab === 'history' ? 'active' : ''}" id="tab-history">📜 Invoice History</button>
      </div>
      <div id="sales-tab-content"></div>

    document.getElementById('tab-history').onclick = () => { this._tab = 'history'; this.render(); };
    if (this._tab === 'bill') this.renderBillingScreen();
    else this.renderHistory();
  },

  /* ============================== NEW SALE ============================== */

  renderBillingScreen() {
    const el = document.getElementById('sales-tab-content');
    const customers = Store.all('customers');
    const totals = this._computeTotals();
    const selectedCustomer = this._customerId ? Store.get('customers', this._customerId) : null;

    el.innerHTML = `

          <div class="card">

              <div class="flex gap-8">

                <button type="button" class="btn btn-secondary btn-icon" id="bill-scan-btn" title="Scan with camera">📷</button>

            </label>
            <div id="product-pick-results"></div>
          </div>

          <div class="section-title"><h3>Cart</h3></div>
          <div class="table-wrap">
            ${this._cart.length === 0 ? `<div class="empty-state"><div class="empty-mark">🛒</div>Cart is empty. Search a product above to add it.</div>` : `
            <table class="cart-table">
              <thead><tr><th>Item</th><th class="num">Price</th><th class="num">Qty</th><th class="num">Disc ₹</th><th class="num">GST%</th><th class="num">Total</th><th></th></tr></thead>
              <tbody>
                ${this._cart.map((c, idx) => {
                  const lineSubtotal = c.price * c.qty - (Number(c.discount) || 0);
                  const { total } = calcGST(lineSubtotal, c.gstPercent);
                  return `
                  <tr>
                    <td>${esc(c.name)}</td>
                    <td class="num">${formatMoney(c.price)}</td>
                    <td class="num"><input type="number" min="1" class="cart-qty-input" data-idx="${idx}" data-field="qty" value="${c.qty}"></td>
                    <td class="num"><input type="number" min="0" class="cart-disc-input" data-idx="${idx}" data-field="discount" value="${c.discount || 0}"></td>
                    <td class="num">${c.gstPercent}%</td>
                    <td class="num">${formatMoney(total)}</td>
                    <td><button class="btn btn-ghost btn-sm" data-remove="${idx}">✕</button></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>`}
          </div>
        </div>

        <div>
          <div class="card">
            <label>Customer (optional)
              <select id="bill-customer">
                <option value="">Walk-in Customer</option>
                ${customers.map(c => `<option value="${c.id}" ${c.id === this._customerId ? 'selected' : ''}>${esc(c.name)} — ${esc(c.phone || '')}</option>`).join('')}
              </select>
            </label>
            <button class="btn btn-ghost btn-sm btn-block" id="bill-add-customer" style="margin-bottom:14px;">+ Add New Customer</button>

            ${selectedCustomer ? `
