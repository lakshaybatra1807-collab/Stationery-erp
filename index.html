<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Stationery Manager</title>
<meta name="theme-color" content="#A6303D">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* =========================================================================
   style.css
   Design language: a working shop ledger, not a generic SaaS dashboard.
   Paper cream surfaces, deep ink-navy text, a sealing-wax red for primary
   actions, and a pencil-yellow for highlights/warnings. Numbers are set in
   a monospace face, like columns in an account book. Cards carry a subtle
   perforated top edge, like a receipt torn from a pad.
   ========================================================================= */

:root {
  /* ---- Light theme (default) ---- */
  --paper: #FAF7F0;
  --paper-raised: #FFFFFF;
  --ink: #23293B;
  --ink-soft: #4B5163;
  --muted: #7B8093;
  --line: #E4DFD2;
  --accent: #A6303D;         /* sealing-wax red */
  --accent-ink: #ffffff;
  --accent-soft: #F3DCDF;
  --gold: #C98A2B;           /* pencil-brass yellow */
  --gold-soft: #F6E7C9;
  --good: #2E7D4F;
  --good-soft: #DCEFE2;
  --bad: #B3261E;
  --bad-soft: #FBE2E0;
  --shadow: 0 1px 2px rgba(35,41,59,.06), 0 6px 20px rgba(35,41,59,.06);
  --radius: 10px;
  --font-display: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

[data-theme="dark"] {
  --paper: #171A22;
  --paper-raised: #1F232E;
  --ink: #EFEBE1;
  --ink-soft: #C7C2B4;
  --muted: #8A8F9E;
  --line: #2E3341;
  --accent: #E0616D;
  --accent-ink: #1B1113;
  --accent-soft: #3A2229;
  --gold: #E8B95C;
  --gold-soft: #3A311E;
  --good: #4FAE79;
  --good-soft: #1C2E24;
  --bad: #E37469;
  --bad-soft: #3A2220;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 24px rgba(0,0,0,.35);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 700; margin: 0 0 4px; color: var(--ink); }
p { margin: 0 0 8px; }
a { color: var(--accent); }
.mono { font-family: var(--font-mono); }
::selection { background: var(--accent-soft); }

button { font-family: inherit; }
input, select, textarea {
  font-family: inherit; font-size: 14px; color: var(--ink);
  background: var(--paper-raised); border: 1px solid var(--line);
  border-radius: 8px; padding: 9px 11px; width: 100%;
}
input:focus, select:focus, textarea:focus, button:focus-visible {
  outline: 2px solid var(--accent); outline-offset: 1px;
}
label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-soft); margin-bottom: 12px; }
label input, label select, label textarea { margin-top: 5px; }

/* ---------------------------- Buttons ---------------------------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 16px; border-radius: 8px; border: 1px solid transparent;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: transform .08s ease, background .15s ease;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }
.btn-primary:hover { filter: brightness(1.08); }
.btn-secondary { background: var(--gold-soft); color: var(--ink); border-color: var(--gold); }
.btn-ghost { background: transparent; color: var(--ink-soft); border-color: var(--line); }
.btn-ghost:hover { background: var(--paper-raised); }
.btn-danger { background: var(--bad); color: #fff; }
.btn-sm { padding: 6px 11px; font-size: 13px; }
.btn-icon { padding: 8px; }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ---------------------------- App shell / layout ---------------------------- */
#app-root { min-height: 100vh; }
.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 224px; flex-shrink: 0; background: var(--paper-raised);
  border-right: 1px solid var(--line); display: flex; flex-direction: column;
  padding: 18px 12px; position: sticky; top: 0; height: 100vh;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 18px; }
.brand-mark {
  width: 36px; height: 36px; border-radius: 8px; background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 20px;
}
.brand-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; line-height: 1.15; }
.brand-sub { font-size: 11px; color: var(--muted); }

.nav-group { margin-bottom: 4px; }
.nav-link {
  display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 8px;
  color: var(--ink-soft); text-decoration: none; font-size: 13.5px; font-weight: 600; cursor: pointer;
  margin-bottom: 2px;
}
.nav-link:hover { background: var(--paper); }
.nav-link.active { background: var(--accent-soft); color: var(--accent); }
.nav-icon { width: 18px; text-align: center; }

.sidebar-footer { margin-top: auto; border-top: 1px solid var(--line); padding-top: 10px; }
.user-chip { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; font-size: 13px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%; background: var(--gold-soft); color: var(--ink);
  display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0;
}

.main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 22px; border-bottom: 1px solid var(--line); background: var(--paper);
  position: sticky; top: 0; z-index: 5;
}
.topbar h2 { font-size: 19px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--line); background: var(--paper-raised);
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-soft);
}
.icon-btn:hover { background: var(--paper); }

.content { padding: 20px 22px 90px; flex: 1; }

.mobile-topbar { display: none; }
.bottom-nav { display: none; }

/* ---------------------------- Cards / ledger paper ---------------------------- */
.card {
  background: var(--paper-raised); border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 16px 18px; position: relative;
}
.card-perf::before {
  content: ""; position: absolute; top: -1px; left: 14px; right: 14px; height: 1px;
  background-image: radial-gradient(circle, var(--paper) 1.4px, transparent 1.6px);
  background-size: 10px 4px; background-repeat: repeat-x;
}
.grid { display: grid; gap: 14px; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1000px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 620px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

.stat-card { display: flex; flex-direction: column; gap: 6px; }
.stat-label { font-size: 12.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
.stat-value { font-family: var(--font-mono); font-size: 24px; font-weight: 700; }
.stat-sub { font-size: 12px; color: var(--muted); }
.stat-value.good { color: var(--good); }
.stat-value.bad { color: var(--bad); }

.section-title { display: flex; align-items: center; justify-content: space-between; margin: 26px 0 12px; }
.section-title h3 { font-size: 16px; }

/* ---------------------------- Tables ---------------------------- */
.table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper-raised); }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 560px; }
thead th {
  text-align: left; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
  padding: 10px 12px; border-bottom: 1px solid var(--line); background: var(--paper); white-space: nowrap;
}
tbody td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--paper); }
td.num, th.num { text-align: right; font-family: var(--font-mono); }
.row-thumb { width: 34px; height: 34px; border-radius: 6px; object-fit: cover; background: var(--paper); border: 1px solid var(--line); }

.badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 11.5px; font-weight: 700; }
.badge-good { background: var(--good-soft); color: var(--good); }
.badge-bad { background: var(--bad-soft); color: var(--bad); }
.badge-warn { background: var(--gold-soft); color: var(--gold); }
.badge-muted { background: var(--line); color: var(--ink-soft); }

/* ---------------------------- Toolbar / search ---------------------------- */
.toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
.toolbar .search-box { flex: 1; min-width: 180px; position: relative; }
.toolbar .search-box input { padding-left: 32px; }
.toolbar .search-box::before { content: "⌕"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
.toolbar select { width: auto; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-state .empty-mark { font-size: 34px; margin-bottom: 8px; }

/* ---------------------------- Forms / modals ---------------------------- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(23,26,34,.55); display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 16px; animation: fadeIn .15s ease;
}
.modal-box {
  background: var(--paper-raised); border-radius: 14px; width: 100%; max-width: 460px; max-height: 88vh;
  overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); animation: popIn .16s ease;
}
.modal-wide { max-width: 760px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--paper-raised); }
.modal-header h3 { font-size: 17px; }
.modal-close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1; padding: 4px; }
.modal-body { padding: 18px 20px 22px; }
body.modal-open { overflow: hidden; }
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
.form-error { background: var(--bad-soft); color: var(--bad); padding: 9px 11px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
.field-hint { font-size: 11.5px; color: var(--muted); font-weight: 400; margin-top: 4px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }

/* ---------------------------- Login screen ---------------------------- */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  background: radial-gradient(circle at 20% 15%, var(--accent-soft), transparent 45%), var(--paper); }
.login-card { width: 100%; max-width: 380px; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 16px;
  box-shadow: var(--shadow); padding: 32px 28px; }
.login-brand { text-align: center; margin-bottom: 22px; }
.login-mark { width: 52px; height: 52px; margin: 0 auto 12px; border-radius: 12px; background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 26px; }
.login-brand h1 { font-size: 20px; }
.login-sub { color: var(--muted); font-size: 13px; }
.login-hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 16px; }

/* ---------------------------- Invoice / receipt look ---------------------------- */
.receipt {
  background: var(--paper-raised); border: 1px dashed var(--line); border-radius: 4px; padding: 18px;
  font-family: var(--font-mono); font-size: 12.5px; max-width: 340px; margin: 0 auto;
}
.receipt h4 { font-family: var(--font-display); text-align: center; font-size: 16px; }
.receipt .r-line { display: flex; justify-content: space-between; }
.receipt hr { border: none; border-top: 1px dashed var(--line); margin: 8px 0; }
.receipt .r-total { font-weight: 700; font-size: 14px; }

/* ---------------------------- Utility ---------------------------- */
.flex { display: flex; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.text-muted { color: var(--muted); }
.text-good { color: var(--good); } .text-bad { color: var(--bad); }
.mt-0 { margin-top: 0; } .mb-0 { margin-bottom: 0; }
.hidden { display: none !important; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--paper); border: 1px solid var(--line); border-radius: 99px; padding: 4px 10px; font-size: 12px; }

/* ---------------------------- Responsive: sidebar -> bottom nav ---------------------------- */
@media (max-width: 880px) {
  .sidebar { display: none; }
  .mobile-topbar {
    display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
    border-bottom: 1px solid var(--line); background: var(--paper-raised); position: sticky; top: 0; z-index: 6;
  }
  .mobile-topbar .brand { padding: 0; }
  .content { padding: 16px 14px 90px; }
  .topbar { display: none; }
  .bottom-nav {
    display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper-raised);
    border-top: 1px solid var(--line); z-index: 20; padding: 4px 2px calc(4px + env(safe-area-inset-bottom));
    overflow-x: auto;
  }
  .bottom-nav .nav-link {
    flex-direction: column; flex: 1; text-align: center; font-size: 10.5px; gap: 3px; padding: 7px 2px;
    border-radius: 0; min-width: 58px;
  }
  .bottom-nav .nav-icon { font-size: 17px; }
  .bottom-nav .nav-link.active { background: transparent; }
  .drawer-panel { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background: var(--paper-raised);
    z-index: 50; box-shadow: 0 0 30px rgba(0,0,0,.25); transform: translateX(-100%); transition: transform .2s ease; padding: 16px 12px; overflow-y: auto; }
  .drawer-panel.open { transform: translateX(0); }
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 45; display: none; }
  .drawer-backdrop.open { display: block; }
}

/* Print styles: used for invoice printing. Only #print-area is shown. */
@media print {
  body * { visibility: hidden; }
  #print-area, #print-area *, #print-target, #print-target * { visibility: visible; }
  #print-area, #print-target { position: absolute; top: 0; left: 0; width: 100%; padding: 0; margin: 0; }
  .receipt { border: none; max-width: 100%; }
  body { background: #fff; }
}

/* ---------------------------- Billing screen ---------------------------- */
.bill-layout { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
@media (max-width: 980px) { .bill-layout { grid-template-columns: 1fr; } }
.cart-table td, .cart-table th { padding: 8px 10px; }
.cart-qty-input { width: 56px; padding: 6px; text-align: center; }
.cart-disc-input { width: 64px; padding: 6px; text-align: center; }
.bill-summary-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13.5px; }
.bill-summary-row.total { font-size: 17px; font-weight: 700; border-top: 1px solid var(--line); margin-top: 8px; padding-top: 10px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--line); }
.tab-btn { padding: 9px 14px; background: none; border: none; cursor: pointer; font-weight: 600; color: var(--muted); font-size: 13.5px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.product-pick-list { max-height: 260px; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; margin-top: 8px; }
.product-pick-item { display: flex; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 13.5px; }
.product-pick-item:last-child { border-bottom: none; }
.product-pick-item:hover { background: var(--paper); }
.product-pick-item .ppi-stock { font-size: 11.5px; color: var(--muted); }

</style>
</head>
<body>
  <script>
    // TEMPORARY DEBUG OVERLAY — shows JS errors directly on screen since there's
    // no PC to check the browser console from. Safe to remove once things work.
    (function () {
      function showError(msg) {
        let box = document.getElementById('__debug_overlay');
        if (!box) {
          box = document.createElement('div');
          box.id = '__debug_overlay';
          box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;' +
            'background:#c62828;color:#fff;font:12px monospace;padding:10px;' +
            'max-height:40vh;overflow:auto;white-space:pre-wrap;';
          document.body.appendChild(box);
        }
        const line = document.createElement('div');
        line.style.marginBottom = '8px';
        line.style.borderBottom = '1px solid rgba(255,255,255,.3)';
        line.textContent = msg;
        box.appendChild(line);
      }
      window.addEventListener('error', (e) => {
        showError('ERROR: ' + e.message + '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno);
      });
      window.addEventListener('unhandledrejection', (e) => {
        showError('UNHANDLED PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });
    })();
  </script>

  <div id="app-root">
    <div style="font-family:sans-serif;max-width:480px;margin:60px auto;padding:20px;text-align:center;color:#555;">
      Loading Stationery Manager…
    </div>
  </div>

  <div id="toast-container" class="no-print"></div>

  <script>
    function showStartupError(title, detail) {
      var root = document.getElementById('app-root');
      if (!root) return;
      root.innerHTML =
        '<div style="font-family:sans-serif;max-width:520px;margin:40px auto;padding:20px;border:2px solid #B3261E;border-radius:10px;background:#FBE2E0;color:#23293B;">' +
        '<h2 style="margin-top:0;color:#B3261E;">Something went wrong while starting the app</h2>' +
        '<p><strong>' + title + '</strong></p>' +
        '<pre style="white-space:pre-wrap;word-break:break-word;background:#fff;padding:10px;border-radius:6px;font-size:12px;">' + detail + '</pre>' +
        '<p style="font-size:13px;">Please screenshot this whole box and share it — it tells us exactly what to fix.</p>' +
        '</div>';
    }
    window.addEventListener('error', function (e) {
      showStartupError(e.message || 'Script error', (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack ? e.error.stack : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      showStartupError('Unhandled error (promise)', (e.reason && e.reason.stack) ? e.reason.stack : String(e.reason));
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        nav
