              ${suppliers.map(s => `<option value="${s.id}" ${p?.supplierId === s.id ? 'selected' : ''}>${esc(s.name)}</option>`).join('')}
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>Current Stock *
            <input type="number" id="p-stock" min="0" required value="${p?.stock ?? 0}">
          </label>
          <label>Minimum Stock (alert level)
            <input type="number" id="p-minstock" min="0" value="${p?.minStock ?? 5}">
          </label>
        </div>

        <div id="product-error" class="form-error" style="display:none;"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="product-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">${p ? 'Save Changes' : 'Add Product'}</button>
        </div>
      </form>
    `);

    let pendingImage = p?.imageDataUrl || '';
    document.getElementById('p-image').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      pendingImage = await fileToCompressedDataUrl(file);
      document.getElementById('img-preview').src = pendingImage;
      document.getElementById('img-preview').style.display = '';
      document.getElementById('img-placeholder').style.display = 'none';
    });

    body.querySelector('#product-cancel').onclick = () => Modal.close();
    document.getElementById('p-scan-barcode').onclick = () => {
      BarcodeScanner.open((code) => {
        document.getElementById('p-barcode').value = code;
        Toast.show('Barcode captured.', 'success');
      }, { title: 'Scan Product Barcode' });
    };
    body.querySelector('#product-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const record = {
        name: document.getElementById('p-name').value.trim(),
        barcode: document.getElementById('p-barcode').value.trim(),
        category: document.getElementById('p-category').value.trim(),
        brand: document.getElementById('p-brand').value.trim(),
        shelfLocation: document.getElementById('p-shelf').value.trim(),
        purchasePrice: round2(document.getElementById('p-purchase').value),
        sellingPrice: round2(document.getElementById('p-selling').value),
        gstPercent: Number(document.getElementById('p-gst').value),
        supplierId: document.getElementById('p-supplier').value || null,
        stock: Number(document.getElementById('p-stock').value),
        minStock: Number(document.getElementById('p-minstock').value) || 0,
        imageDataUrl: pendingImage
      };
      if (!record.name) {
        const err = document.getElementById('product-error');
        err.textContent = 'Product name is required.'; err.style.display = 'block';
        return;
      }
      if (p) Store.update('products', p.id, record);
      else Store.insert('products', record);
      Modal.close();
      Toast.show(p ? 'Product updated.' : 'Product added.', 'success');
      this.render();
    });
  },

  openImport() {
    const body = Modal.open('Import Products from CSV', `
      <p class="text-muted" style="margin-bottom:14px;">
        Works with most shop inventory spreadsheets (including Vyapar exports) — it automatically looks for
        columns like Name, Barcode/Item Code, Category, Brand, Purchase Price, Selling Price, GST%, Stock, and Shelf.
        Save your Excel file as <strong>CSV</strong> first, then choose it below.
      </p>
      <label>CSV File
        <input type="file" id="import-file" accept=".csv,text/csv">
      </label>
      <div id="import-preview"></div>
    `, { wide: true });

    document.getElementById('import-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const rows = parseCSV(reader.result);
        if (rows.length === 0) {
          document.getElementById('import-preview').innerHTML = `<div class="form-error">No rows found in that file.</div>`;
          return;
        }
        const mapped = rows.map(r => ({
          name: pickField(r, ['Name', 'Item Name', 'Product Name', 'Item']),
          barcode: pickField(r, ['Barcode', 'Item Code', 'Code', 'SKU']),
          category: pickField(r, ['Category', 'Group', 'Item Group']),
          brand: pickField(r, ['Brand']),
          purchasePrice: Number(pickField(r, ['Purchase Price', 'Cost Price', 'Cost'])) || 0,
          sellingPrice: Number(pickField(r, ['Selling Price', 'Sale Price', 'Sales Price', 'MRP', 'Price'])) || 0,
          gstPercent: Number(pickField(r, ['GST%', 'GST', 'Tax Rate', 'Tax %'])) || 0,
          stock: Number(pickField(r, ['Stock', 'Opening Stock', 'Current Stock', 'Stock Quantity', 'Qty', 'Quantity'])) || 0,
          minStock: Number(pickField(r, ['Min Stock', 'Minimum Stock', 'Reorder Level'])) || 5,
          shelfLocation: pickField(r, ['Shelf', 'Shelf Location', 'Location', 'Rack']),
          supplierName: pickField(r, ['Supplier', 'Supplier Name'])
        })).filter(m => m.name);

        document.getElementById('import-preview').innerHTML = `
          <div class="card" style="margin-top:14px;">
            <p><strong>${mapped.length}</strong> product${mapped.length === 1 ? '' : 's'} found and ready to import.</p>
            <div class="table-wrap" style="max-height:240px; overflow-y:auto; margin-top:8px;">
              <table><thead><tr><th>Name</th><th class="num">Purchase</th><th class="num">Selling</th><th class="num">Stock</th></tr></thead>
              <tbody>${mapped.slice(0, 12).map(m => `<tr><td>${esc(m.name)}</td><td class="num">${formatMoney(m.purchasePrice)}</td><td class="num">${formatMoney(m.sellingPrice)}</td><td class="num">${m.stock}</td></tr>`).join('')}</tbody></table>
            </div>
            ${mapped.length > 12 ? `<p class="text-muted" style="margin-top:6px;">…and ${mapped.length - 12} more.</p>` : ''}
            <div class="form-actions"><button class="btn btn-primary" id="do-import">Import ${mapped.length} Product${mapped.length === 1 ? '' : 's'}</button></div>
          </div>`;

        document.getElementById('do-import').onclick = () => {
          let added = 0, updated = 0;
          mapped.forEach(m => {
            let supplierId = null;
            if (m.supplierName) {
              let sup = Store.all('suppliers').find(s => s.name.toLowerCase() === m.supplierName.toLowerCase());
              if (!sup) sup = Store.insert('suppliers', { name: m.supplierName, outstandingBalance: 0 });
              supplierId = sup.id;
            }
            const existing = (m.barcode ? Store.all('products').find(p => p.barcode && p.barcode === m.barcode) : null)
              || Store.all('products').find(p => p.name.trim().toLowerCase() === m.name.trim().toLowerCase());
            const record = { ...m, supplierId };
            delete record.supplierName;
            if (existing) {
              // Don't let a blank cell in this import erase a value the product already has.
              ['category', 'brand', 'shelfLocation', 'barcode'].forEach(field => {
                if (!record[field] && existing[field]) record[field] = existing[field];
              });
              Store.update('products', existing.id, record); updated++;
            } else {
              Store.insert('products', record); added++;
            }
          });
          Modal.close();
          Toast.show(`Import complete: ${added} added, ${updated} updated.`, 'success');
          this.render();
        };
      };
      reader.readAsText(file);
    });
  },

  findDuplicates() {
    const products = Store.all('products');
    const groups = {};
    products.forEach(p => {
      const key = p.name.trim().toLowerCase();
      groups[key] = groups[key] || [];
      groups[key].push(p);
    });
    const dupeGroups = Object.values(groups).filter(g => g.length > 1);

    if (dupeGroups.length === 0) {
      Toast.show('No duplicate product names found.', 'success');
      return;
    }

    // For each group, keep the copy that looks most "complete": highest stock,
    // then has a category set, then most recently updated.
    const plan = dupeGroups.map(group => {
      const sorted = [...group].sort((a, b) => {
        if ((b.stock || 0) !== (a.stock || 0)) return (b.stock || 0) - (a.stock || 0);
        if (!!b.category !== !!a.category) return (b.category ? 1 : 0) - (a.category ? 1 : 0);
        return new Date(b.updatedAt) - new Date(a.updatedAt);
      });
      return { keep: sorted[0], remove: sorted.slice(1) };
    });
    const totalToRemove = plan.reduce((a, g) => a + g.remove.length, 0);

    const body = Modal.open('Duplicate Products Found', `
      <p class="text-muted" style="margin-bottom:14px;">
        Found <strong>${dupeGroups.length}</strong> product name${dupeGroups.length === 1 ? '' : 's'} with duplicates
        (<strong>${totalToRemove}</strong> extra record${totalToRemove === 1 ? '' : 's'} total).
        For each, the copy with the most stock (and other details filled in) will be kept — the rest will be deleted.
        Past sales/purchases are not affected.
      </p>
      <div class="table-wrap" style="max-height:320px;overflow-y:auto;">
        <table>
          <thead><tr><th>Product</th><th class="num">Copies Found</th><th class="num">Stock Kept</th><th class="num">Will Delete</th></tr></thead>
          <tbody>
            ${plan.map(g => `<tr><td>${esc(g.keep.name)}</td><td class="num">${g.remove.length + 1}</td><td class="num">${g.keep.stock}</td><td class="num">${g.remove.length}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="dupe-cancel">Cancel</button>
        <button class="btn btn-danger" id="dupe-confirm">Remove ${totalToRemove} Duplicate${totalToRemove === 1 ? '' : 's'}</button>
      </div>
    `, { wide: true });

    document.getElementById('dupe-cancel').onclick = () => Modal.close();
    document.getElementById('dupe-confirm').onclick = () => {
      plan.forEach(g => g.remove.forEach(p => Store.remove('products', p.id)));
      Modal.close();
      Toast.show(`Removed ${totalToRemove} duplicate product${totalToRemove === 1 ? '' : 's'}.`, 'success');
      this.render();
    };
  },

  async deleteProduct(id) {
    const p = Store.get('products', id);
    if (!p) return;
    const usedInSales = Store.all('sales').some(s => (s.items || []).some(it => it.productId === id));
    const msg = usedInSales
      ? `"${p.name}" has past sales linked to it. Deleting it will keep old invoices intact but remove it from inventory. Continue?`
      : `Delete "${p.name}" from inventory? This cannot be undone.`;
    if (await Modal.confirm(msg, 'Delete Product')) {
      Store.remove('products', id);
      Toast.show('Product deleted.', 'success');
      this.render();
    }
  }
};


/* ===================== smart-command.js ===================== */
/* =========================================================================
   smart-command.js — a small offline command parser for the Inventory tab.
   No internet or API key needed: it matches typed (or spoken) text against
   a fixed set of phrasing patterns and runs the matching action directly
   through Inventory/Store. Not a full AI — it understands specific phrasings,
   not open-ended language. Add new patterns to `PATTERNS` to teach it more.
   ========================================================================= */

const SmartCommand = {

  // Finds the product whose name best matches a typed fragment.
  _findProduct(fragment) {
    const q = (fragment || '').trim().toLowerCase();
    if (!q) return null;
    const products = Store.all('products');
    let exact = products.find(p => p.name.toLowerCase() === q);
    if (exact) return exact;
    const starts = products.filter(p => p.name.toLowerCase().startsWith(q));
    if (starts.length === 1) return starts[0];
    const contains = products.filter(p => p.name.toLowerCase().includes(q));
    if (contains.length === 1) return contains[0];
    // Multiple or zero matches: return the shortest-name match among candidates as the best guess.
    const pool = starts.length ? starts : contains;
    if (pool.length > 1) return pool.sort((a, b) => a.name.length - b.name.length)[0];
    return null;
  },

  _multiMatches(fragment) {
    const q = (fragment || '').trim().toLowerCase();
    const products = Store.all('products');
    return products.filter(p => p.name.toLowerCase().includes(q));
  },

  PATTERNS: [
    {
      // "add 10 stock to apsara pen" / "add 10 apsara pen stock" / "increase stock of X by 10"
      re: /^(?:add|increase)\s+(\d+)\s+(?:stock\s+(?:to|for)\s+)?(?:to\s+)?(?:stock\s+of\s+)?(.+?)(?:\s+stock)?$/i,
      handler(m) {
        const qty = parseInt(m[1], 10);
        const name = m[2].replace(/^stock of\s+/i, '').replace(/\s+by$/i, '').trim();
        return SmartCommand._adjustStock(name, qty);
      }
    },
    {
      // "increase stock of X by 10" (explicit "by")
      re: /^increase\s+stock\s+of\s+(.+?)\s+by\s+(\d+)$/i,
      handler(m) { return SmartCommand._adjustStock(m[1], parseInt(m[2], 10)); }
    },
    {
      // "reduce/remove/decrease 5 stock from X" / "decrease stock of X by 5"
      re: /^(?:reduce|remove|decrease)\s+(\d+)\s+(?:stock\s+)?(?:from|of)\s+(.+)$/i,
      handler(m) { return SmartCommand._adjustStock(m[2], -parseInt(m[1], 10)); }
    },
    {
      re: /^decrease\s+stock\s+of\s+(.+?)\s+by\s+(\d+)$/i,
      handler(m) { return SmartCommand._adjustStock(m[1], -parseInt(m[2], 10)); }
    },
    {
      // "set stock of X to 20" / "set X stock to 20"
      re: /^set\s+(?:stock\s+of\s+)?(.+?)\s+stock\s+to\s+(\d+)$/i,
      handler(m) { return SmartCommand._setStock(m[1], parseInt(m[2], 10)); }
    },
    {
      re: /^set\s+stock\s+of\s+(.+?)\s+to\s+(\d+)$/i,
      handler(m) { return SmartCommand._setStock(m[1], parseInt(m[2], 10)); }
    },
    {
      // "set price of X to 50" / "set selling price of X to 50" / "change price of X to 50"
      re: /^(?:set|change)\s+(?:selling\s+)?price\s+of\s+(.+?)\s+to\s+(\d+(?:\.\d+)?)$/i,
      handler(m) { return SmartCommand._setPrice(m[1], parseFloat(m[2])); }
    },
    {
      // "delete X" / "remove X from inventory" / "delete all items with 0 stock"
      re: /^delete\s+all\s+(?:items?|products?)\s+with\s+0\s+stock$/i,
      handler() { return SmartCommand._deleteZeroStock(); }
    },
    {
      re: /^(?:delete|remove)\s+(.+?)(?:\s+from\s+inventory)?$/i,
      handler(m) { return SmartCommand._deleteProduct(m[1]); }
    },
    {
      // "search X" / "find X" / "show X"
      re: /^(?:search|find|show)\s+(?:for\s+)?(.+)$/i,
      handler(m) {
        const term = m[1].trim();
        if (/^low stock$/i.test(term)) return SmartCommand._showLowStock();
        if (/^out of stock$/i.test(term)) return SmartCommand._showOutOfStock();
        Inventory._search = term;
        Inventory._categoryFilter = '';
        Inventory.render();
        return { ok: true, message: `Filtered inventory to "${term}".` };
      }
    },
    {
      re: /^low\s*stock$/i,
      handler() { return SmartCommand._showLowStock(); }
    },
    {
      re: /^out\s*of\s*stock$/i,
      handler() { return SmartCommand._showOutOfStock(); }
    },
  ],

  _adjustStock(nameFragment, delta) {
    const p = this._findProduct(nameFragment);
    if (!p) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    const newStock = Math.max(0, Number(p.stock || 0) + delta);
    Store.update('products', p.id, { stock: newStock });
    Inventory.render();
    return { ok: true, message: `${delta >= 0 ? 'Added' : 'Removed'} ${Math.abs(delta)} — "${p.name}" stock is now ${newStock}.` };
  },

  _setStock(nameFragment, value) {
    const p = this._findProduct(nameFragment);
    if (!p) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    Store.update('products', p.id, { stock: value });
    Inventory.render();
    return { ok: true, message: `"${p.name}" stock set to ${value}.` };
  },

  _setPrice(nameFragment, value) {
    const p = this._findProduct(nameFragment);
    if (!p) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    Store.update('products', p.id, { sellingPrice: value });
    Inventory.render();
    return { ok: true, message: `"${p.name}" selling price set to ${formatMoney(value)}.` };
  },

  async _deleteProduct(nameFragment) {
    const matches = this._multiMatches(nameFragment);
    if (matches.length === 0) return { ok: false, message: `Couldn't find a product matching "${nameFragment.trim()}".` };
    if (matches.length > 1) {
      const p = this._findProduct(nameFragment);
      if (!p) return { ok: false, message: `Multiple products match "${nameFragment.trim()}" — try being more specific.` };
      matches.length = 0; matches.push(p);
    }
    const p = matches[0];
    if (await Modal.confirm(`Delete "${p.name}" from inventory? This cannot be undone.`, 'Delete Product')) {
      Store.remove('products', p.id);
      Inventory.render();
      return { ok: true, message: `"${p.name}" deleted.` };
    }
    return { ok: true, message: 'Cancelled.' };
  },

  async _deleteZeroStock() {
    const zero = Store.all('products').filter(p => Number(p.stock || 0) <= 0);
    if (zero.length === 0) return { ok: true, message: 'No products currently have 0 stock.' };
    if (await Modal.confirm(`Delete ${zero.length} product(s) with 0 stock? This cannot be undone.`, `Delete ${zero.length} Products`)) {
      zero.forEach(p => Store.remove('products', p.id));
      Inventory.render();
      return { ok: true, message: `Deleted ${zero.length} product(s) with 0 stock.` };
    }
    return { ok: true, message: 'Cancelled.' };
  },

  _showLowStock() {
    const low = Store.all('products').filter(p => Number(p.stock) <= Number(p.minStock || 0));
    Inventory._search = '';
    Inventory._categoryFilter = '';
    Inventory.render();
    return { ok: true, message: `${low.length} product(s) at or below minimum stock. (Showing full list — sort by the Stock column.)` };
  },

  _showOutOfStock() {
    const out = Store.all('products').filter(p => Number(p.stock || 0) <= 0);
    Inventory._search = '';
    Inventory.render();
    return { ok: true, message: `${out.length} product(s) are out of stock: ${out.slice(0, 5).map(p => p.name).join(', ')}${out.length > 5 ? ', …' : ''}` };
  },

  async run(text) {
    const clean = (text || '').trim().replace(/[.?!]+$/, '');
    if (!clean) return { ok: false, message: 'Type a command first.' };
    for (const pattern of this.PATTERNS) {
      const m = clean.match(pattern.re);
      if (m) {
        try {
          return await pattern.handler(m);
        } catch (err) {
          console.error('SmartCommand error', err);
          return { ok: false, message: 'Something went wrong running that command.' };
        }
      }
    }
    return {
      ok: false,
      message: `I didn't recognize that. Try things like:
      • "add 10 stock to Apsara pen"
      • "reduce 5 stock from Doms eraser"
      • "set price of Camlin marker to 45"
      • "delete Fevicol"
      • "delete all items with 0 stock"
      • "show low stock" / "show out of stock"
      • "search notebooks"`
    };
  },

  open() {
    const body = Modal.open('💬 Smart Command', `
      <p class="text-muted" style="margin-bottom:14px;font-size:13px;">
        Type a command in plain words. Works offline — no internet needed.
      </p>
      <div class="flex" style="gap:8px;">
        <input type="text" id="sc-input" placeholder="e.g. add 10 stock to Apsara pen" style="flex:1;" autocomplete="off">
        <button type="button" class="btn btn-secondary btn-icon" id="sc-mic" title="Speak command">🎤</button>
      </div>
      <div id="sc-result" style="margin-top:14px;font-size:14px;white-space:pre-line;"></div>
      <div class="form-actions" style="margin-top:18px;">
        <button type="button" class="btn btn-ghost" id="sc-close">Close</button>
        <button type="button" class="btn btn-primary" id="sc-run">Run</button>
      </div>
    `);
    const input = body.querySelector('#sc-input');
    const resultBox = body.querySelector('#sc-result');
    input.focus();

    const runCmd = async () => {
      const result = await this.run(input.value);
      resultBox.textContent = result.message;
      resultBox.style.color = result.ok ? 'var(--good, #2e7d32)' : 'var(--bad, #c62828)';
      if (result.ok) input.value = '';
    };

    body.querySelector('#sc-run').onclick = runCmd;
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') runCmd(); });
    body.querySelector('#sc-close').onclick = () => Modal.close();

    const micBtn = body.querySelector('#sc-mic');
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) {
      micBtn.disabled = true;
      micBtn.title = 'Voice input not supported in this browser';
    } else {
      micBtn.onclick = () => {
        const rec = new SpeechRec();
        rec.lang = 'en-IN';
        rec.interimResults = false;
        micBtn.textContent = '🎙️…';
        rec.onresult = (e) => {
          input.value = e.results[0][0].transcript;
          micBtn.textContent = '🎤';
        };
        rec.onerror = () => { micBtn.textContent = '🎤'; };
        rec.onend = () => { micBtn.textContent = '🎤'; };
        rec.start();
      };
    }
  }
};


/* ===================== sales.js ===================== */
/* =========================================================================
   sales.js — the billing counter. Two views: "New Sale" (fast checkout)
   and "Invoice History" (search past invoices, print, return/exchange).
   ========================================================================= */

const Sales = {
  _tab: 'bill',
  _cart: [],           // [{ productId, name, price, gstPercent, qty, discount }]
  _customerId: '',
  _paymentMode: 'Cash',
  _amountPaid: '',
  _redeemPoints: false,
  _historySearch: '',

  render() {
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="tabs no-print">
        <button class="tab-btn ${this._tab === 'bill' ? 'active' : ''}" id="tab-bill">🧾 New Sale</button>
        <button class="tab-btn ${this._tab === 'history' ? 'active' : ''}" id="tab-history">📜 Invoice History</button>
      </div>
      <div id="sales-tab-content"></div>
    `;
    document.getElementById('tab-bill').onclick = () => { this._tab = 'bill'; this.render(); };
    document.getElementById('tab-history').onclick = () => { this._tab = 'history'; this.render(); };
    if (this._tab === 'bill') this.renderBillingScreen();
    else this.renderHistory();
  },

  /* ============================== NEW SALE ============================== */

  renderBillingScreen() {
    const el = document.getElementById('sales-tab-content');
    const customers = Store.all('customers');
    const totals = this._computeTotals();
    const selectedCustomer = this._customerId ? Store.get('customers', this._customerId) : null;

    el.innerHTML = `
      <div class="bill-layout">
        <div>
          <div class="card">
            <label>Scan Barcode or Search Product
              <div class="flex gap-8">
                <input type="text" id="product-search" placeholder="Type product name or scan/type barcode, then press Enter" autocomplete="off" style="flex:1;">
                <button type="button" class="btn btn-secondary btn-icon" id="bill-scan-btn" title="Scan with camera">📷</button>
              </div>
            </label>
            <div id="product-pick-results"></div>
          </div>

          <div class="section-title"><h3>Cart</h3></div>
          <div class="table-wrap">
            ${this._cart.length === 0 ? `<div class="empty-state"><div class="empty-mark">🛒</div>Cart is empty. Search a product above to add it.</div>` : `
            <table class="cart-table">
              <thead><tr><th>Item</th><th class="num">Price</th><th class="num">Qty</th><th class="num">Disc ₹</th><th class="num">GST%</th><th class="num">Total</th><th></th></tr></thead>
              <tbody>
                ${this._cart.map((c, idx) => {
                  const lineSubtotal = c.price * c.qty - (Number(c.discount) || 0);
                  const { total } = calcGST(lineSubtotal, c.gstPercent);
                  return `
                  <tr>
                    <td>${esc(c.name)}</td>
                    <td class="num">${formatMoney(c.price)}</td>
                    <td class="num"><input type="number" min="1" class="cart-qty-input" data-idx="${idx}" data-field="qty" value="${c.qty}"></td>
                    <td class="num"><input type="number" min="0" class="cart-disc-input" data-idx="${idx}" data-field="discount" value="${c.discount || 0}"></td>
                    <td class="num">${c.gstPercent}%</td>
                    <td class="num">${formatMoney(total)}</td>
                    <td><button class="btn btn-ghost btn-sm" data-remove="${idx}">✕</button></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>`}
          </div>
        </div>

        <div>
          <div class="card">
            <label>Customer (optional)
              <select id="bill-customer">
                <option value="">Walk-in Customer</option>
                ${customers.map(c => `<option value="${c.id}" ${c.id === this._customerId ? 'selected' : ''}>${esc(c.name)} — ${esc(c.phone || '')}</option>`).join('')}
              </select>
            </label>
            <button class="btn btn-ghost btn-sm btn-block" id="bill-add-customer" style="margin-bottom:14px;">+ Add New Customer</button>

            ${selectedCustomer ? `
              <div class="chip" style="margin-bottom:12px;">Loyalty Points: <strong>${selectedCustomer.loyaltyPoints || 0}</strong></div>
              ${(selectedCustomer.loyaltyPoints || 0) > 0 ? `
              <label style="display:flex;align-items:center;gap:8px;flex-direction:row;">
                <input type="checkbox" id="redeem-points" style="width:auto;" ${this._redeemPoints ? 'checked' : ''}>
                Redeem ${selectedCustomer.loyaltyPoints} points (₹${selectedCustomer.loyaltyPoints} off)
              </label>` : ''}
            ` : ''}

            <label>Payment Mode
              <select id="bill-payment-mode">
                ${(Settings.get().paymentModes && Settings.get().paymentModes.length ? Settings.get().paymentModes : ['Cash', 'UPI', 'Card', 'Credit']).map(m => `<option ${m === this._paymentMode ? 'selected' : ''}>${esc(m)}</option>`).join('')}
              </select>
            </label>

            <div class="bill-summary-row"><span>Subtotal</span><span>${formatMoney(totals.subtotal)}</span></div>
            <div class="bill-summary-row"><span>Item Discounts</span><span>− ${formatMoney(totals.discountTotal)}</span></div>
            ${totals.pointsDiscount > 0 ? `<div class="bill-summary-row"><span>Points Redeemed</span><span>− ${formatMoney(totals.pointsDiscount)}</span></div>` : ''}
            <div class="bill-summary-row"><span>GST</span><span>${formatMoney(totals.gstTotal)}</span></div>
            <div class="bill-summary-row total"><span>Total</span><span>${formatMoney(totals.grandTotal)}</span></div>

            <label style="margin-top:12px;">Amount Paid
              <input type="number" id="bill-amount-paid" min="0" step="0.01" placeholder="${totals.grandTotal.toFixed(2)}" value="${this._amountPaid}">
              <span class="field-hint">Leave blank to mark as fully paid. Less than total = credit balance on customer.</span>
            </label>

            <div class="form-actions" style="justify-content:stretch;">
              <button class="btn btn-ghost" id="bill-clear" style="flex:1;">Clear Cart</button>
              <button class="btn btn-primary" id="bill-save" style="flex:2;" ${this._cart.length === 0 ? 'disabled' : ''}>Save & Print Invoice</button>
            </div>
          </div>
        </div>
      </div>
    `;

    // ---- wire up events ----
    const searchInput = document.getElementById('product-search');
    searchInput.addEventListener('input', debounce((e) => this._showProductPicker(e.target.value), 150));
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        this._addByExactBarcodeOrTopMatch(searchInput.value);
        searchInput.value = '';
        document.getElementById('product-pick-results').innerHTML = '';
      }
    });

    document.getElementById('bill-scan-btn').onclick = () => {
      BarcodeScanner.open((code) => this._addByBarcodeExact(code), { title: 'Scan Product Barcode' });
    };
    el.querySelectorAll('[data-remove]').forEach(btn => btn.onclick = () => {
      this._cart.splice(Number(btn.dataset.remove), 1);
      this.renderBillingScreen();
    });
    el.querySelectorAll('.cart-qty-input, .cart-disc-input').forEach(inp => {
      inp.addEventListener('change', (e) => {
        const idx = Number(e.target.dataset.idx), field = e.target.dataset.field;
        const val = Math.max(0, Number(e.target.value) || 0);
        this._cart[idx][field] = field === 'qty' ? Math.max(1, val) : val;
        this.renderBillingScreen();
      });
    });

    document.getElementById('bill-customer').onchange = (e) => { this._customerId = e.target.value; this._redeemPoints = false; this.renderBillingScreen(); };
    document.getElementById('bill-add-customer').onclick = () => Customers.openForm(null, (newCust) => { this._customerId = newCust.id; this.renderBillingScreen(); });
    document.getElementById('bill-payment-mode').onchange = (e) => { this._paymentMode = e.target.value; };
    document.getElementById('bill-amount-paid').oninput = (e) => { this._amountPaid = e.target.value; this.renderBillingScreen(); };
    const redeemBox = document.getElementById('redeem-points');
    if (redeemBox) redeemBox.onchange = (e) => { this._redeemPoints = e.target.checked; this.renderBillingScreen(); };
    document.getElementById('bill-clear').onclick = async () => {
      if (this._cart.length === 0) return;
      if (await Modal.confirm('Clear the current cart?', 'Clear Cart')) { this._resetCart(); this.renderBillingScreen(); }
    };
    document.getElementById('bill-save').onclick = () => this.saveSale();
  },

  _showProductPicker(query) {
    const box = document.getElementById('product-pick-results');
    if (!query.trim()) { box.innerHTML = ''; return; }
    const q = query.trim().toLowerCase();
    const matches = Store.all('products').filter(p =>
      p.name.toLowerCase().includes(q) || (p.barcode || '').toLowerCase().includes(q)
    ).slice(0, 8);
    if (matches.length === 0) { box.innerHTML = `<div class="product-pick-list"><div class="product-pick-item text-muted">No products found.</div></div>`; return; }
    box.innerHTML = `<div class="product-pick-list">${matches.map(p => `
      <div class="product-pick-item" data-add="${p.id}">
        <span>${esc(p.name)} <span class="text-muted">${p.barcode ? '· ' + esc(p.barcode) : ''}</span></span>
        <span class="ppi-stock">${formatMoney(p.sellingPrice)} · ${p.stock} in stock</span>
      </div>`).join('')}</div>`;
    box.querySelectorAll('[data-add]').forEach(row => row.onclick = () => {
      this._addToCart(row.dataset.add);
      document.getElementById('product-search').value = '';
      box.innerHTML = '';
      document.getElementById('product-search').focus();
    });
  },

  _addByBarcodeExact(code) {
    const match = Store.all('products').find(p => (p.barcode || '').trim() === code.trim());
    if (match) { this._addToCart(match.id); Toast.show(`Added "${match.name}".`, 'success'); }
    else Toast.show(`No product found with barcode ${code}. Add it in Inventory first.`, 'error');
  },

  _addByExactBarcodeOrTopMatch(query) {
    if (!query.trim()) return;
    const q = query.trim().toLowerCase();
    const exact = Store.all('products').find(p => (p.barcode || '').toLowerCase() === q);
    if (exact) return this._addToCart(exact.id);
    const top = Store.all('products').find(p => p.name.toLowerCase().includes(q));
    if (top) return this._addToCart(top.id);
    Toast.show('No matching product found.', 'error');
  },

  _addToCart(productId) {
    const p = Store.get('products', productId);
    if (!p) return;
    if (p.stock <= 0) { Toast.show(`"${p.name}" is out of stock.`, 'error'); }
    const existing = this._cart.find(c => c.productId === productId);
    if (existing) existing.qty += 1;
    else this._cart.push({ productId: p.id, name: p.name, price: Number(p.sellingPrice), gstPercent: Number(p.gstPercent) || 0, qty: 1, discount: 0 });
    this.renderBillingScreen();
  },

  _computeTotals() {
    let subtotal = 0, discountTotal = 0, gstTotal = 0;
    this._cart.forEach(c => {
      const lineGross = c.price * c.qty;
      const disc = Number(c.discount) || 0;
      subtotal += lineGross;
      discountTotal += disc;
      const { gstAmount } = calcGST(lineGross - disc, c.gstPercent);
      gstTotal += gstAmount;
    });
    let grandTotal = round2(subtotal - discountTotal + gstTotal);
    let pointsDiscount = 0;
    if (this._redeemPoints && this._customerId) {
      const cust = Store.get('customers', this._customerId);
      pointsDiscount = Math.min(cust?.loyaltyPoints || 0, grandTotal);
      grandTotal = round2(grandTotal - pointsDiscount);
    }
    return { subtotal: round2(subtotal), discountTotal: round2(discountTotal), gstTotal: round2(gstTotal), grandTotal, pointsDiscount };
  },

  _resetCart() {
    this._cart = []; this._customerId = ''; this._paymentMode = 'Cash'; this._amountPaid = ''; this._redeemPoints = false;
  },

  saveSale() {
    if (this._cart.length === 0) return;
    // Guard against overselling.
    for (const c of this._cart) {
      const p = Store.get('products', c.productId);
      if (!p || p.stock < c.qty) {
        Toast.show(`Not enough stock for "${c.name}" (only ${p ? p.stock : 0} left).`, 'error');
        return;
      }
    }
    const totals = this._computeTotals();
    const amountPaid = this._amountPaid !== '' ? round2(this._amountPaid) : totals.grandTotal;
    const balance = round2(totals.grandTotal - amountPaid);

    const sale = Store.insert('sales', {
      invoiceNo: nextInvoiceNumber(),
      date: new Date().toISOString(),
      customerId: this._customerId || null,
      items: this._cart.map(c => ({ ...c })),
      subtotal: totals.subtotal,
      discountTotal: totals.discountTotal,
      pointsDiscount: totals.pointsDiscount,
      gstTotal: totals.gstTotal,
      grandTotal: totals.grandTotal,
      paymentMode: this._paymentMode,
      amountPaid,
      balance,
      status: 'completed',
      returns: [],
      createdBy: Auth.currentUser()?.name || 'Unknown'
    });

    // Decrement stock.
    this._cart.forEach(c => {
      const p = Store.get('products', c.productId);
      Store.update('products', c.productId, { stock: Math.max(0, p.stock - c.qty) });
    });

    // Update customer: purchase history is derived from sales lookup, but we update balance & loyalty here.
    if (this._customerId) {
      const cust = Store.get('customers', this._customerId);
      const pointsEarned = Math.floor(totals.grandTotal / 100); // 1 point per ₹100 spent
      const newPoints = Math.max(0, (cust.loyaltyPoints || 0) - totals.pointsDiscount + pointsEarned);
      Store.update('customers', this._customerId, {
        creditBalance: round2((cust.creditBalance || 0) + balance),
        loyaltyPoints: newPoints
      });
    }

    Toast.show(`Invoice ${sale.invoiceNo} saved.`, 'success');
    this._resetCart();
    this.printInvoice(sale.id);
    this.render();
  },

  /* ============================== HISTORY ============================== */

  renderHistory() {
    const el = document.getElementById('sales-tab-content');
    let sales = Store.all('sales').slice().sort((a, b) => new Date(b.date) - new Date(a.date));
    if (this._historySearch.trim()) {
      const q = this._historySearch.trim().toLowerCase();
      sales = sales.filter(s => {
        const cust = s.customerId ? Store.get('customers', s.customerId) : null;
        return s.invoiceNo.toLowerCase().includes(q) || (cust && cust.name.toLowerCase().includes(q));
      });
    }

    el.innerHTML = `
      <div class="toolbar">
        <div class="search-box"><input type="text" id="history-search" placeholder="Search invoice # or customer…" value="${esc(this._historySearch)}"></div>
      </div>
      <div class="table-wrap">
        ${sales.length === 0 ? `<div class="empty-state"><div class="empty-mark">📜</div>No invoices yet.</div>` : `
        <table>
          <thead><tr><th>Invoice #</th><th>Date</th><th>Customer</th><th class="num">Items</th><th class="num">Total</th><th>Payment</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${sales.map(s => {
              const cust = s.customerId ? Store.get('customers', s.customerId) : null;
              const hasReturn = (s.returns || []).length > 0;
              return `
              <tr>
                <td class="mono">${esc(s.invoiceNo)}</td>
                <td>${formatDate(s.date)}</td>
                <td>${cust ? esc(cust.name) : 'Walk-in'}</td>
                <td class="num">${(s.items || []).reduce((a, i) => a + i.qty, 0)}</td>
                <td class="num">${formatMoney(s.grandTotal)}</td>
                <td>${esc(s.paymentMode)}</td>
                <td>
                  ${s.balance > 0 ? `<span class="badge badge-warn">Due ${formatMoney(s.balance)}</span>` : `<span class="badge badge-good">Paid</span>`}
                  ${hasReturn ? `<span class="badge badge-muted">Return/Exchange</span>` : ''}
                </td>
                <td>
                  <div class="flex gap-8">
                    <button class="btn btn-ghost btn-sm" data-view="${s.id}">View</button>
                    <button class="btn btn-ghost btn-sm" data-return="${s.id}">Return/Exchange</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
    `;

    document.getElementById('history-search').addEventListener('input', debounce((e) => { this._historySearch = e.target.value; this.renderHistory(); }, 200));
    el.querySelectorAll('[data-view]').forEach(btn => btn.onclick = () => this.viewInvoice(btn.dataset.view));
    el.querySelectorAll('[data-return]').forEach(btn => btn.onclick = () => this.openReturnExchange(btn.dataset.return));
  },

  viewInvoice(saleId) {
    const s = Store.get('sales', saleId);
    if (!s) return;
    const body = Modal.open(`Invoice ${s.invoiceNo}`, this._invoiceHtml(s), { wide: false });
    const printBtn = document.createElement('button');
    printBtn.className = 'btn btn-primary btn-block';
    printBtn.textContent = '🖨 Print';
    printBtn.style.marginTop = '14px';
    printBtn.onclick = () => this.printInvoice(saleId);
    body.appendChild(printBtn);
  },

  _invoiceHtml(s) {
    const settings = Settings.get();
    const cust = s.customerId ? Store.get('customers', s.customerId) : null;
    return `
      <div class="receipt">
        <h4>${esc(settings.shopName || 'Stationery Shop')}</h4>
        ${settings.address ? `<p style="text-align:center;">${esc(settings.address)}</p>` : ''}
        ${settings.gstNumber ? `<p style="text-align:center;">GSTIN: ${esc(settings.gstNumber)}</p>` : ''}
        <hr>
        <div class="r-line"><span>Invoice</span><span>${esc(s.invoiceNo)}</span></div>
        <div class="r-line"><span>Date</span><span>${formatDateTime(s.date)}</span></div>
        <div class="r-line"><span>Customer</span><span>${cust ? esc(cust.name) : 'Walk-in'}</span></div>
        <hr>
        ${(s.items || []).map(it => `
          <div class="r-line"><span>${esc(it.name)} x${it.qty}</span><span>${formatMoney(it.price * it.qty - (it.discount || 0))}</span></div>
        `).join('')}
        <hr>
        <div class="r-line"><span>Subtotal</span><span>${formatMoney(s.subtotal)}</span></div>
        <div class="r-line"><span>Discount</span><span>-${formatMoney(s.discountTotal)}</span></div>
        <div class="r-line"><span>GST</span><span>${formatMoney(s.gstTotal)}</span></div>
        <div class="r-line r-total"><span>Total</span><span>${formatMoney(s.grandTotal)}</span></div>
        <div class="r-line"><span>Paid (${esc(s.paymentMode)})</span><span>${formatMoney(s.amountPaid)}</span></div>
        ${s.balance > 0 ? `<div class="r-line"><span>Balance Due</span><span>${formatMoney(s.balance)}</span></div>` : ''}
        <hr>
        <p style="text-align:center;">${esc(settings.invoiceFooterNote || 'Thank you!')}</p>
      </div>`;
  },

  printInvoice(saleId) {
    const s = Store.get('sales', saleId);
    if (!s) return;
    let area = document.getElementById('print-area');
    if (!area) { area = document.createElement('div'); area.id = 'print-area'; document.body.appendChild(area); }
    area.innerHTML = this._invoiceHtml(s);
    setTimeout(() => window.print(), 80);
  },

  /* ============================== RETURN / EXCHANGE ============================== */

  openReturnExchange(saleId) {
    const s = Store.get('sales', saleId);
    if (!s) return;
    const alreadyReturned = {};
    (s.returns || []).forEach(r => r.items.forEach(it => { alreadyReturned[it.productId] = (alreadyReturned[it.productId] || 0) + it.qty; }));

    const body = Modal.open(`Return / Exchange — ${s.invoiceNo}`, `
      <p class="text-muted" style="margin-bottom:14px;">Set a return quantity for any item. Returned items go back into stock and the refund is calculated automatically. To exchange, return the old item and add the replacement from the New Sale screen for any price difference.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Item</th><th class="num">Sold</th><th class="num">Already Returned</th><th class="num">Return Qty</th></tr></thead>
          <tbody>
            ${(s.items || []).map((it, idx) => {
              const maxReturnable = it.qty - (alreadyReturned[it.productId] || 0);
              return `
              <tr>
                <td>${esc(it.name)}</td>
                <td class="num">${it.qty}</td>
                <td class="num">${alreadyReturned[it.productId] || 0}</td>
                <td class="num"><input type="number" min="0" max="${maxReturnable}" value="0" class="cart-qty-input" data-return-idx="${idx}" ${maxReturnable <= 0 ? 'disabled' : ''}></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div id="refund-preview" class="bill-summary-row total" style="margin-top:14px;"><span>Refund Amount</span><span id="refund-amount">${formatMoney(0)}</span></div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="re-cancel">Cancel</button>
        <button class="btn btn-danger" id="re-confirm">Process Return</button>
      </div>
    `, { wide: true });

    const recalc = () => {
      let refund = 0;
      body.querySelectorAll('[data-return-idx]').forEach(inp => {
        const idx = Number(inp.dataset.returnIdx);
        const qty = Number(inp.value) || 0;
        const it = s.items[idx];
        if (qty > 0) {
          const unitNet = (it.price * it.qty - (it.discount || 0)) / it.qty;
          const { total } = calcGST(unitNet * qty, it.gstPercent);
          refund += total;
        }
      });
      document.getElementById('refund-amount').textContent = formatMoney(round2(refund));
    };
    body.querySelectorAll('[data-return-idx]').forEach(inp => inp.addEventListener('input', recalc));

    document.getElementById('re-cancel').onclick = () => Modal.close();
    document.getElementById('re-confirm').onclick = async () => {
      const returnItems = [];
      let refundTotal = 0;
      body.querySelectorAll('[data-return-idx]').forEach(inp => {
        const idx = Number(inp.dataset.returnIdx);
        const qty = Number(inp.value) || 0;
        if (qty > 0) {
          const it = s.items[idx];
          const unitNet = (it.price * it.qty - (it.discount || 0)) / it.qty;
          const { total } = calcGST(unitNet * qty, it.gstPercent);
          returnItems.push({ productId: it.productId, name: it.name, qty, refundAmount: round2(total) });
          refundTotal += total;
        }
      });
      if (returnItems.length === 0) { Toast.show('Enter a return quantity for at least one item.', 'error'); return; }
      if (!(await Modal.confirm(`Refund ${formatMoney(round2(refundTotal))} and restock these items?`, 'Process Return'))) return;

      returnItems.forEach(ri => {
        const p = Store.get('products', ri.productId);
        if (p) Store.update('products', ri.productId, { stock: p.stock + ri.qty });
      });
      const updatedReturns = [...(s.returns || []), { date: new Date().toISOString(), items: returnItems, totalRefund: round2(refundTotal) }];
      Store.update('sales', s.id, { returns: updatedReturns });

      if (s.customerId) {
        const cust = Store.get('customers', s.customerId);
        if (cust) Store.update('customers', s.customerId, { creditBalance: round2((cust.creditBalance || 0) - refundTotal) });
      }

      Modal.close();
      Toast.show('Return processed and stock updated.', 'success');
      this.renderHistory();
    };
  }
};


/* ===================== purchases.js ===================== */
/* =========================================================================
   purchases.js — recording stock coming IN from suppliers.
   Two views: "New Purchase" (entry form) and "Purchase History" (list +
   due payment tracking).
   ========================================================================= */

const Purchases = {
  _tab: 'new',
  _items: [],  // [{ productId, name, qty, cost, gstPercent }]
  _supplierId: '',
  _amountPaid: '',
  _dueDate: '',
  _historySearch: '',

  render() {
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="tabs">
        <button class="tab-btn ${this._tab === 'new' ? 'active' : ''}" id="tab-new-purchase">⇩ New Purchase</button>
        <button class="tab-btn ${this._tab === 'history' ? 'active' : ''}" id="tab-purchase-history">📜 Purchase History</button>
      </div>
      <div id="purchase-tab-content"></div>
    `;
    document.getElementById('tab-new-purchase').onclick = () => { this._tab = 'new'; this.render(); };
    document.getElementById('tab-purchase-history').onclick = () => { this._tab = 'history'; this.render(); };
    if (this._tab === 'new') this.renderEntry();
    else this.renderHistory();
  },

  /* ============================== NEW PURCHASE ============================== */

  renderEntry() {
    const el = document.getElementById('purchase-tab-content');
    const suppliers = Store.all('suppliers');
    const products = Store.all('products');
    const totals = this._computeTotals();

    el.innerHTML = `
      <div class="bill-layout">
        <div>
          <div class="card">
            <label>Add Product to Purchase
              <select id="purchase-product-select">
                <option value="">— Select a product —</option>
                ${products.map(p => `<option value="${p.id}">${esc(p.name)} (current stock: ${p.stock})</option>`).join('')}
              </select>
            </label>
            <button class="btn btn-secondary btn-sm" id="purchase-add-item">+ Add Item</button>
            <p class="field-hint" style="margin-top:8px;">Don't see the product? <a href="#inventory">Add it to Inventory first</a>.</p>
          </div>

          <div class="section-title"><h3>Items</h3></div>
          <div class="table-wrap">
            ${this._items.length === 0 ? `<div class="empty-state"><div class="empty-mark">⇩</div>No items added yet.</div>` : `
            <table class="cart-table">
              <thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Cost/unit</th><th class="num">GST%</th><th class="num">Total</th><th></th></tr></thead>
              <tbody>
                ${this._items.map((it, idx) => {
                  const { total } = calcGST(it.qty * it.cost, it.gstPercent);
                  return `
                  <tr>
                    <td>${esc(it.name)}</td>
                    <td class="num"><input type="number" min="1" class="cart-qty-input" data-idx="${idx}" data-field="qty" value="${it.qty}"></td>
                    <td class="num"><input type="number" min="0" step="0.01" class="cart-disc-input" data-idx="${idx}" data-field="cost" value="${it.cost}"></td>
                    <td class="num"><input type="number" min="0" max="28" class="cart-disc-input" data-idx="${idx}" data-field="gstPercent" value="${it.gstPercent}"></td>
                    <td class="num">${formatMoney(total)}</td>
                    <td><button class="btn btn-ghost btn-sm" data-remove="${idx}">✕</button></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>`}
          </div>
        </div>

        <div>
          <div class="card">
            <label>Supplier
              <select id="purchase-supplier">
                <option value="">— Select supplier —</option>
                ${suppliers.map(s => `<option value="${s.id}" ${s.id === this._supplierId ? 'selected' : ''}>${esc(s.name)}</option>`).join('')}
              </select>
            </label>
            <button class="btn btn-ghost btn-sm btn-block" id="purchase-add-supplier" style="margin-bottom:14px;">+ Add New Supplier</button>

            <div class="bill-summary-row"><span>Subtotal</span><span>${formatMoney(totals.subtotal)}</span></div>
            <div class="bill-summary-row"><span>GST</span><span>${formatMoney(totals.gstTotal)}</span></div>
            <div class="bill-summary-row total"><span>Total</span><span>${formatMoney(totals.grandTotal)}</span></div>

            <label style="margin-top:12px;">Amount Paid Now
              <input type="number" id="purchase-amount-paid" min="0" step="0.01" placeholder="${totals.grandTotal.toFixed(2)}" value="${this._amountPaid}">
              <span class="field-hint">Leave blank for fully paid. Less than total creates a due balance.</span>
            </label>
            <label>Payment Due Date (optional)
              <input type="date" id="purchase-due-date" value="${this._dueDate}">
            </label>

            <div class="form-actions" style="justify-content:stretch;">
              <button class="btn btn-ghost" id="purchase-clear" style="flex:1;">Clear</button>
              <button class="btn btn-primary" id="purchase-save" style="flex:2;" ${this._items.length === 0 || !this._supplierId ? 'disabled' : ''}>Save Purchase</button>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('purchase-add-item').onclick = () => {
      const sel = document.getElementById('purchase-product-select');
      const p = Store.get('products', sel.value);
      if (!p) { Toast.show('Choose a product first.', 'error'); return; }
      const existing = this._items.find(i => i.productId === p.id);
      if (existing) existing.qty += 1;
      else this._items.push({ productId: p.id, name: p.name, qty: 1, cost: Number(p.purchasePrice) || 0, gstPercent: Number(p.gstPercent) || 0 });
      this.renderEntry();
    };
    el.querySelectorAll('[data-remove]').forEach(btn => btn.onclick = () => { this._items.splice(Number(btn.dataset.remove), 1); this.renderEntry(); });
    el.querySelectorAll('.cart-qty-input, .cart-disc-input').forEach(inp => {
      inp.addEventListener('change', (e) => {
        const idx = Number(e.target.dataset.idx), field = e.target.dataset.field;
        this._items[idx][field] = Math.max(0, Number(e.target.value) || 0);
        this.renderEntry();
      });
    });
    document.getElementById('purchase-supplier').onchange = (e) => { this._supplierId = e.target.value; this.renderEntry(); };
    document.getElementById('purchase-add-supplier').onclick = () => Suppliers.openForm(null, (s) => { this._supplierId = s.id; this.renderEntry(); });
    document.getElementById('purchase-amount-paid').oninput = (e) => { this._amountPaid = e.target.value; };
    document.getElementById('purchase-due-date').onchange = (e) => { this._dueDate = e.target.value; };
    document.getElementById('purchase-clear').onclick = async () => {
      if (this._items.length === 0) return;
      if (await Modal.confirm('Clear this purchase entry?', 'Clear')) { this._resetForm(); this.renderEntry(); }
    };
    document.getElementById('purchase-save').onclick = () => this.savePurchase();
  },

  _computeTotals() {
    let subtotal = 0, gstTotal = 0;
    this._items.forEach(it => {
      const lineGross = it.qty * it.cost;
      subtotal += lineGross;
      gstTotal += calcGST(lineGross, it.gstPercent).gstAmount;
    });
    return { subtotal: round2(subtotal), gstTotal: round2(gstTotal), grandTotal: round2(subtotal + gstTotal) };
  },

  _resetForm() { this._items = []; this._supplierId = ''; this._amountPaid = ''; this._dueDate = ''; },

  savePurchase() {
    if (this._items.length === 0 || !this._supplierId) return;
    const totals = this._computeTotals();
    const amountPaid = this._amountPaid !== '' ? round2(this._amountPaid) : totals.grandTotal;
    const balance = round2(totals.grandTotal - amountPaid);

    const purchase = Store.insert('purchases', {
      purchaseNo: nextPurchaseNumber(),
      date: new Date().toISOString(),
      supplierId: this._supplierId,
      items: this._items.map(i => ({ ...i })),
      subtotal: totals.subtotal,
      gstTotal: totals.gstTotal,
      grandTotal: totals.grandTotal,
      amountPaid,
      balance,
      dueDate: this._dueDate || null,
      payments: []
    });

    // Stock IN, and refresh each product's purchase price to the latest cost.
    this._items.forEach(it => {
      const p = Store.get('products', it.productId);
      if (p) Store.update('products', it.productId, { stock: p.stock + it.qty, purchasePrice: it.cost });
    });

    // Update supplier outstanding balance.
    const sup = Store.get('suppliers', this._supplierId);
    if (sup) Store.update('suppliers', this._supplierId, { outstandingBalance: round2((sup.outstandingBalance || 0) + balance) });

    Toast.show(`Purchase ${purchase.purchaseNo} saved. Stock updated.`, 'success');
    this._resetForm();
    this.render();
  },

  /* ============================== HISTORY ============================== */

  renderHistory() {
    const el = document.getElementById('purchase-tab-content');
    let purchases = Store.all('purchases').slice().sort((a, b) => new Date(b.date) - new Date(a.date));
    if (this._historySearch.trim()) {
      const q = this._historySearch.trim().toLowerCase();
      purchases = purchases.filter(p => {
        const sup = Store.get('suppliers', p.supplierId);
        return p.purchaseNo.toLowerCase().includes(q) || (sup && sup.name.toLowerCase().includes(q));
      });
    }
    const totalDue = Store.all('purchases').reduce((a, p) => a + (Number(p.balance) || 0), 0);

    el.innerHTML = `
      <div class="toolbar">
        <div class="search-box"><input type="text" id="purchase-search" placeholder="Search purchase # or supplier…" value="${esc(this._historySearch)}"></div>
        <div class="chip">Total Due to Suppliers: <strong>${formatMoney(totalDue)}</strong></div>
      </div>
      <div class="table-wrap">
        ${purchases.length === 0 ? `<div class="empty-state"><div class="empty-mark">⇩</div>No purchases recorded yet.</div>` : `
        <table>
          <thead><tr><th>Purchase #</th><th>Date</th><th>Supplier</th><th class="num">Items</th><th class="num">Total</th><th class="num">Balance Due</th><th></th></tr></thead>
          <tbody>
            ${purchases.map(p => {
              const sup = Store.get('suppliers', p.supplierId);
              return `
              <tr>
                <td class="mono">${esc(p.purchaseNo)}</td>
                <td>${formatDate(p.date)}</td>
                <td>${sup ? esc(sup.name) : '—'}</td>
                <td class="num">${(p.items || []).reduce((a, i) => a + i.qty, 0)}</td>
                <td class="num">${formatMoney(p.grandTotal)}</td>
                <td class="num">${p.balance > 0 ? `<span class="badge badge-warn">${formatMoney(p.balance)}</span>` : `<span class="badge badge-good">Paid</span>`}</td>
                <td>
                  <div class="flex gap-8">
                    <button class="btn btn-ghost btn-sm" data-view="${p.id}">View</button>
                    ${p.balance > 0 ? `<button class="btn btn-ghost btn-sm" data-pay="${p.id}">Record Payment</button>` : ''}
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
    `;
    document.getElementById('purchase-search').addEventListener('input', debounce((e) => { this._historySearch = e.target.value; this.renderHistory(); }, 200));
    el.querySelectorAll('[data-view]').forEach(btn => btn.onclick = () => this.viewPurchase(btn.dataset.view));
    el.querySelectorAll('[data-pay]').forEach(btn => btn.onclick = () => this.recordPayment(btn.dataset.pay));
  },

  viewPurchase(id) {
    const p = Store.get('purchases', id);
    const sup = Store.get('suppliers', p.supplierId);
    Modal.open(`Purchase ${p.purchaseNo}`, `
      <p><strong>Supplier:</strong> ${esc(sup ? sup.name : '—')}</p>
      <p><strong>Date:</strong> ${formatDate(p.date)}</p>
      <div class="table-wrap" style="margin-top:10px;">
        <table><thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Cost</th><th class="num">GST%</th></tr></thead>
        <tbody>${(p.items || []).map(i => `<tr><td>${esc(i.name)}</td><td class="num">${i.qty}</td><td class="num">${formatMoney(i.cost)}</td><td class="num">${i.gstPercent}%</td></tr>`).join('')}</tbody></table>
      </div>
      <div class="bill-summary-row total" style="margin-top:12px;"><span>Total</span><span>${formatMoney(p.grandTotal)}</span></div>
      <div class="bill-summary-row"><span>Paid</span><span>${formatMoney(p.amountPaid)}</span></div>
      <div class="bill-summary-row"><span>Balance</span><span>${formatMoney(p.balance)}</span></div>
    `, { wide: true });
  },

  recordPayment(id) {
    const p = Store.get('purchases', id);
    const body = Modal.open('Record Payment', `
      <p class="text-muted" style="margin-bottom:12px;">Current balance due: <strong>${formatMoney(p.balance)}</strong></p>
      <form id="pay-form">
        <label>Payment Amount
          <input type="number" id="pay-amount" min="0.01" max="${p.balance}" step="0.01" value="${p.balance}" required>
        </label>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="pay-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Payment</button>
        </div>
      </form>
    `);
    document.getElementById('pay-cancel').onclick = () => Modal.close();
    document.getElementById('pay-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const amount = round2(Math.min(p.balance, Number(document.getElementById('pay-amount').value) || 0));
      if (amount <= 0) return;
      const newBalance = round2(p.balance - amount);
      Store.update('purchases', id, {
        balance: newBalance,
        amountPaid: round2(p.amountPaid + amount),
        payments: [...(p.payments || []), { date: new Date().toISOString(), amount }]
      });
      const sup = Store.get('suppliers', p.supplierId);
      if (sup) Store.update('suppliers', p.supplierId, { outstandingBalance: round2((sup.outstandingBalance || 0) - amount) });
      Modal.close();
      Toast.show('Payment recorded.', 'success');
      this.renderHistory();
    });
  }
};

  /** onSaved(customer) is called after a successful add — used by the Billing screen's "+Add Customer". */

    const body = Modal.open(c ? 'Edit Customer' : 'Add Customer', `

        </div>
      </form>
    `);

        phone: document.getElementById('c-phone').value.trim(),
        gstNumber: document.getElementById('c-gst').value.trim(),
        address: document.getElementById('c-address').value.trim(),

      else saved = Store.insert('customers', { ...record, creditBalance: 0, loyaltyPoints: 0 });

      Toast.show(c ? 'Customer updated.' : 'Customer added.', 'success');
      if (onSaved) onSaved(saved);

  viewHistory(customerId) {
    const c = Store.get('customers', customerId);

    Modal.open(`Purchase History — ${esc(c.name)}`, `

  async deleteCustomer(id) {

      Store.remove('customers', id);
      Toast.show('Customer deleted.', 'success');
      this.render();
    }
  }
};
